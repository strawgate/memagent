<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>logfwd dashboard</title>
<style>
:root {
  --bg: #0b0e14; --panel: #151922; --border: #1e2533;
  --accent: #3b82f6; --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --mono: 'SF Mono','Cascadia Code','Fira Code','Menlo',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}
.topbar{display:flex;align-items:center;gap:16px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.5px;white-space:nowrap}
.topbar .tabs{display:flex;gap:2px}
.topbar .tab{padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.topbar .tab:hover{color:var(--text2);background:rgba(255,255,255,.04)}
.topbar .tab.active{color:var(--text);background:rgba(59,130,246,.12)}
.topbar .spacer{flex:1}
.topbar .status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.topbar .dot{width:7px;height:7px;border-radius:50%}
.topbar .dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar .dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
.ribbon{display:flex;gap:20px;padding:8px 20px;border-bottom:1px solid var(--border);background:rgba(21,25,34,.7);font-size:11px;color:var(--text3);flex-wrap:wrap}
.ribbon .item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ribbon .val{color:var(--text2);font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums;min-width:3.5em;display:inline-block;text-align:right}
.ribbon .lim{color:var(--text3);font-size:10px;font-variant-numeric:tabular-nums}
.tab-content{display:none;padding:16px 20px}.tab-content.active{display:block}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:14px}
.chart-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;position:relative}
.chart-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.chart-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.chart-value{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text);font-variant-numeric:tabular-nums;min-width:6em;text-align:right;display:inline-block}
.chart-unit{font-size:11px;color:var(--text3);margin-left:3px;font-weight:400}
canvas.chart{width:100%;height:110px;display:block;border-radius:4px}
.chart-tooltip{position:absolute;background:rgba(15,17,22,.95);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:11px;font-family:var(--mono);color:var(--text);pointer-events:none;display:none;z-index:10;white-space:nowrap}
.sysinfo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px}
.sysinfo-item{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.sysinfo-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px}
.sysinfo-val{font-size:13px;font-family:var(--mono);color:var(--text2)}
.pipeline-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
.pipeline-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pipeline-name .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(59,130,246,.15);color:var(--accent)}
.flow{display:flex;align-items:center;gap:0;padding:16px 8px;overflow-x:auto;margin-bottom:14px}
.flow-node{flex-shrink:0;padding:10px 14px;border-radius:8px;border:1.5px solid;text-align:center;min-width:100px}
.flow-node .fn-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.flow-node .fn-name{font-size:12px;font-weight:600;color:var(--text)}
.flow-node .fn-stat{font-size:11px;font-family:var(--mono);color:var(--text2);margin-top:3px;font-variant-numeric:tabular-nums}
.flow-node.input{border-color:var(--green);background:rgba(34,197,94,.06)}.flow-node.input .fn-label{color:var(--green)}
.flow-node.transform{border-color:var(--accent);background:rgba(59,130,246,.06)}.flow-node.transform .fn-label{color:var(--accent)}
.flow-node.output{border-color:#a855f7;background:rgba(168,85,247,.06)}.flow-node.output .fn-label{color:#a855f7}
.flow-arrow{flex-shrink:0;width:32px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:16px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
th{color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{color:var(--text2)}td.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
td.err{color:var(--red)}td.ok{color:var(--green)}
.sql-block{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:#79c0ff;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.yaml-block{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;overflow-x:auto;max-height:70vh;overflow-y:auto}
.yaml-block .yk{color:#79c0ff}.yaml-block .yv{color:var(--green)}.yaml-block .yn{color:var(--amber)}.yaml-block .yc{color:var(--text3);font-style:italic}.yaml-block .yp{color:#a855f7}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}.flow{flex-wrap:wrap;gap:8px}.flow-arrow{width:auto}.sysinfo-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <h1>logfwd</h1>
  <div class="tabs">
    <div class="tab active" data-tab="overview">Overview</div>
    <div class="tab" data-tab="pipelines">Pipelines</div>
    <div class="tab" data-tab="config">Config</div>
  </div>
  <div class="spacer"></div>
  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">connecting...</span></div>
</div>
<div class="ribbon" id="ribbon"></div>
<div class="tab-content active" id="tab-overview">
  <div id="sysInfoPanel"></div>
  <div class="charts-grid" id="chartsGrid"></div>
  <div id="pipelineSummaries"></div>
</div>
<div class="tab-content" id="tab-pipelines"><div id="pipelineDetails"></div></div>
<div class="tab-content" id="tab-config">
  <div class="panel"><div class="panel-title">Configuration</div><div id="configContent"><span style="color:var(--text3)">Loading...</span></div></div>
</div>
<script>
(function(){
"use strict";
var POLL_MS = 2000;
var MAX_AGE_MS = 5 * 60 * 1000; // 5 minutes of history

// === Ring buffer ===
function RingBuffer(cap){this.cap=cap;this.buf=[];this.head=0;this.len=0}
RingBuffer.prototype.push=function(v){if(this.len<this.cap){this.buf.push(v);this.len++}else{this.buf[this.head]=v}this.head=(this.head+1)%this.cap};
RingBuffer.prototype.toArray=function(){if(this.len<this.cap)return this.buf.slice();return this.buf.slice(this.head).concat(this.buf.slice(0,this.head))};

// === MiniChart with proper padding, time axis, hover ===
function MiniChart(canvasId,opts){
  this.canvas=document.getElementById(canvasId);
  this.ctx=this.canvas.getContext("2d");
  this.ring=new RingBuffer(opts.maxPoints||150);
  this.color=opts.color||"#3b82f6";
  this.unit=opts.unit||"";
  this.fmtVal=opts.fmtVal||fmtCompact;
  this.hoverIdx=-1;
  var self=this;
  this.canvas.addEventListener("mousemove",function(e){
    var rect=self.canvas.getBoundingClientRect();
    self._mouseX=(e.clientX-rect.left)*(self.canvas.width/(rect.width||1))/(window.devicePixelRatio||1);
    self._mouseY=(e.clientY-rect.top)*(self.canvas.height/(rect.height||1))/(window.devicePixelRatio||1);
    self.render();
  });
  this.canvas.addEventListener("mouseleave",function(){self._mouseX=-1;self.render()});
  this._mouseX=-1;this._mouseY=-1;
}
MiniChart.prototype.add=function(val){this.ring.push({t:Date.now(),v:val})};
MiniChart.prototype.render=function(){
  var c=this.canvas,ctx=this.ctx,dpr=window.devicePixelRatio||1;
  var w=c.offsetWidth,h=c.offsetHeight;
  c.width=w*dpr;c.height=h*dpr;ctx.scale(dpr,dpr);
  var PAD_L=38,PAD_R=6,PAD_B=16,PAD_T=4;
  var cw=w-PAD_L-PAD_R,ch=h-PAD_T-PAD_B;

  // Get data, trim to MAX_AGE
  var now=Date.now(),cutoff=now-MAX_AGE_MS;
  var raw=this.ring.toArray();
  var data=[];
  for(var i=0;i<raw.length;i++){if(raw[i].t>=cutoff)data.push(raw[i])}

  ctx.fillStyle="#0d1117";ctx.fillRect(0,0,w,h);
  if(data.length<2){
    ctx.fillStyle="#475569";ctx.font="11px sans-serif";ctx.textAlign="center";
    ctx.fillText("waiting for data\u2026",w/2,h/2);return;
  }

  var vals=data.map(function(d){return d.v});
  var mn=0,mx=Math.max.apply(null,vals)*1.15;
  if(mx<0.001)mx=1;if(mx===mn)mx=mn+1;

  // Adaptive time window: starts at 10s, grows with data, caps at MAX_AGE_MS.
  // Right edge = now. Left edge = max(now - 10s, oldest data point), clamped to MAX_AGE_MS.
  var dataAge=now-data[0].t;
  var windowMs=Math.max(10000,Math.min(dataAge*1.1,MAX_AGE_MS));
  // Snap to nice boundaries: 10s, 30s, 1m, 2m, 5m
  if(windowMs<=10000)windowMs=10000;
  else if(windowMs<=30000)windowMs=30000;
  else if(windowMs<=60000)windowMs=60000;
  else if(windowMs<=120000)windowMs=120000;
  else windowMs=MAX_AGE_MS;
  var tMax=now,tMin=now-windowMs,tRange=windowMs;

  // Helper: time -> x pixel
  function tx(t){return PAD_L+((t-tMin)/tRange)*cw}

  // Grid + Y labels
  ctx.textAlign="right";ctx.textBaseline="middle";
  var monoFont="9px "+getComputedStyle(document.body).getPropertyValue("--mono");
  ctx.font=monoFont;
  for(var g=0;g<=3;g++){
    var frac=g/3,yv=mn+(mx-mn)*frac;
    var gy=PAD_T+ch-(ch*frac);
    ctx.strokeStyle="#1e2533";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PAD_L,gy);ctx.lineTo(w-PAD_R,gy);ctx.stroke();
    ctx.fillStyle="#475569";
    ctx.fillText(this.fmtVal(yv),PAD_L-4,gy);
  }

  // X-axis time labels (fixed positions relative to "now")
  ctx.textAlign="center";ctx.textBaseline="top";ctx.fillStyle="#475569";ctx.font=monoFont;
  var ticks=[10,30,60,120,300];
  for(var ti=0;ti<ticks.length;ti++){
    var agoMs=ticks[ti]*1000;
    var lx=tx(now-agoMs);
    if(lx<PAD_L+15||lx>w-PAD_R-20)continue;
    ctx.fillText(ticks[ti]<60?ticks[ti]+"s":Math.floor(ticks[ti]/60)+"m",lx,PAD_T+ch+2);
  }
  ctx.fillText("now",PAD_L+cw,PAD_T+ch+2);

  // Line — data fills in from the right
  ctx.beginPath();
  var started=false;
  for(var i=0;i<data.length;i++){
    var x=tx(data[i].t);
    var y=PAD_T+ch-((data[i].v-mn)/(mx-mn))*ch;
    y=Math.max(PAD_T,Math.min(PAD_T+ch,y));
    if(!started){ctx.moveTo(x,y);started=true}else{ctx.lineTo(x,y)}
  }
  ctx.strokeStyle=this.color;ctx.lineWidth=1.5;ctx.stroke();

  // Fill under the line
  var firstX=tx(data[0].t),lastX=tx(data[data.length-1].t);
  ctx.lineTo(lastX,PAD_T+ch);
  ctx.lineTo(firstX,PAD_T+ch);ctx.closePath();
  var grad=ctx.createLinearGradient(0,PAD_T,0,PAD_T+ch);
  grad.addColorStop(0,this.color+"30");grad.addColorStop(1,this.color+"05");
  ctx.fillStyle=grad;ctx.fill();

  // Hover — only over the data region
  var dataLeft=tx(data[0].t),dataRight=tx(data[data.length-1].t);
  if(this._mouseX>=dataLeft-5&&this._mouseX<=dataRight+5&&data.length>1){
    var hTime=tMin+((this._mouseX-PAD_L)/cw)*tRange;
    var best=0,bestDist=Infinity;
    for(var i=0;i<data.length;i++){var d=Math.abs(data[i].t-hTime);if(d<bestDist){bestDist=d;best=i}}
    var pt=data[best];
    var px=tx(pt.t);
    var py=PAD_T+ch-((pt.v-mn)/(mx-mn))*ch;
    py=Math.max(PAD_T,Math.min(PAD_T+ch,py));
    // Crosshair
    ctx.strokeStyle=this.color+"60";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(px,PAD_T);ctx.lineTo(px,PAD_T+ch);ctx.stroke();
    // Dot
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();
    // Tooltip via DOM
    var tip=this.canvas.parentElement.querySelector(".chart-tooltip");
    if(tip){
      var agoSec=Math.round((now-pt.t)/1000);
      var agoStr=agoSec<=1?"now":agoSec<60?agoSec+"s ago":Math.floor(agoSec/60)+"m "+agoSec%60+"s ago";
      tip.textContent=this.fmtVal(pt.v)+(this.unit?" "+this.unit:"")+" \u00b7 "+agoStr;
      tip.style.display="block";
      var tipX=px+10,tipY=py-24;
      if(tipX+100>w)tipX=px-110;
      tip.style.left=tipX+"px";tip.style.top=tipY+"px";
    }
  } else {
    var tip=this.canvas.parentElement.querySelector(".chart-tooltip");
    if(tip)tip.style.display="none";
  }
};

// === Formatters ===
function fmt(n){if(n==null)return"-";if(n>=1e9)return(n/1e9).toFixed(2)+" G";if(n>=1e6)return(n/1e6).toFixed(2)+" M";if(n>=1e3)return(n/1e3).toFixed(1)+" K";return String(Math.round(n))}
function fmtCompact(n){if(n>=1e9)return(n/1e9).toFixed(1)+"G";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";if(n>=1)return n.toFixed(0);if(n>=0.01)return n.toFixed(2);return n.toFixed(0)}
function fmtBytes(b){if(b==null)return"-";if(b>=1073741824)return(b/1073741824).toFixed(1)+" GB";if(b>=1048576)return(b/1048576).toFixed(1)+" MB";if(b>=1024)return(b/1024).toFixed(1)+" KB";return b+" B"}
function fmtBytesCompact(b){if(b>=1073741824)return(b/1073741824).toFixed(1)+"G";if(b>=1048576)return(b/1048576).toFixed(0)+"M";if(b>=1024)return(b/1024).toFixed(0)+"K";if(b>=1)return Math.round(b)+"B";return"0"}
function fmtRate(cur,prev,dt){if(prev==null||dt<=0)return"-";return fmt((cur-prev)/dt)+"/s"}
function fmtDuration(s){if(s>=86400)return Math.floor(s/86400)+"d "+Math.floor((s%86400)/3600)+"h";if(s>=3600)return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m";if(s>=60)return Math.floor(s/60)+"m "+Math.floor(s%60)+"s";return s+"s"}
function fmtPct(n){return n!=null?n.toFixed(1)+"%":"-"}
function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML}

// === State ===
var state={prev:null,prevTime:null,prevSystem:null,charts:{},configLoaded:false,sysInfoShown:false};

var CHART_DEFS=[
  {id:"c_lps",label:"Lines / sec",color:"#3b82f6",unit:"/s",fmtVal:fmtCompact},
  {id:"c_bps",label:"Throughput",color:"#8b5cf6",unit:"/s",fmtVal:fmtBytesCompact},
  {id:"c_errs",label:"Errors / sec",color:"#ef4444",unit:"/s",fmtVal:fmtCompact},
  {id:"c_cpu",label:"Process CPU",color:"#f59e0b",unit:"%",fmtVal:fmtCompact},
  {id:"c_rss",label:"Memory (RSS)",color:"#22c55e",unit:"",fmtVal:fmtBytesCompact},
  {id:"c_fds",label:"Open FDs",color:"#06b6d4",unit:"",fmtVal:fmtCompact},
];

function initCharts(){
  var grid=document.getElementById("chartsGrid");grid.innerHTML="";
  CHART_DEFS.forEach(function(def){
    var div=document.createElement("div");div.className="chart-panel";
    div.innerHTML='<div class="chart-header"><span class="chart-label">'+esc(def.label)+'</span>'
      +'<span class="chart-value" id="'+def.id+'_val">-</span></div>'
      +'<canvas class="chart" id="'+def.id+'"></canvas>'
      +'<div class="chart-tooltip"></div>';
    grid.appendChild(div);
    state.charts[def.id]=new MiniChart(def.id,{color:def.color,unit:def.unit,fmtVal:def.fmtVal,maxPoints:150});
  });
}

// === Tab switching ===
document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    document.querySelectorAll(".tab-content").forEach(function(c){c.classList.remove("active")});
    tab.classList.add("active");
    document.getElementById("tab-"+tab.dataset.tab).classList.add("active");
    if(tab.dataset.tab==="config"&&!state.configLoaded)loadConfig();
    renderAllCharts();
  });
});

// === Render ===
function setStatus(ok){
  document.getElementById("statusDot").className="dot "+(ok?"ok":"err");
  document.getElementById("statusText").textContent=ok?"live":"disconnected";
}

// Update text only if changed, avoiding layout thrash
function setText(el,text){if(el&&el.textContent!==text)el.textContent=text}
function setHtml(el,html){if(el&&el.innerHTML!==html)el.innerHTML=html}

var ribbonBuilt=false;
function renderRibbon(pipe,sys){
  var el=document.getElementById("ribbon");
  if(!ribbonBuilt){
    // Build structure once with stable IDs
    el.innerHTML='<div class="item">Uptime <span class="val" id="rb_up">-</span></div>'
      +'<div class="item">Version <span class="val" id="rb_ver">-</span></div>'
      +'<div class="item">CPU <span class="val" id="rb_cpu">-</span></div>'
      +'<div class="item">RSS <span class="val" id="rb_rss">-</span><span class="lim" id="rb_rss_lim"></span></div>'
      +'<div class="item">FDs <span class="val" id="rb_fds">-</span><span class="lim" id="rb_fds_lim"></span></div>'
      +'<div class="item">PID <span class="val" id="rb_pid">-</span></div>'
      +'<div class="item">Pipelines <span class="val" id="rb_pipes">-</span></div>'
      +'<div class="item">Total lines <span class="val" id="rb_lines">-</span></div>';
    ribbonBuilt=true;
  }
  if(sys){
    setText(document.getElementById("rb_up"),fmtDuration(sys.uptime_seconds));
    setText(document.getElementById("rb_ver"),sys.version||"-");
    setText(document.getElementById("rb_cpu"),fmtPct(sys.cpu_percent));
    setText(document.getElementById("rb_rss"),fmtBytes(sys.rss_bytes));
    setText(document.getElementById("rb_rss_lim"),sys.total_memory_bytes?"/ "+fmtBytes(sys.total_memory_bytes):"");
    setText(document.getElementById("rb_fds"),sys.fd_count!=null?String(sys.fd_count):"-");
    setText(document.getElementById("rb_fds_lim"),sys.fd_limit!=null?"/ "+fmt(sys.fd_limit):"");
    setText(document.getElementById("rb_pid"),sys.pid?String(sys.pid):"-");
  }
  if(pipe&&pipe.pipelines){
    setText(document.getElementById("rb_pipes"),String(pipe.pipelines.length));
    var totalIn=0;pipe.pipelines.forEach(function(p){totalIn+=p.transform.lines_in||0});
    setText(document.getElementById("rb_lines"),fmt(totalIn));
  }
}

function renderSystemInfo(sys){
  if(!sys||state.sysInfoShown)return;
  if(!sys.hostname&&!sys.os)return;
  state.sysInfoShown=true;
  var items=[];
  if(sys.hostname)items.push({l:"Hostname",v:sys.hostname});
  if(sys.os)items.push({l:"OS",v:sys.os});
  if(sys.arch)items.push({l:"Architecture",v:sys.arch});
  if(sys.cpu_count)items.push({l:"CPU Cores",v:sys.cpu_count});
  if(sys.total_memory_bytes)items.push({l:"Total Memory",v:fmtBytes(sys.total_memory_bytes)});
  if(sys.fd_limit!=null)items.push({l:"FD Limit",v:fmt(sys.fd_limit)});
  if(sys.pid)items.push({l:"PID",v:sys.pid});
  items.push({l:"Version",v:sys.version||"-"});
  var html='<div class="panel"><div class="panel-title">System Information</div><div class="sysinfo-grid">';
  items.forEach(function(it){html+='<div class="sysinfo-item"><div class="sysinfo-label">'+esc(it.l)+'</div><div class="sysinfo-val">'+esc(String(it.v))+'</div></div>'});
  html+='</div></div>';
  document.getElementById("sysInfoPanel").innerHTML=html;
}

var summariesBuilt=false;
function renderPipelineSummaries(data){
  if(!data||!data.pipelines)return;
  var container=document.getElementById("pipelineSummaries");
  if(!summariesBuilt){
    var html="";
    data.pipelines.forEach(function(p,pi){
      html+='<div class="pipeline-card"><div class="pipeline-name">'+esc(p.name)+' <span class="badge">'+p.inputs.length+' in / '+p.outputs.length+' out</span></div>';
      html+='<div class="flow">';
      p.inputs.forEach(function(inp,i){
        if(i>0)html+='<div class="flow-arrow"></div>';
        html+='<div class="flow-node input"><div class="fn-label">input</div><div class="fn-name">'+esc(inp.name)+'</div><div class="fn-stat" id="ps_i'+pi+'_'+i+'">-</div></div>';
      });
      html+='<div class="flow-arrow">\u2192</div>';
      html+='<div class="flow-node transform"><div class="fn-label">transform</div><div class="fn-name">SQL</div><div class="fn-stat" id="ps_t'+pi+'">-</div><div class="fn-stat" style="color:var(--amber)" id="ps_td'+pi+'">-</div></div>';
      html+='<div class="flow-arrow">\u2192</div>';
      p.outputs.forEach(function(out,i){
        if(i>0)html+='<div class="flow-arrow"></div>';
        html+='<div class="flow-node output"><div class="fn-label">output</div><div class="fn-name">'+esc(out.name)+'</div><div class="fn-stat" id="ps_o'+pi+'_'+i+'">-</div></div>';
      });
      html+='</div>';
      if(p.transform&&p.transform.sql)html+='<div class="sql-block">'+esc(p.transform.sql)+'</div>';
      html+='</div>';
    });
    container.innerHTML=html;
    summariesBuilt=true;
  }
  // Update values in-place
  data.pipelines.forEach(function(p,pi){
    p.inputs.forEach(function(inp,i){setText(document.getElementById("ps_i"+pi+"_"+i),fmt(inp.lines_total)+" lines")});
    setText(document.getElementById("ps_t"+pi),fmt(p.transform.lines_in)+" \u2192 "+fmt(p.transform.lines_out));
    setText(document.getElementById("ps_td"+pi),"drop "+(p.transform.filter_drop_rate*100).toFixed(1)+"%");
    p.outputs.forEach(function(out,i){
      var el=document.getElementById("ps_o"+pi+"_"+i);
      var txt=fmt(out.lines_total)+" lines";
      if(out.errors>0)txt+="\n"+out.errors+" errors";
      setText(el,txt);
    });
  });
}

var detailsBuilt=false;
function renderPipelineDetails(data,dt){
  if(!data||!data.pipelines)return;
  var container=document.getElementById("pipelineDetails");
  if(!detailsBuilt){
    var html="";
    data.pipelines.forEach(function(p,pi){
      html+='<div class="pipeline-card"><div class="pipeline-name">'+esc(p.name)+'</div>';
      html+='<div class="panel"><div class="panel-title">Inputs</div><table><tr><th style="width:20%">Name</th><th style="width:12%">Type</th><th style="text-align:right;width:15%">Lines</th><th style="text-align:right;width:17%">Bytes</th><th style="text-align:right;width:18%">Rate</th><th style="text-align:right;width:18%">Errors</th></tr>';
      p.inputs.forEach(function(inp,i){
        html+='<tr><td>'+esc(inp.name)+'</td><td>'+esc(inp.type)+'</td><td class="num" id="pd_il'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_ib'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_ir'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_ie'+pi+'_'+i+'">0</td></tr>';
      });
      html+='</table></div>';
      html+='<div class="panel"><div class="panel-title">Transform</div><div class="sql-block">'+esc(p.transform.sql||"SELECT * FROM logs")+'</div>';
      html+='<table><tr><th style="width:33%">Lines In</th><th style="width:33%">Lines Out</th><th style="width:34%">Drop Rate</th></tr><tr><td class="num" id="pd_ti'+pi+'">&ndash;</td><td class="num" id="pd_to'+pi+'">&ndash;</td><td class="num" id="pd_td'+pi+'">&ndash;</td></tr></table></div>';
      html+='<div class="panel"><div class="panel-title">Outputs</div><table><tr><th style="width:20%">Name</th><th style="width:12%">Type</th><th style="text-align:right;width:15%">Lines</th><th style="text-align:right;width:17%">Bytes</th><th style="text-align:right;width:18%">Rate</th><th style="text-align:right;width:18%">Errors</th></tr>';
      p.outputs.forEach(function(out,i){
        html+='<tr><td>'+esc(out.name)+'</td><td>'+esc(out.type)+'</td><td class="num" id="pd_ol'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_ob'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_or'+pi+'_'+i+'">&ndash;</td><td class="num" id="pd_oe'+pi+'_'+i+'">0</td></tr>';
      });
      html+='</table></div></div>';
    });
    container.innerHTML=html;
    detailsBuilt=true;
  }
  // Update values in-place
  data.pipelines.forEach(function(p,pi){
    var pp=findPrev(p.name);
    p.inputs.forEach(function(inp,i){
      var pinp=pp?findComponent(pp.inputs,inp.name):null;
      setText(document.getElementById("pd_il"+pi+"_"+i),fmt(inp.lines_total));
      setText(document.getElementById("pd_ib"+pi+"_"+i),fmtBytes(inp.bytes_total));
      setText(document.getElementById("pd_ir"+pi+"_"+i),fmtRate(inp.lines_total,pinp?pinp.lines_total:null,dt));
      var errEl=document.getElementById("pd_ie"+pi+"_"+i);
      if(errEl){errEl.textContent=String(inp.errors);errEl.className="num "+(inp.errors>0?"err":"ok")}
    });
    setText(document.getElementById("pd_ti"+pi),fmt(p.transform.lines_in));
    setText(document.getElementById("pd_to"+pi),fmt(p.transform.lines_out));
    setText(document.getElementById("pd_td"+pi),(p.transform.filter_drop_rate*100).toFixed(1)+"%");
    p.outputs.forEach(function(out,i){
      var pout=pp?findComponent(pp.outputs,out.name):null;
      setText(document.getElementById("pd_ol"+pi+"_"+i),fmt(out.lines_total));
      setText(document.getElementById("pd_ob"+pi+"_"+i),fmtBytes(out.bytes_total));
      setText(document.getElementById("pd_or"+pi+"_"+i),fmtRate(out.lines_total,pout?pout.lines_total:null,dt));
      var errEl=document.getElementById("pd_oe"+pi+"_"+i);
      if(errEl){errEl.textContent=String(out.errors);errEl.className="num "+(out.errors>0?"err":"ok")}
    });
  });
}

function findPrev(name){if(!state.prev||!state.prev.pipelines)return null;for(var i=0;i<state.prev.pipelines.length;i++){if(state.prev.pipelines[i].name===name)return state.prev.pipelines[i]}return null}
function findComponent(arr,name){if(!arr)return null;for(var i=0;i<arr.length;i++){if(arr[i].name===name)return arr[i]}return null}

function renderAllCharts(){Object.keys(state.charts).forEach(function(id){state.charts[id].render()})}

function updateCharts(pipe,sys,dt){
  var c=state.charts;
  if(pipe&&state.prev&&dt>0){
    var totalIn=0,prevIn=0;
    pipe.pipelines.forEach(function(p){totalIn+=p.transform.lines_in||0});
    state.prev.pipelines.forEach(function(p){prevIn+=p.transform.lines_in||0});
    var lps=(totalIn-prevIn)/dt;c.c_lps.add(Math.max(0,lps));
    document.getElementById("c_lps_val").innerHTML=fmt(lps)+'<span class="chart-unit">/s</span>';
    var totalBytes=0,prevBytes=0;
    pipe.pipelines.forEach(function(p){p.inputs.forEach(function(i){totalBytes+=i.bytes_total||0})});
    state.prev.pipelines.forEach(function(p){p.inputs.forEach(function(i){prevBytes+=i.bytes_total||0})});
    var bps=(totalBytes-prevBytes)/dt;c.c_bps.add(Math.max(0,bps));
    document.getElementById("c_bps_val").innerHTML=fmtBytes(bps)+'<span class="chart-unit">/s</span>';
    var totalErrs=0,prevErrs=0;
    pipe.pipelines.forEach(function(p){p.outputs.forEach(function(o){totalErrs+=o.errors||0})});
    state.prev.pipelines.forEach(function(p){p.outputs.forEach(function(o){prevErrs+=o.errors||0})});
    var eps=(totalErrs-prevErrs)/dt;c.c_errs.add(Math.max(0,eps));
    document.getElementById("c_errs_val").innerHTML=fmt(eps)+'<span class="chart-unit">/s</span>';
  }
  if(sys){
    if(sys.cpu_percent!=null){c.c_cpu.add(sys.cpu_percent);document.getElementById("c_cpu_val").innerHTML=fmtPct(sys.cpu_percent)}
    if(sys.rss_bytes!=null){c.c_rss.add(sys.rss_bytes);
      var rssStr=fmtBytes(sys.rss_bytes);
      if(sys.total_memory_bytes)rssStr+='<span class="chart-unit"> / '+fmtBytes(sys.total_memory_bytes)+'</span>';
      document.getElementById("c_rss_val").innerHTML=rssStr;
    }
    if(sys.fd_count!=null){c.c_fds.add(sys.fd_count);
      var fdStr=sys.fd_count;
      if(sys.fd_limit!=null)fdStr+='<span class="chart-unit"> / '+fmt(sys.fd_limit)+'</span>';
      document.getElementById("c_fds_val").innerHTML=fdStr;
    }
  }
  renderAllCharts();
}

// === Config tab ===
function loadConfig(){
  fetch("/api/config").then(function(r){return r.json()}).then(function(data){
    state.configLoaded=true;
    var el=document.getElementById("configContent");
    el.innerHTML=(data.path?'<div style="margin-bottom:10px;font-size:11px;color:var(--text3)">Source: <span style="color:var(--text2);font-family:var(--mono)">'+esc(data.path)+'</span></div>':'')
      +'<div class="yaml-block">'+highlightYaml(data.raw_yaml||"(no config)")+'</div>';
  }).catch(function(){document.getElementById("configContent").innerHTML='<span style="color:var(--text3)">Could not load config</span>';state.configLoaded=true});
}
function highlightYaml(yaml){
  return esc(yaml)
    .replace(/^(\s*)([\w._-]+)(:)/gm,function(m,ws,k,c){return ws+'<span class="yk">'+k+'</span>'+c})
    .replace(/:\s+(\d+(?:\.\d+)?)\s*$/gm,function(m,n){return ': <span class="yn">'+n+'</span>'})
    .replace(/:\s+(true|false)\s*$/gm,function(m,b){return ': <span class="yn">'+b+'</span>'})
    .replace(/(#.*)$/gm,function(m,c){return '<span class="yc">'+c+'</span>'});
}

// === Polling ===
function poll(){
  Promise.all([
    fetch("/api/pipelines").then(function(r){return r.json()}),
    fetch("/api/system").then(function(r){return r.json()}).catch(function(){return null})
  ]).then(function(r){
    var pipe=r[0],sys=r[1];setStatus(true);
    var now=Date.now(),dt=state.prevTime?(now-state.prevTime)/1000:0;
    renderRibbon(pipe,sys);renderSystemInfo(sys);
    updateCharts(pipe,sys,dt);renderPipelineSummaries(pipe);renderPipelineDetails(pipe,dt);
    state.prev=pipe;state.prevTime=now;state.prevSystem=sys;
  }).catch(function(){setStatus(false)});
}

initCharts();poll();setInterval(poll,POLL_MS);
})();
</script>
