[workspace]
resolver = "2"
members = [
    "crates/logfwd-config",
    "crates/logfwd-core",
    "crates/logfwd-arrow",
    "crates/logfwd-transform",
    "crates/logfwd-io",
    "crates/logfwd-output",
    "crates/logfwd",
    "crates/logfwd-bench",
    "crates/logfwd-competitive-bench",
    "crates/logfwd-test-utils",
]

[workspace.dependencies]
arrow = { version = "54", default-features = false, features = ["ipc_compression"] }
opentelemetry = "0.31"
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.31", features = ["http-proto", "reqwest-client"] }
serde = { version = "1", features = ["derive"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
debug = true  # needed for flamegraphs and dhat to show source locations

[profile.test]
debug = true

[profile.bench]
inherits = "release"
