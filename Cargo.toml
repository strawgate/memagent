[workspace]
resolver = "2"
members = [
    "crates/logfwd-config",
    "crates/logfwd-core",
    "crates/logfwd-transform",
    "crates/logfwd-output",
    "crates/logfwd",
]

[workspace.dependencies]
arrow = { version = "54", default-features = false }
serde = { version = "1", features = ["derive"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
debug = true  # needed for flamegraphs and dhat to show source locations

[profile.test]
opt-level = 1
debug = true

[profile.bench]
inherits = "release"
