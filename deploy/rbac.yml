# Upgrade note: clusters that previously applied the old ffwd manifests may
# keep stale ffwd ServiceAccount, ClusterRole, and ClusterRoleBinding objects.
# Delete those old resources after all workloads use the ff service account.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ff
  namespace: collectors
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ff
  labels:
    app: ff
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ff
  labels:
    app: ff
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ff
subjects:
  - kind: ServiceAccount
    name: ff
    namespace: collectors
