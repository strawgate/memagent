apiVersion: v1
kind: Namespace
metadata:
  name: collectors
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ff
  namespace: collectors
  labels:
    app: ff
spec:
  selector:
    matchLabels:
      app: ff
  template:
    metadata:
      labels:
        app: ff
    spec:
      serviceAccountName: ff
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: ff
          image: ghcr.io/strawgate/fastforward:latest
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--config"
            - "/etc/ff/pipeline.yaml"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: diagnostics
              containerPort: 9090
              protocol: TCP
          env:
            - name: OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4318"
          livenessProbe:
            httpGet:
              path: /live
              port: diagnostics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: diagnostics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /live
              port: diagnostics
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: config
              mountPath: /etc/ff
              readOnly: true
            - name: data
              mountPath: /var/lib/ffwd
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: ff-config
        - name: data
          hostPath:
            path: /var/lib/ffwd
            type: DirectoryOrCreate
