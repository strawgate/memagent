            - paragraph [ref=e335]: File inputs are the safest — the filesystem is a durable, practically infinite buffer. UDP is inherently lossy under pressure because there’s no flow control. OTLP pushes the problem back to the sender, keeping both sides honest.
            - paragraph [ref=e336]:
              - text: "The key insight:"
              - strong [ref=e337]: bounded channels turn an OOM crash into a recoverable slowdown.
              - text: Data that can be retried (files, OTLP) survives intact. Data that can’t (UDP) drops cleanly instead of taking the whole pipeline down with it.
