            - paragraph [ref=e188]:
              - text: Without backpressure, there’s nothing to stop data from piling up. An unbounded queue just keeps growing — and growing — until the process runs out of memory and crashes.
              - strong [ref=e189]: All queued data is lost.
            - generic [ref=e190]:
