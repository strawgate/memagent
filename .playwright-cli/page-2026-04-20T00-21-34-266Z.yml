            - paragraph [ref=e206]: Bounded channels trade a little throughput for a lot of safety. Instead of an OOM crash, you get a controlled slowdown — and data that can be retried survives intact.
            - generic [ref=e207]:
              - heading "Backpressure and data loss" [level=2] [ref=e208]
