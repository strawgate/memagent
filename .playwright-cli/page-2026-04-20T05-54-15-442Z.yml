        - generic [ref=e124]:
          - generic [ref=e125]:
            - paragraph [ref=e126]: Think of a log pipeline like a highway. When traffic flows freely, data cruises from the source through to the destination. But when the exit slows — a network blip, a struggling endpoint — data starts queuing on the road itself. Eventually the backup reaches the on-ramp and new data can’t even enter.
            - paragraph [ref=e127]:
              - text: That’s backpressure. And it’s
              - strong [ref=e128]: exactly what you want
              - text: .
            - paragraph [ref=e129]: "Drag the slider to control how long the light stays green and watch traffic back up:"
