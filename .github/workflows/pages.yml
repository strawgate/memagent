name: Deploy Benchmark Dashboard

on:
  # Run after nightly benchmarks complete
  workflow_run:
    workflows: ["Nightly Benchmarks"]
    types: [completed]
  # Allow manual trigger to rebuild the site
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  actions: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Only deploy if the bench workflow succeeded (or on manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Collect historical benchmark results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _site/data

          # Copy the dashboard HTML
          cp bench/site/index.html _site/index.html

          # List all artifacts whose name starts with "bench-result-".
          # The API doesn't support prefix search, so we fetch all and filter.
          echo "Fetching artifact list..."
          gh api --paginate \
            "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("bench-result-")) | select(.expired == false) | "\(.id) \(.name)"' \
            > /tmp/artifacts.txt || true

          COUNT=$(wc -l < /tmp/artifacts.txt | tr -d ' ')
          echo "Found ${COUNT} benchmark artifacts"

          # Download each artifact and extract the JSON
          while IFS=' ' read -r id name; do
            [ -z "$id" ] && continue
            echo "  Downloading ${name} (id: ${id})..."
            gh api "repos/${{ github.repository }}/actions/artifacts/${id}/zip" \
              > "/tmp/${name}.zip" 2>/dev/null || continue
            rm -rf /tmp/extract
            unzip -qo "/tmp/${name}.zip" -d /tmp/extract 2>/dev/null || continue

            # The artifact contains bench-result.json — rename using date+commit from JSON
            if [ -f /tmp/extract/bench-result.json ]; then
              TIMESTAMP=$(python3 -c "import json; d=json.load(open('/tmp/extract/bench-result.json')); print(d.get('timestamp','unknown')[:10])" 2>/dev/null || echo "unknown")
              BENCH_COMMIT=$(python3 -c "import json; d=json.load(open('/tmp/extract/bench-result.json')); print(d.get('commit','unknown')[:7])" 2>/dev/null || echo "unknown")
              DEST="${TIMESTAMP}-${BENCH_COMMIT}.json"
              cp /tmp/extract/bench-result.json "_site/data/${DEST}"
              echo "    -> data/${DEST}"
            fi
            rm -rf /tmp/extract
          done < /tmp/artifacts.txt

          # Build the index file from whatever JSON files we collected
          python3 -c "
          import json, os
          data_dir = '_site/data'
          files = sorted(f for f in os.listdir(data_dir) if f.endswith('.json') and f != 'index.json')
          json.dump({'files': files}, open(os.path.join(data_dir, 'index.json'), 'w'), indent=2)
          print(f'Index: {len(files)} result files')
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
