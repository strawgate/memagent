name: eBPF Capabilities

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ebpf-capabilities.yml"
      - "scripts/ci-ebpf-capabilities.sh"
      - "crates/logfwd-ebpf-proto/**"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/ebpf-capabilities.yml"
      - "scripts/ci-ebpf-capabilities.sh"
      - "crates/logfwd-ebpf-proto/**"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  linux-ebpf:
    name: Linux eBPF probe + tests
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install eBPF userspace tooling
        continue-on-error: true
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y linux-tools-azure linux-cloud-tools-azure || true
          sudo apt-get install -y "linux-tools-$(uname -r)" "linux-cloud-tools-$(uname -r)" || true
          if ! sudo apt-get install -y bpftool; then
            sudo apt-get install -y linux-tools-common || true
            # Ubuntu 24.04 often installs bpftool under versioned linux-tools paths.
            if ! command -v bpftool >/dev/null 2>&1; then
              candidate="$(compgen -G '/usr/lib/linux-tools/*/bpftool' | head -n1 || true)"
              if [[ -n "${candidate}" ]]; then
                sudo ln -sf "${candidate}" /usr/local/bin/bpftool
              fi
            fi
          fi
          if command -v bpftool >/dev/null 2>&1; then
            bpftool version || true
          else
            echo "bpftool not found; capability probe will record this."
          fi

      - name: Test eBPF proto crate
        run: cargo test -p logfwd-ebpf-proto --all-targets

      - name: Check pipe-capture userspace loader builds
        run: cargo check --manifest-path crates/logfwd-ebpf-proto/pipe-capture/Cargo.toml

      - name: Probe runner eBPF capabilities
        run: scripts/ci-ebpf-capabilities.sh artifacts/ebpf-capabilities

      - name: Add probe summary
        if: always()
        run: |
          if [[ -f artifacts/ebpf-capabilities/summary.md ]]; then
            cat artifacts/ebpf-capabilities/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "eBPF capability summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eBPF capability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-capabilities-linux
          path: artifacts/ebpf-capabilities/

  macos-ebpf:
    name: macOS eBPF proto tests
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Host snapshot
        run: |
          uname -a
          sysctl kern.osproductversion || true
          rustc --version

      - name: Test eBPF proto crate
        run: cargo test -p logfwd-ebpf-proto --all-targets

  windows-ebpf:
    name: Windows eBPF proto tests
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Host snapshot
        shell: pwsh
        run: |
          systeminfo | Select-Object -First 15
          rustc --version

      - name: Test eBPF proto crate
        run: cargo test -p logfwd-ebpf-proto --all-targets
