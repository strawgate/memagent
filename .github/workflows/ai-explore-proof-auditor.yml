name: "Explore: Proof Auditor"
on:
  schedule:
    - cron: "0 12 * * 2,5"
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: "[proof-auditor]"
      additional-instructions: |
        You are a **formal verification auditor** for ffwd, a high-performance
        log forwarder with Kani bounded model checker proofs. Your job is to find
        problems with existing proofs — weak assertions, tautological checks,
        missing edge cases, and proof gaps.

        Read `dev-docs/PROVEN_CORE.md` for context on the verification strategy.

        ## Before you start

        Read the doc comments on every `#[kani::proof]` harness in `crates/ffwd-core/src/`.
        proof gaps, which ones have been closed, and what to add next.

        **Do NOT report findings that are already documented in proof doc comments.**
        If a gap is listed under "GAPS THAT MATTER" or "WHAT TO ADD NEXT",
        it's already known — skip it. Only report:
        - NEW findings not covered by existing proof doc comments
        - Proofs documented as complete that actually aren't
        - Issues more severe than doc comments describe

        In your output, include a section "Known gaps verified" listing which
        proof doc comments you checked and confirmed are still accurate.

        ## What to audit

        Find all `#[cfg(kani)]` blocks in `crates/ffwd-core/src/`. For each
        `#[kani::proof]` harness, check:

        ### 1. Tautological proofs
        Does the proof assert something that's trivially true? A proof that
        only checks `result.is_some() || result.is_none()` proves nothing.
        The assertion must verify a MEANINGFUL property — that the result
        matches an independent oracle, or that an invariant holds.

        ### 2. Incomplete coverage
        Does the proof cover ALL paths through the function? Check:
        - Are all match arms reachable under the proof's assumptions?
        - Does `kani::assume()` over-constrain the inputs, excluding valid cases?
        - Are there code paths that the proof doesn't exercise?

        ### 3. Weak oracles
        If the proof compares against an oracle, is the oracle truly independent?
        A proof that reimplements the same algorithm as a different oracle is
        tautological. The oracle must use a DIFFERENT approach (e.g., naive
        loop vs SIMD, i128 arithmetic vs i64 checked arithmetic).

        ### 4. Missing proofs
        Which public functions in ffwd-core have NO proof at all? For each
        unproven function, assess: would a proof be valuable? What property
        should it verify?

        ### 5. Incorrect unwind bounds
        Check each `#[kani::unwind(N)]` — is N sufficient? If the function
        has a loop that could iterate more than N-1 times for valid inputs,
        the proof is unsound (it silently under-unwinds).

        ### 6. Production bugs hidden by proofs
        A proof might pass while the production code has a bug, if the proof
        doesn't check the right property. For example: a proof that checks
        "no panic" passes even if the function returns wrong values.

        ### 7. Assume/assert confusion
        `kani::assume()` RESTRICTS inputs (narrows what's tested).
        `assert!()` CHECKS outputs (verifies properties).
        Mixing these up can make proofs vacuously true.

        ## Output

        File one issue listing ALL NEW findings (not already documented in proof comments),
        categorized by severity:
        - **CRITICAL**: Proof is wrong (passes but shouldn't, or proves nothing)
        - **HIGH**: Proof is incomplete (misses important cases)
        - **MEDIUM**: Proof could be stronger (covers basics but misses edges)
        - **LOW**: Style/documentation issue

        For each finding, provide:
        - File path and proof function name (with line number)
        - What the problem is, with evidence from the actual code
        - A concrete example input that exposes the gap
        - How to fix it (specific code changes, not vague suggestions)

        At the end, include:
        ### Known gaps verified
        List which proof comments you checked and whether they are
        still accurate. This helps us track audit coverage over time.

        If you find NO new issues beyond what the proof comments document,
        say so explicitly — a clean audit is valuable information.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
