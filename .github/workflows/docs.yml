name: Deploy Docs

on:
  pull_request:
    paths:
      - "crates/**"
      - "tla/**"
      - "book/**"
      - "dev-docs/**"
      - "docs/**"
      - "*.md"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "book/**"
      - "dev-docs/**"
      - "bench/dashboard/**"
      - "crates/**"
      - "tla/**"
      - "docs/**"
      - "*.md"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Link check (book + docs + README)
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.23.0
          args: >-
            --no-progress
            --accept 200,429
            --max-retries 3
            --exclude 'mailto:'
            --exclude-loopback
            README.md book/src dev-docs docs

      - name: Validate required operational doc sections
        run: python3 scripts/docs/validate_operational_sections.py

      - name: Validate research metadata headers
        run: python3 scripts/docs/validate_research_metadata.py

      - name: Validate root markdown allowlist
        run: python3 scripts/docs/validate_root_doc_allowlist.py

      - name: Report stale operational docs
        run: python3 scripts/docs/report_stale_docs.py

      - name: Build mdBook
        run: mdbook build book

      - name: Build rustdoc (public API only)
        run: |
          cargo doc --no-deps \
            -p logfwd \
            -p logfwd-core \
            -p logfwd-config \
            -p logfwd-output \
            -p logfwd-transform
          cp -r target/doc book/book/api

      - name: Include benchmark dashboard
        run: |
          mkdir -p book/book/bench
          cp -r bench/dashboard/* book/book/bench/ 2>/dev/null || true
          # Data is served live from the bench-data branch via raw.githubusercontent.com
          # — nothing to copy here.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: book/book

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
