name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - "bench/dashboard/**"
      - "crates/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Link check (book + docs + README)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,429
            --max-retries 3
            --exclude 'mailto:'
            --exclude-loopback
            README.md book/src dev-docs docs

      - name: Validate required operational doc sections
        run: python3 scripts/docs/validate_operational_sections.py

      - name: Report stale operational docs
        run: python3 scripts/docs/report_stale_docs.py

      - name: Build mdBook
        run: mdbook build book

      - name: Build rustdoc (public API only)
        run: |
          cargo doc --no-deps \
            -p logfwd \
            -p logfwd-core \
            -p logfwd-config \
            -p logfwd-output \
            -p logfwd-transform
          cp -r target/doc book/book/api

      - name: Include benchmark dashboard
        run: |
          mkdir -p book/book/bench
          cp -r bench/dashboard/* book/book/bench/ 2>/dev/null || true
          # Data is served live from the bench-data branch via raw.githubusercontent.com
          # — nothing to copy here.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
