name: Deploy Docs

on:
  pull_request:
    paths:
      - "crates/**"
      - "tla/**"
      - "book/**"
      - "dev-docs/**"
      - "docs/**"
      - "*.md"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "book/**"
      - "dev-docs/**"
      - "bench/dashboard/**"
      - "crates/**"
      - "tla/**"
      - "docs/**"
      - "*.md"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust
      - run: rustup target add wasm32-unknown-unknown
        shell: bash

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: book/package-lock.json

      - name: Link check (book + docs + README)
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.23.0
          args: >-
            --no-progress
            --accept 200,429,502
            --max-retries 3
            --root-dir .
            --exclude 'mailto:'
            --exclude-loopback
            --exclude '^file:///.*/(architecture|configuration|deployment|development|getting-started|how-it-works|learn|quick-start|troubleshooting)(/|#|$)'
            --exclude '^https://opentelemetry.io/docs/'
            README.md book/src/content/docs dev-docs docs

      - name: Validate required operational doc sections
        run: python3 scripts/docs/validate_operational_sections.py

      - name: Validate research metadata headers
        run: python3 scripts/docs/validate_research_metadata.py

      - name: Validate root markdown allowlist
        run: python3 scripts/docs/validate_root_doc_allowlist.py

      - name: Report stale operational docs
        run: python3 scripts/docs/report_stale_docs.py

      - name: Install doc dependencies
        run: cd book && npm ci

      - name: Build docs (Starlight)
        run: cd book && npm run build

      - name: Build rustdoc (public API only)
        run: |
          cargo doc --no-deps \
            -p ffwd \
            -p ffwd-core \
            -p ffwd-config \
            -p ffwd-output \
            -p ffwd-transform
          cp -r target/doc book/dist/api

      - name: Include benchmark dashboard
        run: |
          mkdir -p book/dist/bench
          cp -r bench/dashboard/* book/dist/bench/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/dist

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
