name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - "bench/dashboard/**"
      - "crates/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mozilla-actions/sccache-action@v0.0.7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build mdBook
        run: mdbook build book

      - name: Build rustdoc (public API only)
        run: |
          cargo doc --no-deps \
            -p logfwd \
            -p logfwd-core \
            -p logfwd-config \
            -p logfwd-output \
            -p logfwd-transform
          cp -r target/doc book/book/api

      - name: Include benchmark dashboard
        run: |
          mkdir -p book/book/bench
          cp -r bench/dashboard/* book/book/bench/ 2>/dev/null || true
          # Create empty data dirs so the dashboard loads without errors.
          mkdir -p book/book/bench/data/runs book/book/bench/data/rate-runs book/book/bench/data/criterion-runs
          echo '{"runs":[]}' > book/book/bench/data/index.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
