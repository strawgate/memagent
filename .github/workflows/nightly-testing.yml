name: Nightly extended testing
on:
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  proptest-extended:
    name: Proptest (100K cases)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - name: Run proptests with 100K cases
        run: |
          cargo test -p logfwd-core --test it -- proptest
          cargo test -p logfwd-io --test it -- proptest
          cargo test -p logfwd-types -- proptest
          cargo test -p logfwd-output -- proptest
        env:
          PROPTEST_CASES: "100000"

  tla-pipeline-nightly-thorough:
    name: TLA+ PipelineMachine (nightly thorough)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: TLC PipelineMachine nightly thorough model
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineMachine.tla
          config: tla/PipelineMachine.nightly.thorough.cfg

  tla-pipeline-nightly-thorough-report:
    permissions:
      contents: read
      issues: write
    name: TLA+ nightly thorough failure report
    needs: tla-pipeline-nightly-thorough
    if: |
      always() &&
      github.event_name == 'schedule' &&
      needs.tla-pipeline-nightly-thorough.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The upstream job's result is 'failure' for any non-zero exit in the
      # run-tlc composite action, which includes real TLC counterexamples
      # AND infra failures (JDK setup, jar download, cache restore).  We
      # can't distinguish without parsing artifacts, so the title/body stay
      # neutral about the cause — first triage step is to open the run URL
      # and see which step in run-tlc turned red.
      #
      # Dedup: a stable title plus a label filter lets us comment on an
      # existing open issue instead of spamming a new one every day while
      # the same regression persists.
      - name: File or update issue on failure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_TITLE: "Nightly TLA+ thorough job failing"
          ISSUE_LABEL: "bug"
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          date_iso="$(date -u +%Y-%m-%d)"

          existing="$(gh issue list \
            --state open \
            --label "$ISSUE_LABEL" \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
            | head -n1)"

          body_file="$(mktemp)"
          if [ -n "$existing" ]; then
            cat >"$body_file" <<EOF
          Recurrence on ${date_iso}: ${run_url}

          Open the run URL to determine whether the cause is a TLC
          counterexample or infrastructure (JDK setup, jar download,
          cache miss).
          EOF
            gh issue comment "$existing" --body-file "$body_file"
          else
            cat >"$body_file" <<EOF
          Nightly TLA+ thorough job failed.

          - Spec: tla/MCPipelineMachine.tla
          - Config: tla/PipelineMachine.nightly.thorough.cfg
          - First observed: ${date_iso}
          - First run: ${run_url}

          The upstream job failed — open the run URL to determine whether
          this is a real TLC counterexample or an infrastructure issue
          (JDK setup, jar download, cache miss).

          If TLC itself failed, reproduce locally:
            just tlc MCPipelineMachine.tla PipelineMachine.nightly.thorough.cfg

          TLC prints the violated invariant / liveness property and the
          state trace just before exiting.  If the run step never reached
          the \`tlc2.TLC\` invocation, the issue is infrastructure — close
          this issue once the underlying transient resolves.  Subsequent
          failures while this issue stays open will be appended as comments
          rather than spawning new issues.
          EOF
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file "$body_file" \
              --label "$ISSUE_LABEL"
          fi

  turmoil-replay-equivalence:
    name: Turmoil replay-equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scripts/linearizability/go.mod
      - name: Replay-equivalence test lane
        run: |
          cargo test -p logfwd --no-default-features --features turmoil --test turmoil_sim fault_scenario_sim::replay_equivalence_seed_supports_three_identical_replays -- --exact
          cargo test -p logfwd --no-default-features --features turmoil --test turmoil_sim fault_scenario_sim::replay_equivalence_seed_matrix_keeps_history_equivalent -- --exact
          cargo test -p logfwd --no-default-features --features turmoil --test turmoil_sim linearizability::porcupine_checker_accepts_runtime_history -- --exact

  turmoil-seed-sweep:
    name: Turmoil seed sweep (1000 seeds, shard ${{ matrix.shard_index }}/4)
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scripts/linearizability/go.mod
      - name: Build turmoil tests once
        run: cargo test -p logfwd --no-default-features --features turmoil --test turmoil_sim --no-run
      - name: Run turmoil tests with shard-assigned seeds
        run: |
          TOTAL_SEEDS=1000
          SHARD_COUNT=4
          SHARD_INDEX=${{ matrix.shard_index }}
          FAIL_DIR=/tmp/turmoil-failures
          FAIL_SEEDS_FILE=/tmp/turmoil_failed_seeds.txt
          mkdir -p "$FAIL_DIR"
          rm -f "$FAIL_SEEDS_FILE"

          # Find the compiled test binary (filter for test targets only)
          BIN=$(cargo test -p logfwd --no-default-features --features turmoil --test turmoil_sim --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and (.target.kind // [] | index("test"))) | .executable' \
            | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: could not find turmoil test binary"
            exit 1
          fi
          echo "Test binary: $BIN"
          echo "Shard ${SHARD_INDEX}/${SHARD_COUNT}: seeds where ((seed-1) % ${SHARD_COUNT}) == ${SHARD_INDEX}"

          FAILED=0
          RUN=0
          for SEED in $(seq 1 "$TOTAL_SEEDS"); do
            if [ $(( (SEED - 1) % SHARD_COUNT )) -ne "$SHARD_INDEX" ]; then
              continue
            fi
            RUN=$((RUN + 1))
            # Use if/else to avoid set -e killing the script on test failure
            result=0
            if ! TURMOIL_SEED=$SEED "$BIN" --test-threads=1 > /tmp/test_out.txt 2>&1; then
              result=1
            fi
            tail -1 /tmp/test_out.txt | grep -q "ok" || result=1
            if [ $result -ne 0 ]; then
              echo "FAILED on shard $SHARD_INDEX seed $SEED"
              # Show last 10 lines for debugging
              tail -10 /tmp/test_out.txt
              cp /tmp/test_out.txt "$FAIL_DIR/seed-${SEED}.log"
              echo "$SEED" >> "$FAIL_SEEDS_FILE"
              FAILED=$((FAILED + 1))
            fi
            # Progress report every 25 seeds in this shard
            if [ $((RUN % 25)) -eq 0 ]; then
              echo "=== Shard $SHARD_INDEX progress: $RUN runs, $FAILED failures ==="
            fi
          done
          echo "=== Shard $SHARD_INDEX results: $FAILED failures out of $RUN runs ==="
          if [ $FAILED -gt 0 ]; then exit 1; fi
      - name: Upload turmoil failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: turmoil-failures-shard-${{ matrix.shard_index }}-${{ github.run_id }}
          path: |
            /tmp/turmoil-failures/
            /tmp/turmoil_failed_seeds.txt
          retention-days: 7
  turmoil-seed-sweep-report:
    permissions:
      contents: read
      issues: write
    name: Turmoil seed sweep failure report
    needs: turmoil-seed-sweep
    if: always() && github.event_name == 'schedule' && needs.turmoil-seed-sweep.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download turmoil shard failure artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: turmoil-failures-shard-*-${{ github.run_id }}
          path: /tmp/turmoil-artifacts
          merge-multiple: false
      - name: Create or update aggregated issue on turmoil seed sweep failure
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          summary_file="$(mktemp)"
          failed_shards=0
          total_fail_count=0

          while IFS= read -r artifact_dir; do
            failed_shards=$((failed_shards + 1))
            artifact_name="$(basename "$artifact_dir")"
            shard="$(printf '%s\n' "$artifact_name" | sed -E 's/^turmoil-failures-shard-([0-9]+)-.*/\1/')"
            fail_seeds_file="$(find "$artifact_dir" -type f -name 'turmoil_failed_seeds.txt' | head -n 1)"

            if [ -n "$fail_seeds_file" ] && [ -f "$fail_seeds_file" ]; then
              fail_count=$(wc -l < "$fail_seeds_file" | tr -d ' ')
              fail_seeds=$(paste -sd, "$fail_seeds_file")
            else
              fail_count=0
              fail_seeds="(none captured)"
            fi

            total_fail_count=$((total_fail_count + fail_count))
            {
              echo "- Shard: ${shard}/4"
              echo "  - Failed seeds (${fail_count}): ${fail_seeds}"
              echo "  - Artifact: ${artifact_name}"
            } >>"$summary_file"
          done < <(find /tmp/turmoil-artifacts -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "$failed_shards" -eq 0 ]; then
            echo "- No shard artifacts captured." >>"$summary_file"
          fi

          # Skip filing an issue when there are no genuine seed failures.
          # If shards failed due to infra/compile errors, total_fail_count and
          # failed_shards will both be zero.
          if [ "$total_fail_count" -eq 0 ] && [ "$failed_shards" -eq 0 ]; then
            echo "No seed failures to report (shards may have failed for infra/compile reasons — check the run URL for details)."
            exit 0
          fi

          # Dedup against a stable title so persistent regressions append
          # comments instead of opening a new issue every night.  Matches the
          # pattern used by tla-pipeline-nightly-thorough-report above.
          issue_title="Nightly turmoil seed sweep failing"
          date_iso="$(date -u +%Y-%m-%d)"
          existing="$(gh issue list \
            --state open \
            --label bug \
            --search "in:title \"$issue_title\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$issue_title\") | .number" \
            | head -n1)"

          body_file="$(mktemp)"
          if [ -n "$existing" ]; then
            cat >"$body_file" <<EOF
          Recurrence on ${date_iso}: ${run_url}

          - Failed shards: ${failed_shards}
          - Total failed seeds: ${total_fail_count}

          $(cat "$summary_file")
          EOF
            gh issue comment "$existing" --body-file "$body_file"
          else
            cat >"$body_file" <<EOF
          Nightly turmoil seed sweep failed.

          - First observed: ${date_iso}
          - First run: ${run_url}
          - Failed shards: ${failed_shards}
          - Total failed seeds: ${total_fail_count}

          $(cat "$summary_file")

          Please investigate and convert any reproductions into deterministic
          tests.  Subsequent failures while this issue stays open will be
          appended as comments rather than spawning new issues.
          EOF
            gh issue create \
              --title "$issue_title" \
              --body-file "$body_file" \
              --label "bug"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  fuzz:
    name: Fuzz (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 5 minutes per target
            duration: 300
            timeout: 60
          - label: 30 minutes per target
            duration: 1800
            timeout: 180
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz
      - name: Run fuzz targets
        run: |
          cd crates/logfwd-core
          for target in $(cargo +nightly fuzz list 2>/dev/null); do
            echo "=== Fuzzing $target for ${{ matrix.duration }}s ==="
            cargo +nightly fuzz run "$target" -- -max_total_time=${{ matrix.duration }}
          done
        env:
          RUSTUP_TOOLCHAIN: nightly
