name: Nightly Benchmarks

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch: # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install tools
        run: |
          curl -sSL https://just.systems/install.sh | bash -s -- --to /usr/local/bin
          cargo install inferno
          sudo apt-get update -qq
          sudo apt-get install -y -qq "linux-tools-$(uname -r)" linux-tools-generic

      - name: Build logfwd (release + dhat variant)
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3"
        run: |
          cargo build --release -p logfwd
          cargo build --release --features dhat-heap -p logfwd
          cp target/release/logfwd target/release/logfwd-dhat
          cargo build --release -p logfwd

      # ---------------------------------------------------------------
      # PGO — profile-guided optimisation for the release binary
      # ---------------------------------------------------------------

      - name: Install LLVM tools for PGO
        run: sudo apt-get install -y -qq llvm

      - name: Build logfwd with PGO instrumentation
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3 -Cprofile-generate=/tmp/pgo-data"
        run: cargo build --release -p logfwd

      - name: Run training workload to generate PGO profiles
        run: >
          just bench-competitive
          --lines 1000000
          --mode binary --cpus 1 --memory 1g
          --scenarios passthrough,json_parse,filter
        env:
          LOGFWD: ./target/release/logfwd

      - name: Merge PGO profile data
        run: llvm-profdata merge -output=/tmp/pgo-data/merged.profdata /tmp/pgo-data/*.profraw

      - name: Rebuild logfwd with PGO profile applied
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3 -Cprofile-use=/tmp/pgo-data/merged.profdata"
        run: |
          cargo build --release -p logfwd
          cp target/release/logfwd target/release/logfwd-pgo

      # ---------------------------------------------------------------
      # Criterion microbenchmarks
      # ---------------------------------------------------------------

      - name: Run criterion microbenchmarks
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3"
        run: just bench

      - name: Generate microbenchmark report
        run: just bench-report > micro_body.md

      # ---------------------------------------------------------------
      # Competitive benchmarks — both binary and Docker modes
      # ---------------------------------------------------------------

      - name: Run competitive benchmarks
        run: >
          just bench-competitive
          --lines 5000000
          --mode both --cpus 1 --memory 1g
          --scenarios passthrough,json_parse,filter
          --markdown
          --json-file bench-result.json
          --gh-bench-file gh-bench.json
          --profile "$PWD/profiles"
          --dhat-binary "$PWD/target/release/logfwd-dhat"
          > competitive_body.md
        env:
          LOGFWD: ./target/release/logfwd

      - name: Run PGO competitive benchmarks (delta report)
        run: >
          just bench-competitive
          --lines 5000000
          --mode binary --cpus 1 --memory 1g
          --scenarios passthrough,json_parse,filter
          --markdown
          --json-file bench-result-pgo.json
          > competitive_pgo_body.md
        env:
          LOGFWD: ./target/release/logfwd-pgo

      # ---------------------------------------------------------------
      # Upload artifacts
      # ---------------------------------------------------------------

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-result-${{ github.run_number }}
          path: |
            bench-result.json
            bench-result-pgo.json
            gh-bench.json
          retention-days: 90

      - name: Upload profiles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logfwd-profiles-${{ github.run_number }}
          path: |
            profiles/flamegraph.svg
            profiles/dhat-heap.json
            profiles/perf.data
          retention-days: 30

      # ---------------------------------------------------------------
      # Dashboard via github-action-benchmark
      # ---------------------------------------------------------------

      - name: Publish to benchmark dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Competitive Benchmarks
          tool: customBiggerIsBetter
          output-file-path: gh-bench.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true

      # ---------------------------------------------------------------
      # Post results as GitHub issue
      # ---------------------------------------------------------------

      - name: Post issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)

          TITLE="Benchmark results ${DATE} (${COMMIT})"
          BODY="$(cat <<HEREDOC
          ## Benchmark Results --- ${DATE}

          **Commit:** \`${COMMIT}\` on \`master\`
          **Runner:** \`ubuntu-latest\`
          **Dashboard:** https://strawgate.github.io/memagent/dev/bench/

          ---

          $(cat competitive_body.md)

          ---

          ### PGO delta (profile-guided optimisation vs standard release)

          $(cat competitive_pgo_body.md)

          ---

          $(cat micro_body.md)

          ---

          CPU flamegraph and dhat-heap memory profile uploaded as workflow artifacts.

          <sub>Generated by [nightly bench workflow](.github/workflows/bench.yml)</sub>
          HEREDOC
          )"

          # Close previous nightly bench issues to avoid clutter.
          gh issue list --label benchmark --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new benchmark run." 2>/dev/null || true
          done

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label benchmark
