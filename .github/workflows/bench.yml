name: Nightly Benchmarks

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      lines:
        description: "Number of log lines per benchmark"
        default: "5000000"
        type: string
      iterations:
        description: "Iterations per agent/scenario"
        default: "3"
        type: string
      scenarios:
        description: "Comma-separated scenarios"
        default: "passthrough,json_parse,filter"
        type: string
      agents:
        description: "Comma-separated agents (blank = all)"
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: write

env:
  LINES: ${{ inputs.lines || '5000000' }}
  ITERATIONS: ${{ inputs.iterations || '3' }}
  SCENARIOS: ${{ inputs.scenarios || 'passthrough,json_parse,filter' }}
  AGENTS_INPUT: ${{ inputs.agents || '' }}

jobs:
  # -------------------------------------------------------------------
  # Build logfwd and the benchmark harness
  # -------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build logfwd + bench harness
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3"
        run: |
          cargo build --release -p logfwd
          cargo build --release -p logfwd-competitive-bench
          cargo build --release --features dhat-heap -p logfwd
          cp target/release/logfwd target/release/logfwd-dhat
          cargo build --release -p logfwd

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: bench-binaries
          path: |
            target/release/logfwd
            target/release/logfwd-dhat
            target/release/logfwd-competitive-bench
          retention-days: 1

  # -------------------------------------------------------------------
  # Generate the matrix dynamically from inputs
  # -------------------------------------------------------------------
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          # Convert comma-separated scenarios to JSON array.
          SCENARIOS="${{ env.SCENARIOS }}"
          SCENARIO_JSON=$(echo "$SCENARIOS" | tr ',' '\n' | jq -R . | jq -sc .)

          # Agent list: use input or default to all 6.
          AGENTS="${{ env.AGENTS_INPUT }}"
          if [ -z "$AGENTS" ]; then
            AGENTS="logfwd,vector,fluent-bit,filebeat,otelcol,vlagent"
          fi
          AGENT_JSON=$(echo "$AGENTS" | tr ',' '\n' | jq -R . | jq -sc .)

          # Build matrix JSON.
          MATRIX=$(jq -nc \
            --argjson scenarios "$SCENARIO_JSON" \
            --argjson agents "$AGENT_JSON" \
            '{scenario: $scenarios, agent: $agents}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: $MATRIX"

  # -------------------------------------------------------------------
  # Criterion microbenchmarks (runs in parallel with matrix)
  # -------------------------------------------------------------------
  micro:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run criterion microbenchmarks
        env:
          RUSTFLAGS: "-Ctarget-cpu=x86-64-v3"
        run: cargo bench -p logfwd-bench 2>&1 | tee micro_body.md || true

      - name: Upload micro results
        uses: actions/upload-artifact@v4
        with:
          name: micro-results
          path: micro_body.md
          retention-days: 7

  # -------------------------------------------------------------------
  # Per-agent/scenario benchmark cells (parallel matrix)
  # -------------------------------------------------------------------
  bench:
    runs-on: ubuntu-latest
    needs: [build, matrix-setup]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Download bench binaries
        uses: actions/download-artifact@v4
        with:
          name: bench-binaries
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Run benchmark cell
        run: |
          AGENT_FLAG=""
          if [ "${{ matrix.agent }}" != "" ]; then
            AGENT_FLAG="--agents ${{ matrix.agent }}"
          fi
          bin/logfwd-competitive-bench \
            --lines ${{ env.LINES }} \
            --iterations ${{ env.ITERATIONS }} \
            --scenarios ${{ matrix.scenario }} \
            $AGENT_FLAG \
            --mode binary \
            --results-file results.jsonl \
            --markdown \
            > cell_body.md
        env:
          LOGFWD: ./bin/logfwd

      - name: Upload cell results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.agent }}-${{ matrix.scenario }}
          path: |
            results.jsonl
            cell_body.md
          retention-days: 7

  # -------------------------------------------------------------------
  # Profile logfwd (separate job, not in matrix)
  # -------------------------------------------------------------------
  profile:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install profiling tools
        run: |
          cargo install inferno 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq "linux-tools-$(uname -r)" linux-tools-generic 2>/dev/null || true

      - name: Download bench binaries
        uses: actions/download-artifact@v4
        with:
          name: bench-binaries
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Run profiling pass
        run: |
          mkdir -p profiles
          bin/logfwd-competitive-bench \
            --lines ${{ env.LINES }} \
            --agents logfwd \
            --scenarios passthrough \
            --mode binary \
            --profile ./profiles \
            --dhat-binary ./bin/logfwd-dhat
        env:
          LOGFWD: ./bin/logfwd

      - name: Upload profiles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logfwd-profiles
          path: |
            profiles/flamegraph.svg
            profiles/dhat-heap.json
            profiles/perf.data
          retention-days: 30

  # -------------------------------------------------------------------
  # Summarize: aggregate all matrix results into reports
  # -------------------------------------------------------------------
  summarize:
    runs-on: ubuntu-latest
    needs: [build, bench, micro]
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - name: Download all bench results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results
          merge-multiple: false

      - name: Download bench binary
        uses: actions/download-artifact@v4
        with:
          name: bench-binaries
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Download micro results
        uses: actions/download-artifact@v4
        with:
          name: micro-results
          path: micro
        continue-on-error: true

      - name: Summarize results
        run: |
          bin/logfwd-competitive-bench summarize \
            --results-dir all-results \
            --markdown \
            --gh-bench-file gh-bench.json \
            --dashboard-file dashboard-data.json \
            > competitive_body.md
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload summary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary-${{ github.run_number }}
          path: |
            competitive_body.md
            gh-bench.json
            gh-bench-efficiency.json
            dashboard-data.json
          retention-days: 90

      # -----------------------------------------------------------
      # Publish throughput chart (benchmark-action auto-chart)
      # -----------------------------------------------------------

      - name: Publish throughput chart
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Throughput
          tool: customBiggerIsBetter
          output-file-path: gh-bench.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/throughput
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true

      - name: Publish efficiency chart
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Efficiency
          tool: customSmallerIsBetter
          output-file-path: gh-bench-efficiency.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/efficiency
          auto-push: true

      # -----------------------------------------------------------
      # Publish custom dashboard data to gh-pages
      # -----------------------------------------------------------

      - name: Publish dashboard data
        run: |
          RUN_ID="${{ github.run_id }}"

          # Clone gh-pages branch.
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-checkout

          # Write run data.
          mkdir -p gh-pages-checkout/data/runs
          cp dashboard-data.json "gh-pages-checkout/data/runs/${RUN_ID}.json"

          # Update index.json — merge new entry, sort by date desc.
          python3 -c "
          import json, sys
          index_path = 'gh-pages-checkout/data/index.json'
          try:
              with open(index_path) as f:
                  index = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              index = {'runs': []}

          with open('dashboard-index-entry.json') as f:
              entry = json.load(f)

          # Remove any existing entry with same ID.
          index['runs'] = [r for r in index['runs'] if r.get('id') != entry['id']]
          index['runs'].append(entry)
          index['runs'].sort(key=lambda r: r.get('date', ''), reverse=True)

          # Keep last 90 runs max.
          index['runs'] = index['runs'][:90]

          with open(index_path, 'w') as f:
              json.dump(index, f, indent=2)
          "

          # Commit and push.
          cd gh-pages-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add benchmark data for run ${RUN_ID}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------
      # Post results as GitHub issue
      # -----------------------------------------------------------

      - name: Post issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)
          MICRO=""
          if [ -f micro/micro_body.md ]; then
            MICRO="---

          $(cat micro/micro_body.md)"
          fi

          TITLE="Benchmark results ${DATE} (${COMMIT})"
          BODY="$(cat <<HEREDOC
          ## Benchmark Results --- ${DATE}

          **Commit:** \`${COMMIT}\` on \`master\`
          **Runner:** \`ubuntu-latest\` (matrix: agent x scenario)
          **Iterations:** ${{ env.ITERATIONS }} per cell
          **Dashboard:** https://strawgate.com/memagent/

          ---

          $(cat competitive_body.md)

          ${MICRO}

          ---

          CPU flamegraph and dhat-heap memory profile uploaded as workflow artifacts.

          <sub>Generated by [nightly bench workflow](.github/workflows/bench.yml)</sub>
          HEREDOC
          )"

          # Close previous nightly bench issues to avoid clutter.
          gh issue list --label benchmark --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new benchmark run." 2>/dev/null || true
          done

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label benchmark
