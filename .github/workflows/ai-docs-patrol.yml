name: "AI: Docs Patrol"
on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-docs-patrol.lock.yml@main
    with:
      title-prefix: "[docs-patrol]"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
