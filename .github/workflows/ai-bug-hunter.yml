name: "AI: Bug Hunter"
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-bug-hunter.lock.yml@main
    with:
      title-prefix: "[bug-hunter]"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
