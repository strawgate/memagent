name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # -----------------------------------------------------------------------
  # Build the ff binary for each supported target platform.
  # Linux targets are built with musl for fully static binaries.
  # macOS targets are built on the native runners.
  # -----------------------------------------------------------------------
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ff-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ff-linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: ff-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ff-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: ./.github/actions/setup-rust
      - run: rustup target add ${{ matrix.target }}
        shell: bash

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release -p ffwd --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release -p ffwd --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ff ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Create the GitHub Release and attach the binary artifacts.
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # -----------------------------------------------------------------------
  # Build and push a multi-arch Docker image to ghcr.io.
  # Tags pushed: latest, v0.x.y, v0.x, <commit-sha>
  # -----------------------------------------------------------------------
  docker:
    name: Docker (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
