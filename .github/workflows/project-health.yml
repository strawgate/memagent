name: Project Health

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: read
  pull-requests: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # ── GitHub repo stats (stars, forks, issues, velocity, languages, etc.) ──
      - uses: strawgate/octo11y/actions/repo-stats@main-dist
        id: stats
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          scenario: project-health
          metrics: >-
            stars, forks, open-issues, open-prs, contributors, releases,
            watchers, workflow-success-pct,
            weekly-commits, weekly-additions, weekly-deletions,
            avg-issue-close-days, median-issue-close-days,
            avg-pr-merge-hours, median-pr-merge-hours,
            languages

      # ── Start OTLP collector for custom metrics ──
      - uses: strawgate/octo11y/actions/monitor@main-dist
        id: monitor

      # ── Lines of code (via tokei) ──
      - name: Count lines of code
        run: |
          cargo install --locked tokei --version 14.0.0 --root /tmp/tokei
          JSON=$(/tmp/tokei/bin/tokei --output json)
          echo "TOTAL_LOC=$(echo "$JSON" | jq '.Total.code')" >> "$GITHUB_ENV"
          echo "RUST_LOC=$(echo "$JSON" | jq '.Rust.code // 0')" >> "$GITHUB_ENV"

      - uses: strawgate/octo11y/actions/emit-metric@main-dist
        with:
          otlp-http-endpoint: ${{ steps.monitor.outputs.otlp-http-endpoint }}
          name: total_lines_of_code
          value: ${{ env.TOTAL_LOC }}
          unit: lines
          scenario: project-health
          direction: bigger_is_better

      - uses: strawgate/octo11y/actions/emit-metric@main-dist
        with:
          otlp-http-endpoint: ${{ steps.monitor.outputs.otlp-http-endpoint }}
          name: rust_lines_of_code
          value: ${{ env.RUST_LOC }}
          unit: lines
          scenario: project-health
          direction: bigger_is_better

      # ── Rust crate count (workspace members) ──
      - name: Count Rust crates
        run: |
          CRATE_COUNT=$(cargo metadata --no-deps --format-version 1 | jq '.packages | length')
          echo "CRATE_COUNT=$CRATE_COUNT" >> "$GITHUB_ENV"

      - uses: strawgate/octo11y/actions/emit-metric@main-dist
        with:
          otlp-http-endpoint: ${{ steps.monitor.outputs.otlp-http-endpoint }}
          name: rust_crate_count
          value: ${{ env.CRATE_COUNT }}
          unit: crates
          scenario: project-health
          direction: bigger_is_better

      # ── CI build time (avg of last 10 successful CI runs) ──
      - name: Measure CI build time
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AVG_SECS=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?per_page=10&status=success" \
            --jq '
              [.workflow_runs[]
                | select(.run_started_at != null)
                | ((.updated_at | fromdateiso8601) - (.run_started_at | fromdateiso8601))
              ] | if length > 0 then (add / length | round) else 0 end
            ')
          echo "CI_BUILD_SECS=${AVG_SECS}" >> "$GITHUB_ENV"

      - uses: strawgate/octo11y/actions/emit-metric@main-dist
        with:
          otlp-http-endpoint: ${{ steps.monitor.outputs.otlp-http-endpoint }}
          name: ci_build_duration_seconds
          value: ${{ env.CI_BUILD_SECS }}
          unit: seconds
          scenario: project-health
          direction: smaller_is_better

      # ── Dependency count ──
      - name: Count dependencies
        run: |
          DEP_COUNT=$(grep -c '^\[\[package\]\]' Cargo.lock 2>/dev/null || echo 0)
          echo "DEP_COUNT=$DEP_COUNT" >> "$GITHUB_ENV"

      - uses: strawgate/octo11y/actions/emit-metric@main-dist
        with:
          otlp-http-endpoint: ${{ steps.monitor.outputs.otlp-http-endpoint }}
          name: cargo_dependency_count
          value: ${{ env.DEP_COUNT }}
          unit: packages
          scenario: project-health
          direction: smaller_is_better

      # ── Stash repo-stats + custom metrics together, then aggregate ──
      - uses: strawgate/octo11y/actions/stash@main-dist
        with:
          results: ${{ steps.stats.outputs.results-file }}
          format: otlp
          metrics-dir: ${{ steps.monitor.outputs.metrics-dir }}

      - uses: strawgate/octo11y/actions/aggregate@main-dist
