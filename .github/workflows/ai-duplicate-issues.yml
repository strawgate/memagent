name: "AI: Duplicate Issue Detector"
on:
  issues:
    types: [opened]
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-duplicate-issue-detector.lock.yml@main
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
