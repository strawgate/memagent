name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # needed by dorny/paths-filter to list changed files on bot PRs

# Tool versions — bump these to upgrade across all jobs.
env:
  TAPLO_VERSION: "0.10.0"
  CARGO_DENY_VERSION: "0.19.0"
  # CI runners have 4 vCPU — use all of them.
  CARGO_BUILD_JOBS: "4"
  NEXTEST_TEST_THREADS: "4"
  RUST_TEST_THREADS: "4"
  TOKIO_WORKER_THREADS: "4"
  RAYON_NUM_THREADS: "4"

jobs:
  # -------------------------------------------------------------------------
  # Path filter — determine which crates changed (used to scope expensive jobs)
  # -------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      core_no_std: ${{ steps.filter.outputs.core_no_std }}
      kani_required: ${{ steps.filter.outputs.kani_required }}
      tla: ${{ steps.filter.outputs.tla }}
      frontend: ${{ steps.filter.outputs.frontend }}
      miri: ${{ steps.filter.outputs.miri }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c
        id: filter
        with:
          filters: |
            core:
              - 'crates/logfwd-core/**'
            core_no_std:
              - 'crates/logfwd-core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            kani_required:
              - 'crates/logfwd-core/**'
              - 'crates/logfwd-arrow/**'
              - 'crates/logfwd-types/**'
              - 'crates/logfwd-io/**'
              - 'crates/logfwd-output/**'
              - 'crates/logfwd-runtime/**'
              - 'crates/logfwd-diagnostics/**'
              - 'crates/logfwd/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dev-docs/verification/kani-boundary-contract.toml'
              - 'scripts/verify_kani_boundary_contract.py'
              - '.github/workflows/ci.yml'
            tla:
              - 'tla/**'
              - 'crates/logfwd-types/src/pipeline/**'
              - 'crates/logfwd-runtime/src/pipeline/**'
              - 'crates/logfwd-io/src/tail/**'
              - 'crates/logfwd-runtime/src/worker_pool/**'
              - 'scripts/verify_tla_coverage.py'
              - '.github/workflows/ci.yml'
            frontend:
              - 'dashboard/**'
              - '.github/actions/build-dashboard/**'
            miri:
              - 'crates/logfwd-core/**'
              - 'crates/logfwd-types/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'

  # -------------------------------------------------------------------------
  # Frontend checks — format, lint, typecheck in one job (single npm install)
  # -------------------------------------------------------------------------
  frontend-checks:
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci

      - name: biome format check
        run: npx biome check .

      - name: oxlint
        run: npx oxlint .

      - uses: actions/cache@v5
        with:
          path: dashboard/tsconfig.tsbuildinfo
          key: tsc-${{ hashFiles('dashboard/src/**/*.ts', 'dashboard/src/**/*.tsx', 'dashboard/tsconfig.app.json') }}
      - name: typecheck
        run: npx tsgo --noEmit

  # -------------------------------------------------------------------------
  # Frontend tests — vitest with coverage
  # -------------------------------------------------------------------------
  frontend-test:
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: vitest
        run: npx vitest run --coverage
      - name: upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: dashboard/coverage/

  # -------------------------------------------------------------------------
  # Lint: fast checks (fmt, TOML, typos, actionlint) then clippy + audits.
  # Combined into one job to save a runner — fast checks fail-fast before
  # the expensive clippy build starts.
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # needed by rustsec/audit-check@v2 to create check run annotations
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard


      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Install taplo
        run: |
          curl -sSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gunzip > /usr/local/bin/taplo && chmod +x /usr/local/bin/taplo

      - name: TOML check
        run: taplo check

      - name: Workspace inheritance guardrail
        run: python3 scripts/check_workspace_inherited_default_features.py

      - name: Typos
        uses: crate-ci/typos@v1

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Actionlint
        run: ./actionlint

      - name: Source file length guardrail
        run: python3 scripts/check_max_source_lines.py

      - name: No raw payload injection guardrail
        run: python3 scripts/check_no_raw_payload_injection.py

      # --- Expensive steps below — only reached if fast checks pass ---

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        run: |
          curl -sSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp && mv /tmp/cargo-deny-*/cargo-deny /usr/local/bin/

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Rustdoc warnings check
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Dependency audit (licenses / bans / advisories)
        run: cargo deny check

      - name: Install cargo-machete
        run: |
          curl -fsSL "https://github.com/bnjbvr/cargo-machete/releases/download/v0.9.1/cargo-machete-v0.9.1-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp && mv /tmp/cargo-machete-*/cargo-machete /usr/local/bin/

      - name: Unused dependencies check
        run: cargo machete

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}
          args: "--deny=vuln --deny=unsound --deny=yanked"

  # -------------------------------------------------------------------------
  # Verification guardrail — fail fast when the non-core Kani boundary
  # contract drifts so PRs get a dedicated blocking signal.
  # -------------------------------------------------------------------------
  verification-guardrail:
    name: Verification guardrail
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python for Kani boundary contract
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Kani boundary contract
        run: python3 scripts/verify_kani_boundary_contract.py
      - name: TLC matrix contract
        run: python3 scripts/verify_tlc_matrix_contract.py
      - name: Proptest regression policy
        run: python3 scripts/verify_proptest_regressions.py
      - name: Verification trigger contract
        run: python3 scripts/verify_verification_trigger_contract.py

  # -------------------------------------------------------------------------
  # Tests — Linux and macOS in parallel
  # -------------------------------------------------------------------------
  test-linux:
    name: Test (Linux)
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Tests
        run: cargo nextest run --workspace --profile ci

  test-macos:
    name: Test (macOS)
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Tests
        run: cargo nextest run --workspace --profile ci

  # -------------------------------------------------------------------------
  # Network integration tests — #[ignore] tests that bind ports / make
  # HTTP calls.  Runs after the main test job to reuse the build cache.
  # -------------------------------------------------------------------------
  test-network:
    name: Test (network integration)
    needs: [test-linux]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Network integration tests
        run: |
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored ignored-only --test it transport_e2e
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored ignored-only --lib otap_receiver::tests::
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored ignored-only --lib otlp_receiver::tests:: -- --skip bench_writer_helpers_fast_vs_simple
          cargo nextest run --no-tests fail -p logfwd-diagnostics --profile ci --run-ignored ignored-only --lib diagnostics::server::tests::

  # -------------------------------------------------------------------------
  # Build check — aarch64 cross-compile only (release check removed:
  # clippy already does a full debug build that catches the same errors)
  # -------------------------------------------------------------------------
  build-check:
    name: Build check (aarch64)
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard


      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: aarch64

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Check
        run: cargo check --workspace --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  # -------------------------------------------------------------------------
  # logfwd-core no_std contract
  # -------------------------------------------------------------------------
  core-no-std:
    name: logfwd-core no_std
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.core_no_std == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: core-no-std

      - name: Build logfwd-core for thumbv6m-none-eabi
        run: cargo build -p logfwd-core --target thumbv6m-none-eabi

  # -------------------------------------------------------------------------
  # Kani formal verification — single job running all proofs.
  # kissat solver annotations on slow proofs keep total runtime within budget.
  # -------------------------------------------------------------------------
  kani:
    name: Kani proofs
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.kani_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: kani

      - name: Run Kani verification
        uses: model-checking/kani-github-action@v1
        with:
          args: >-
            -p logfwd-core
            -p logfwd-arrow
            -p logfwd-types
            -p logfwd-io
            -p logfwd-output
            -p logfwd-runtime
            -p logfwd-diagnostics
            -p logfwd
            -Z function-contracts -Z mem-predicates -Z stubbing
        env:
          RUSTC_WRAPPER: ""

  # -------------------------------------------------------------------------
  # Miri — UB-oriented execution for proof-heavy pure crates.
  # -------------------------------------------------------------------------
  miri:
    name: Miri
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.miri == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: miri

      - name: Set up Miri
        run: cargo +nightly miri setup
        env:
          RUSTC_WRAPPER: ""

      - name: Run Miri test suite
        run: |
          cargo +nightly miri test -p logfwd-core --lib
          cargo +nightly miri test -p logfwd-types --lib
        env:
          RUSTC_WRAPPER: ""
          MIRIFLAGS: "-Zmiri-strict-provenance"
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"

  # -------------------------------------------------------------------------
  # Turmoil deterministic simulation
  # -------------------------------------------------------------------------
  turmoil:
    name: Turmoil simulation
    needs: [changes]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Turmoil simulation tests
        run: cargo test -p logfwd --features turmoil --test turmoil_sim

  # -------------------------------------------------------------------------
  # Loom deterministic concurrency seam checks
  # -------------------------------------------------------------------------
  loom:
    name: Loom seam checks
    needs: [changes]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Loom seam test
        run: cargo test -p logfwd-runtime --lib --features loom-tests loom_worker_removal_vs_late_event_model_never_resurrects_slot

  # -------------------------------------------------------------------------
  # TLC: TLA+ model checking for all specs (parallelized via matrix)
  # -------------------------------------------------------------------------
  tlc:
    name: "TLA+ ${{ matrix.spec }} (${{ matrix.property }})"
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: PipelineMachine
            tla_file: tla/MCPipelineMachine.tla
            config: tla/PipelineMachine.cfg
            property: safety
          - spec: PipelineMachine
            tla_file: tla/MCPipelineMachine.tla
            config: tla/PipelineMachine.liveness.cfg
            property: liveness
          - spec: ShutdownProtocol
            tla_file: tla/MCShutdownProtocol.tla
            config: tla/ShutdownProtocol.cfg
            property: safety
          - spec: ShutdownProtocol
            tla_file: tla/MCShutdownProtocol.tla
            config: tla/ShutdownProtocol.liveness.cfg
            property: liveness
          - spec: PipelineBatch
            tla_file: tla/MCPipelineBatch.tla
            config: tla/PipelineBatch.cfg
            property: safety
          - spec: PipelineBatch
            tla_file: tla/MCPipelineBatch.tla
            config: tla/PipelineBatch.liveness.cfg
            property: liveness
          - spec: TailLifecycle
            tla_file: tla/MCTailLifecycle.tla
            config: tla/TailLifecycle.cfg
            property: safety
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download tla2tools.jar
        run: |
          mkdir -p /tmp/tla
          curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o /tmp/tla/tla2tools.jar

      - name: "TLC: ${{ matrix.spec }} — ${{ matrix.property }}"
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC ${{ matrix.tla_file }} -config ${{ matrix.config }} -workers auto

  # -------------------------------------------------------------------------
  # TLC reachability / vacuity guards — coverage configs are expected to
  # produce witness traces via invariant violations, so they need a dedicated
  # harness rather than the normal "exit 0 means success" flow.
  # -------------------------------------------------------------------------
  tlc-coverage:
    name: "TLA+ ${{ matrix.spec }} (coverage)"
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: PipelineMachine
            tla_file: tla/MCPipelineMachine.tla
            config: tla/PipelineMachine.coverage.cfg
          - spec: ShutdownProtocol
            tla_file: tla/MCShutdownProtocol.tla
            config: tla/ShutdownProtocol.coverage.cfg
          - spec: PipelineBatch
            tla_file: tla/MCPipelineBatch.tla
            config: tla/PipelineBatch.coverage.cfg
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download tla2tools.jar
        run: |
          mkdir -p /tmp/tla
          curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o /tmp/tla/tla2tools.jar

      - name: "TLC coverage: ${{ matrix.spec }}"
        run: |
          python3 scripts/verify_tla_coverage.py \
            --jar /tmp/tla/tla2tools.jar \
            --tla-file ${{ matrix.tla_file }} \
            --config ${{ matrix.config }}

  # -------------------------------------------------------------------------
  # Thorough TLC safety model — deeper pre-merge sweep for the main lifecycle spec.
  # -------------------------------------------------------------------------
  tlc-thorough:
    name: "TLA+ PipelineMachine (thorough)"
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download tla2tools.jar
        run: |
          mkdir -p /tmp/tla
          curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o /tmp/tla/tla2tools.jar

      - name: "TLC: PipelineMachine — thorough"
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCPipelineMachine.tla -config tla/PipelineMachine.thorough.cfg -workers auto

  # -------------------------------------------------------------------------
  # Coverage — workspace code coverage via llvm-cov
  # -------------------------------------------------------------------------
  coverage:
    name: Code Coverage
    needs: [test-linux]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Generate workspace coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info --profile ci

      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir htmlcov

      - name: Generate Coverage Summary
        run: cargo llvm-cov report --summary-only > coverage-summary.txt

      - name: Write to Job Summary
        run: |
          {
            echo "## Code Coverage Summary"
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-html
          path: htmlcov/

      - name: Upload LCOV artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-lcov
          path: lcov.info

  # -------------------------------------------------------------------------
  # Conclusion — single required status check for branch protection.
  # Pattern from rust-analyzer and cargo: set ONE required check
  # ("conclusion") instead of maintaining a list of individual job names.
  # -------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: ${{ always() && !cancelled() }}
    needs:
      - changes
      - frontend-checks
      - frontend-test
      - verification-guardrail
      - lint
      - test-linux
      - test-macos
      - test-network
      - build-check
      - core-no-std
      - kani
      - miri
      - turmoil
      - loom
      - tlc
      - tlc-coverage
      - tlc-thorough
    runs-on: ubuntu-latest
    steps:
      - run: |
          jq -C <<< '${{ toJson(needs) }}'
          jq --exit-status 'all(.result == "success" or .result == "skipped")' \
            <<< '${{ toJson(needs) }}'
