name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # needed by dorny/paths-filter to list changed files on bot PRs

# Tool versions — bump these to upgrade across all jobs.
env:
  TAPLO_VERSION: "0.10.0"
  CARGO_DENY_VERSION: "0.19.0"
  CARGO_MACHETE_VERSION: "0.9.1"
  # CI runners have 4 vCPU — use all of them.
  CARGO_BUILD_JOBS: "4"
  NEXTEST_TEST_THREADS: "4"
  RUST_TEST_THREADS: "4"
  LOGFWD_DISABLE_DEFAULT_CHECKPOINTS: "1"
  TOKIO_WORKER_THREADS: "4"
  RAYON_NUM_THREADS: "4"
  # Disable sccache in CI — config.toml enables it for local dev builds.
  RUSTC_WRAPPER: ""

jobs:
  # -------------------------------------------------------------------------
  # Path filter — determine which crates changed (used to scope expensive jobs)
  # -------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      kani_required: ${{ steps.filter.outputs.kani_required }}
      tla: ${{ steps.filter.outputs.tla }}
      frontend: ${{ steps.filter.outputs.frontend }}
      miri: ${{ steps.filter.outputs.miri }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@f3ceefdc7ef57bc2d8560787d4b6c33e44044cec
        id: filter
        with:
          filters: |
            kani_required:
              - 'crates/logfwd-kani/**'
              - 'crates/logfwd-core/**'
              - 'crates/logfwd-arrow/**'
              - 'crates/logfwd-types/**'
              - 'crates/logfwd-io/**'
              - 'crates/logfwd-output/**'
              - 'crates/logfwd-runtime/**'
              - 'crates/logfwd-diagnostics/**'
              - 'crates/logfwd/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dev-docs/verification/kani-boundary-contract.toml'
              - 'scripts/verify_kani_boundary_contract.py'
              - '.github/workflows/ci.yml'
            tla:
              - 'tla/**'
              - 'crates/logfwd-types/src/pipeline/**'
              - 'crates/logfwd-runtime/src/pipeline/**'
              - 'crates/logfwd-io/src/tail/**'
              - 'crates/logfwd-runtime/src/worker_pool/**'
              - 'crates/logfwd-output/src/sink.rs'
              - 'crates/logfwd-output/src/sink/**'
              - 'scripts/verify_tla_coverage.py'
              - '.github/actions/run-tlc/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'dashboard/**'
              - '.github/actions/build-dashboard/**'
            miri:
              - 'crates/logfwd-core/**'
              - 'crates/logfwd-types/**'
              - 'crates/logfwd-io/src/framed.rs'
              - 'crates/logfwd-io/src/format.rs'
              - 'crates/logfwd-io/src/input.rs'
              - 'crates/logfwd-io/tests/it/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  # -------------------------------------------------------------------------
  # Frontend — format, lint, typecheck, and tests in one job
  # -------------------------------------------------------------------------
  frontend:
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci

      - name: biome format check
        run: npx biome check .

      - name: oxlint
        run: npx oxlint .

      - uses: actions/cache@v5
        with:
          path: dashboard/tsconfig.tsbuildinfo
          key: tsc-${{ hashFiles('dashboard/src/**/*.ts', 'dashboard/src/**/*.tsx', 'dashboard/tsconfig.app.json') }}
      - name: typecheck
        run: npx tsgo --noEmit

      - name: vitest
        run: npx vitest run --coverage
      - name: upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: dashboard/coverage/

  # -------------------------------------------------------------------------
  # Lint: fast checks (fmt, TOML, typos, actionlint) then clippy + audits.
  # Combined into one job to save a runner — fast checks fail-fast before
  # the expensive clippy build starts.
  # Always runs on non-draft PRs (no path filter) — acts as a fast gate.
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    if: |
      github.event_name == 'push' ||
      github.event.pull_request.draft == false ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write  # needed by rustsec/audit-check@v2 to create check run annotations
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust

      - name: Xtask structural verification
        run: cargo xtask verify

      - name: Format check
        run: cargo fmt --check

      - name: Install taplo
        run: |
          curl -sSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gunzip > /usr/local/bin/taplo && chmod +x /usr/local/bin/taplo

      - name: TOML check
        run: taplo check

      - name: Workspace inheritance guardrail
        run: python3 scripts/check_workspace_inherited_default_features.py

      - name: Typos
        uses: crate-ci/typos@v1

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Actionlint
        run: ./actionlint

      - name: Source file length guardrail
        run: python3 scripts/check_max_source_lines.py

      - name: No raw payload injection guardrail
        run: python3 scripts/check_no_raw_payload_injection.py

      - name: Set up Python for verification scripts
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Kani boundary contract
        run: python3 scripts/verify_kani_boundary_contract.py
      - name: TLC matrix contract
        run: python3 scripts/verify_tlc_matrix_contract.py
      - name: Proptest regression policy
        run: python3 scripts/verify_proptest_regressions.py
      - name: Verification trigger contract
        run: python3 scripts/verify_verification_trigger_contract.py

      # --- Expensive steps below — only reached if fast checks pass ---

      - name: Install cargo-deny
        run: |
          curl -sSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp && mv /tmp/cargo-deny-*/cargo-deny /usr/local/bin/

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Rustdoc warnings check
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Dependency audit (licenses / bans / advisories)
        run: cargo deny check

      - name: Install cargo-machete
        run: |
          curl -fsSL "https://github.com/bnjbvr/cargo-machete/releases/download/v${CARGO_MACHETE_VERSION}/cargo-machete-v${CARGO_MACHETE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp && mv /tmp/cargo-machete-*/cargo-machete /usr/local/bin/

      - name: Unused dependencies check
        run: cargo machete

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}
          args: "--deny=vuln --deny=unsound --deny=yanked"

  # -------------------------------------------------------------------------
  # Tests — Linux and macOS in parallel
  # -------------------------------------------------------------------------
  test-linux:
    name: Test (Linux)
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest

      - name: Tests
        run: cargo nextest run --workspace --profile ci

  # macOS: push + ci:full only (expensive runner, no path filter or draft check).
  # Exclude Linux-only eBPF crates (aya does not compile on macOS).
  test-macos:
    name: Test (macOS)
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci:full')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest

      - name: Tests
        run: >-
          cargo nextest run --workspace --profile ci
          --exclude sensor-ebpf
          --exclude sensor-ebpf-common

  # -------------------------------------------------------------------------
  # Network integration tests — #[ignore] tests that bind ports / make
  # HTTP calls.  Runs after the main test job to reuse the build cache.
  # Non-draft PRs only (no path filter); depends on test-linux for cache.
  # -------------------------------------------------------------------------
  test-network:
    name: Test (network integration)
    needs: [test-linux]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@nextest

      - name: Network integration tests
        run: |
          # `transport_e2e` tests may be ignored or non-ignored depending on harness evolution.
          # Run both to avoid false "no tests to run" failures while still failing on real test errors.
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored all --test it transport_e2e
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored all --lib otap_receiver::tests::
          cargo nextest run --no-tests fail -p logfwd-io --profile ci --run-ignored all --lib otlp_receiver::tests:: -- --skip bench_writer_helpers_fast_vs_simple
          cargo nextest run --no-tests fail -p logfwd-diagnostics --profile ci --run-ignored all --lib diagnostics::server::tests::

  # -------------------------------------------------------------------------
  # Cross-compilation checks — aarch64 workspace + thumbv6m no_std
  # -------------------------------------------------------------------------
  cross-check:
    name: Cross-compilation checks
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust
      - run: rustup target add aarch64-unknown-linux-gnu thumbv6m-none-eabi
        shell: bash

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Check (aarch64)
        run: cargo check --workspace --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Check (logfwd-core no_std)
        run: cargo build -p logfwd-core --target thumbv6m-none-eabi

  # -------------------------------------------------------------------------
  # Feature-flag verification — cargo-hack checks each feature compiles
  # independently (catches missing feature gates, broken optional deps).
  # Only `check`, not `build` — fast (~2 min).
  # -------------------------------------------------------------------------
  feature-check:
    name: Feature flag check
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard

      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@e445549abfcabe1b4106a8da1be899f392a60abc # cargo-hack

      - name: Check each feature compiles independently
        run: >-
          cargo hack check --each-feature --no-dev-deps
          -p logfwd
          -p logfwd-runtime
          -p logfwd-io
          -p logfwd-config

  # -------------------------------------------------------------------------
  # Kani formal verification — split into four parallel shards by layer so
  # the slowest one finishes in roughly 10 minutes on a 4-vCPU runner.
  # Observed wall-clock medians on main (per-job, --jobs 3):
  #   kani-core:           ~15 min  (logfwd-core,                ~103 proofs)
  #   kani-arrow:          ~19 min  (logfwd-arrow,                ~27 proofs;
  #                                  SIMD/columnar accumulator proofs are
  #                                  individually expensive — ~42s/proof)
  #   kani-runtime-types:  ~?? min  (logfwd-runtime + logfwd-types,
  #                                  ~55 orchestration-layer proofs)
  #   kani-io-output:      ~?? min  (logfwd-io + logfwd-output +
  #                                  logfwd-diagnostics + logfwd binary,
  #                                  ~52 I/O-layer proofs)
  # The previous monolithic kani-periphery shard (six crates, 107 proofs)
  # was the long pole at ~21 minutes; splitting it by layer should bring
  # both halves below 10 min on warm cache.  Each shard uses kissat and
  # --jobs 3 — ubuntu-latest has 4 vCPUs; jobs=3 leaves headroom for
  # solver memory spikes while still putting all cores to work.
  # -------------------------------------------------------------------------
  kani-core:
    name: Kani proofs (core)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.kani_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
          key: kani-core

      - name: Run Kani verification (logfwd-core)
        uses: model-checking/kani-github-action@v1
        with:
          args: >-
            --solver kissat
            --jobs 3
            --output-format terse
            -Z function-contracts
            -Z mem-predicates
            -Z stubbing
            -p logfwd-kani
            -p logfwd-core

  kani-arrow:
    name: Kani proofs (arrow)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.kani_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
          key: kani-arrow

      - name: Run Kani verification (logfwd-arrow --lib)
        # logfwd-arrow has a binary with required-features that cargo-kani
        # cannot skip, so verify only the library target.
        # --jobs 4: arrow proofs are the heaviest per-proof (up to ~90s each
        # on the make_string_view/scatter families) so saturating all 4
        # vCPUs here gives more wall-clock return than on the other shards.
        uses: model-checking/kani-github-action@v1
        with:
          args: >-
            --solver kissat
            --jobs 4
            --output-format terse
            -Z function-contracts
            -Z mem-predicates
            -Z stubbing
            -p logfwd-arrow
            --lib

  # Orchestration layer: the typestate spec lives in logfwd-types and is
  # consumed by logfwd-runtime — they form a natural pair to verify together.
  kani-runtime-types:
    name: Kani proofs (runtime + types)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.kani_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: kani-runtime-types

      - name: Run Kani verification (logfwd-runtime + logfwd-types)
        uses: model-checking/kani-github-action@v1
        with:
          args: >-
            --solver kissat
            --jobs 3
            --output-format terse
            -Z function-contracts
            -Z mem-predicates
            -Z stubbing
            -p logfwd-types
            -p logfwd-runtime

  # I/O layer: file tailing, network receivers, output sinks, diagnostics
  # transport, and the binary entrypoint.  Distinct from orchestration and
  # from the Arrow/SIMD column path.
  kani-io-output:
    name: Kani proofs (io + output)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.kani_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: kani-io-output

      - name: Run Kani verification (logfwd-io + logfwd-output + logfwd-diagnostics + logfwd)
        uses: model-checking/kani-github-action@v1
        with:
          args: >-
            --solver kissat
            --jobs 3
            --output-format terse
            -Z function-contracts
            -Z mem-predicates
            -Z stubbing
            -p logfwd-io
            -p logfwd-output
            -p logfwd-diagnostics
            -p logfwd

  # -------------------------------------------------------------------------
  # Miri — UB-oriented execution, split into two parallel shards.
  # PROPTEST_CASES=1: Miri validates UB per execution — 256 random cases
  # adds no UB coverage and wastes ~30 min.
  # -------------------------------------------------------------------------
  miri-core:
    name: Miri (core)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.miri == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      # Cache target/ and the cargo registry keyed on a miri-specific key so
      # the cold ~3–5 min rebuild only lands on the first run per rust-toolchain
      # bump. The key intentionally differs from setup-rust's stable cache so
      # Miri artefacts (different codegen flags) don't pollute the stable build.
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: miri-core-nightly

      - name: Set up Miri
        run: cargo +nightly miri setup

      - name: Run Miri test suite (logfwd-core)
        run: cargo +nightly miri test -p logfwd-core --lib
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          PROPTEST_CASES: "1"

  miri-types:
    name: Miri (types)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.miri == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: miri-types-nightly

      - name: Set up Miri
        run: cargo +nightly miri setup

      - name: Run Miri test suite (logfwd-types)
        run: cargo +nightly miri test -p logfwd-types --lib
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          PROPTEST_CASES: "1"

  miri-io-buffered:
    name: Miri (io buffered)
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.miri == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: miri-io-buffered-nightly

      - name: Set up Miri
        run: cargo +nightly miri setup

      - name: Run targeted Miri regression (logfwd-io shared buffer)
        run: cargo +nightly miri test -p logfwd-io framed::tests::poll_into_miri_shared_buffer_alias_regression --lib
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          PROPTEST_CASES: "1"

  # -------------------------------------------------------------------------
  # Deterministic simulation & concurrency model checks.  Turmoil and Loom
  # both need a full from-scratch Rust build with different features, so they
  # each get their own runner — this keeps each under ~10 minutes and lets
  # them finish in parallel instead of stacking on one box.  --test-threads=1
  # matches the nightly seed-sweep configuration for reproducibility.
  # -------------------------------------------------------------------------
  simulation-turmoil:
    name: Simulation (Turmoil)
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      # --no-default-features drops the SQL stack (logfwd-transform + datafusion
      # ~5–8 min of compile on a 4-vCPU runner) which the turmoil tests do not
      # exercise. Verified locally: 64/64 tests pass without those features.
      - name: Turmoil simulation tests
        run: >-
          cargo test
          -p logfwd
          --no-default-features
          --features turmoil
          --test turmoil_sim
          --
          --test-threads=1

  simulation-loom:
    name: Simulation (Loom)
    needs: [changes]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.rust == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      - name: Loom seam test
        run: cargo test -p logfwd-runtime --lib --features loom-tests worker_pool::pool::tests::loom_worker_removal_vs_late_event_model_never_resurrects_slot -- --exact

  # -------------------------------------------------------------------------
  # TLC: TLA+ model checking.  Two jobs share a composite action (setup-java,
  # cached tla2tools.jar, UseParallelGC + workers=auto) and bin-pack the ten
  # small-constants runs so each runner finishes in roughly 10 minutes.
  #
  # The thorough PipelineMachine model lives in the nightly workflow now
  # (nightly-testing.yml) — PR CI only exercises the safety, liveness, and
  # coverage configs, which is where regressions actually surface.
  # -------------------------------------------------------------------------
  tlc-safety:
    name: "TLA+ model checking (safety)"
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: "TLC: PipelineMachine — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineMachine.tla
          config: tla/PipelineMachine.cfg
      - name: "TLC: ShutdownProtocol — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCShutdownProtocol.tla
          config: tla/ShutdownProtocol.cfg
      - name: "TLC: PipelineBatch — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineBatch.tla
          config: tla/PipelineBatch.cfg
      - name: "TLC: TailLifecycle — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCTailLifecycle.tla
          config: tla/TailLifecycle.cfg
      - name: "TLC: DeliveryRetry — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCDeliveryRetry.tla
          config: tla/DeliveryRetry.cfg
      - name: "TLC: DeliveryRetry — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCDeliveryRetry.tla
          config: tla/DeliveryRetry.liveness.cfg
      - name: "TLC: WorkerPoolDispatch — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCWorkerPoolDispatch.tla
          config: tla/WorkerPoolDispatch.cfg
      - name: "TLC: WorkerPoolDispatch — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCWorkerPoolDispatch.tla
          config: tla/WorkerPoolDispatch.liveness.cfg
      - name: "TLC: FanoutSink — safety"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCFanoutSink.tla
          config: tla/FanoutSink.cfg
      - name: "TLC: FanoutSink — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCFanoutSink.tla
          config: tla/FanoutSink.liveness.cfg

  tlc-liveness-coverage:
    name: "TLA+ model checking (liveness + coverage)"
    needs: [changes, lint]
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: "TLC: PipelineMachine — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineMachine.tla
          config: tla/PipelineMachine.liveness.cfg
      - name: "TLC: ShutdownProtocol — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCShutdownProtocol.tla
          config: tla/ShutdownProtocol.liveness.cfg
      - name: "TLC: PipelineBatch — liveness"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineBatch.tla
          config: tla/PipelineBatch.liveness.cfg
      - name: "TLC coverage: PipelineMachine"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineMachine.tla
          config: tla/PipelineMachine.coverage.cfg
          mode: coverage
      - name: "TLC coverage: ShutdownProtocol"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCShutdownProtocol.tla
          config: tla/ShutdownProtocol.coverage.cfg
          mode: coverage
      - name: "TLC coverage: PipelineBatch"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineBatch.tla
          config: tla/PipelineBatch.coverage.cfg
          mode: coverage
      - name: "TLC coverage: DeliveryRetry"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCDeliveryRetry.tla
          config: tla/DeliveryRetry.coverage.cfg
          mode: coverage
      - name: "TLC coverage: WorkerPoolDispatch"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCWorkerPoolDispatch.tla
          config: tla/WorkerPoolDispatch.coverage.cfg
          mode: coverage
      - name: "TLC coverage: FanoutSink"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCFanoutSink.tla
          config: tla/FanoutSink.coverage.cfg
          mode: coverage

      # --- Thorough ---
      - name: "TLC: PipelineMachine — thorough"
        uses: ./.github/actions/run-tlc
        with:
          tla-file: tla/MCPipelineMachine.tla
          config: tla/PipelineMachine.thorough.cfg

  # -------------------------------------------------------------------------
  # Coverage — workspace code coverage via llvm-cov.
  # Informational only (continue-on-error); non-draft PRs, no path filter.
  # -------------------------------------------------------------------------
  coverage:
    name: Code Coverage
    needs: [test-linux]
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: ./.github/actions/setup-rust
      - run: rustup component add llvm-tools-preview
        shell: bash
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Generate workspace coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info --profile ci

      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir htmlcov

      - name: Generate Coverage Summary
        run: cargo llvm-cov report --summary-only > coverage-summary.txt

      - name: Write to Job Summary
        run: |
          {
            echo "## Code Coverage Summary"
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-html
          path: htmlcov/

      - name: Upload LCOV artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage-lcov
          path: lcov.info

  # -------------------------------------------------------------------------
  # Conclusion — single required status check for branch protection.
  # Pattern from rust-analyzer and cargo: set ONE required check
  # ("conclusion") instead of maintaining a list of individual job names.
  # -------------------------------------------------------------------------
  conclusion:
    name: CI conclusion
    if: ${{ always() && !cancelled() }}
    needs:
      - changes
      - frontend
      - lint
      - test-linux
      - test-macos
      - test-network
      - cross-check
      - feature-check
      - kani-core
      - kani-arrow
      - kani-runtime-types
      - kani-io-output
      - miri-core
      - miri-types
      - miri-io-buffered
      - simulation-turmoil
      - simulation-loom
      - tlc-safety
      - tlc-liveness-coverage
    runs-on: ubuntu-latest
    steps:
      - run: |
          jq -C <<< '${{ toJson(needs) }}'
          jq --exit-status 'all(.result == "success" or .result == "skipped")' \
            <<< '${{ toJson(needs) }}'
