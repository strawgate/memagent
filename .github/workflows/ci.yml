name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # needed by dorny/paths-filter to list changed files on bot PRs
  checks: write        # needed by rustsec/audit-check@v2 to create check run annotations

# Tool versions — bump these to upgrade across all jobs.
env:
  TAPLO_VERSION: "0.10.0"
  CARGO_DENY_VERSION: "0.19.0"

jobs:
  # -------------------------------------------------------------------------
  # Path filter — determine which crates changed (used to scope expensive jobs)
  # -------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      tla: ${{ steps.filter.outputs.tla }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c
        id: filter
        with:
          filters: |
            core:
              - 'crates/logfwd-core/**'
            tla:
              - 'tla/**'
              - 'crates/logfwd-core/src/pipeline/**'
              - 'crates/logfwd/src/pipeline.rs'

  # -------------------------------------------------------------------------
  # Frontend checks — format, lint, typecheck run in parallel via matrix
  # -------------------------------------------------------------------------
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci

      - name: biome format check
        if: matrix.check == 'format'
        run: npx biome check .

      - name: oxlint
        if: matrix.check == 'lint'
        run: npx oxlint .

      - name: typecheck
        if: matrix.check == 'typecheck'
        uses: actions/cache@v4
        with:
          path: dashboard/tsconfig.tsbuildinfo
          key: tsc-${{ hashFiles('dashboard/src/**/*.ts', 'dashboard/src/**/*.tsx', 'dashboard/tsconfig.app.json') }}
      - name: run tsgo
        if: matrix.check == 'typecheck'
        working-directory: dashboard
        run: npx tsgo --noEmit

  # -------------------------------------------------------------------------
  # Frontend tests — vitest with coverage
  # -------------------------------------------------------------------------
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: vitest
        run: npx vitest run --coverage
      - name: upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: dashboard/coverage/

  # -------------------------------------------------------------------------
  # Lint: fast checks (fmt, TOML, typos, actionlint) then clippy + audits.
  # Combined into one job to save a runner — fast checks fail-fast before
  # the expensive clippy build starts.
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt --check

      - name: Install taplo
        run: |
          curl -sSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gunzip > /usr/local/bin/taplo && chmod +x /usr/local/bin/taplo

      - name: TOML check
        run: taplo check

      - name: Typos
        uses: crate-ci/typos@v1

      - name: Install actionlint
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Actionlint
        run: ./actionlint

      # --- Expensive steps below — only reached if fast checks pass ---

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-deny
        run: |
          curl -sSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp && mv /tmp/cargo-deny-*/cargo-deny /usr/local/bin/

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Dependency audit (licenses / bans / advisories)
        run: cargo deny check

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}
          args: "--deny=vuln --deny=unsound --deny=yanked"

  # -------------------------------------------------------------------------
  # Tests — Linux and macOS in parallel
  # -------------------------------------------------------------------------
  test-linux:
    name: Test (Linux)
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Tests
        run: cargo nextest run --profile ci

  test-macos:
    name: Test (macOS)
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Tests
        run: cargo nextest run --profile ci
        env:
          RUSTC_WRAPPER: ""

  # -------------------------------------------------------------------------
  # Build check — aarch64 cross-compile only (release check removed:
  # clippy already does a full debug build that catches the same errors)
  # -------------------------------------------------------------------------
  build-check:
    name: Build check (aarch64)
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-dashboard
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          key: aarch64

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Check
        run: cargo check --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  # -------------------------------------------------------------------------
  # Kani formal verification
  # -------------------------------------------------------------------------
  kani:
    name: Kani proofs
    needs: [changes]
    # Always run on push to master; on PRs only when logfwd-core changed.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.core == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Run Kani verification
        uses: model-checking/kani-github-action@v1
        with:
          args: -p logfwd-core -Z function-contracts -Z mem-predicates -Z stubbing
        env:
          RUSTC_WRAPPER: ""

  # -------------------------------------------------------------------------
  # Turmoil deterministic simulation
  # -------------------------------------------------------------------------
  turmoil:
    name: Turmoil simulation
    needs: [changes]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Turmoil simulation tests
        run: cargo test -p logfwd --features turmoil --test turmoil_sim

  # -------------------------------------------------------------------------
  # TLC: TLA+ model checking for all specs
  # -------------------------------------------------------------------------
  tlc:
    name: TLA+ model checking
    needs: [changes]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event.pull_request.draft == false && needs.changes.outputs.tla == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download tla2tools.jar
        run: |
          mkdir -p /tmp/tla
          curl -sL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -o /tmp/tla/tla2tools.jar

      - name: PipelineMachine — safety
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCPipelineMachine.tla -config tla/PipelineMachine.cfg -workers auto

      - name: PipelineMachine — liveness
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCPipelineMachine.tla -config tla/PipelineMachine.liveness.cfg -workers auto

      - name: ShutdownProtocol — safety
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCShutdownProtocol.tla -config tla/ShutdownProtocol.cfg -workers auto

      - name: ShutdownProtocol — liveness
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCShutdownProtocol.tla -config tla/ShutdownProtocol.liveness.cfg -workers auto

      - name: PipelineBatch — safety
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCPipelineBatch.tla -config tla/PipelineBatch.cfg -workers auto

      - name: PipelineBatch — liveness
        run: java -cp /tmp/tla/tla2tools.jar tlc2.TLC tla/MCPipelineBatch.tla -config tla/PipelineBatch.liveness.cfg -workers auto
