name: Nightly Compliance

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch: # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  compliance:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run pipeline compliance tests
        id: pipeline
        continue-on-error: true
        run: cargo test -p logfwd --test compliance 2>&1 | tee compliance_pipeline.txt

      - name: Run file handling compliance tests
        id: file
        continue-on-error: true
        run: cargo test -p logfwd --test compliance_file 2>&1 | tee compliance_file.txt

      - name: Run data integrity compliance tests
        id: data
        continue-on-error: true
        run: cargo test -p logfwd-core --test compliance_data 2>&1 | tee compliance_data.txt

      - name: Upload compliance test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-logs-${{ github.run_number }}
          path: |
            compliance_pipeline.txt
            compliance_file.txt
            compliance_data.txt
          retention-days: 30

      - name: Post issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          FILE_OUTCOME: ${{ steps.file.outcome }}
          DATA_OUTCOME: ${{ steps.data.outcome }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)

          status_icon() {
            if [ "$1" = "success" ]; then echo "✅"; else echo "❌"; fi
          }

          PIPELINE_ICON=$(status_icon "$PIPELINE_OUTCOME")
          FILE_ICON=$(status_icon "$FILE_OUTCOME")
          DATA_ICON=$(status_icon "$DATA_OUTCOME")

          OVERALL="✅ All suites passed"
          if [ "$PIPELINE_OUTCOME" != "success" ] || [ "$FILE_OUTCOME" != "success" ] || [ "$DATA_OUTCOME" != "success" ]; then
            OVERALL="❌ One or more suites failed"
          fi

          TITLE="Compliance results ${DATE} (${COMMIT})"
          BODY="$(cat <<HEREDOC
## Compliance Results — ${DATE}

**Commit:** \`${COMMIT}\` on \`master\`
**Runner:** \`ubuntu-latest\`
**Overall:** ${OVERALL}

| Suite | Status |
|-------|--------|
| Pipeline (data integrity & transforms) | ${PIPELINE_ICON} \`${PIPELINE_OUTCOME}\` |
| File handling (rotation, truncation, glob) | ${FILE_ICON} \`${FILE_OUTCOME}\` |
| Data integrity (scanner edge cases) | ${DATA_ICON} \`${DATA_OUTCOME}\` |

---

<details>
<summary>Pipeline compliance output</summary>

\`\`\`
$(tail -50 compliance_pipeline.txt)
\`\`\`
</details>

<details>
<summary>File handling compliance output</summary>

\`\`\`
$(tail -50 compliance_file.txt)
\`\`\`
</details>

<details>
<summary>Data integrity compliance output</summary>

\`\`\`
$(tail -50 compliance_data.txt)
\`\`\`
</details>

<sub>Generated by [nightly compliance workflow](.github/workflows/compliance.yml)</sub>
HEREDOC
          )"

          # Close previous nightly compliance issues to avoid clutter.
          gh issue list --label compliance --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new compliance run." 2>/dev/null || true
          done

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label compliance
