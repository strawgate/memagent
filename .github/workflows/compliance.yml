name: Nightly Compliance

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch: # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust
      - name: Run pipeline compliance tests
        id: pipeline
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p ffwd --test it -- 'compliance::' 2>&1 | tee compliance_pipeline.txt

      - name: Run file handling compliance tests
        id: file
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p ffwd --test it -- 'compliance_file::' 2>&1 | tee compliance_file.txt

      - name: Run data integrity compliance tests
        id: data
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p ffwd-core --test it -- 'compliance_data::' 2>&1 | tee compliance_data.txt

      - name: Upload compliance test logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compliance-logs-${{ github.run_number }}
          path: |
            compliance_pipeline.txt
            compliance_file.txt
            compliance_data.txt
          retention-days: 30

      - name: Post issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          FILE_OUTCOME: ${{ steps.file.outcome }}
          DATA_OUTCOME: ${{ steps.data.outcome }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          COMMIT=$(git rev-parse --short HEAD)

          status_icon() {
            if [ "$1" = "success" ]; then echo "✅"; else echo "❌"; fi
          }

          PIPELINE_ICON=$(status_icon "$PIPELINE_OUTCOME")
          FILE_ICON=$(status_icon "$FILE_OUTCOME")
          DATA_ICON=$(status_icon "$DATA_OUTCOME")

          OVERALL="✅ All suites passed"
          if [ "$PIPELINE_OUTCOME" != "success" ] || [ "$FILE_OUTCOME" != "success" ] || [ "$DATA_OUTCOME" != "success" ]; then
            OVERALL="❌ One or more suites failed"
          fi

          TITLE="Compliance results ${DATE} (${COMMIT})"
          {
            echo "## Compliance Results — ${DATE}"
            echo ""
            echo "**Commit:** \`${COMMIT}\` on \`main\`"
            echo "**Runner:** \`ubuntu-latest\`"
            echo "**Overall:** ${OVERALL}"
            echo ""
            echo "| Suite | Status |"
            echo "|-------|--------|"
            echo "| Pipeline (data integrity & transforms) | ${PIPELINE_ICON} \`${PIPELINE_OUTCOME}\` |"
            echo "| File handling (rotation, truncation, glob) | ${FILE_ICON} \`${FILE_OUTCOME}\` |"
            echo "| Data integrity (scanner edge cases) | ${DATA_ICON} \`${DATA_OUTCOME}\` |"
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Pipeline compliance output</summary>"
            echo ""
            echo '```'
            tail -50 compliance_pipeline.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>File handling compliance output</summary>"
            echo ""
            echo '```'
            tail -50 compliance_file.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>Data integrity compliance output</summary>"
            echo ""
            echo '```'
            tail -50 compliance_data.txt
            echo '```'
            echo "</details>"
            echo ""
            echo "<sub>Generated by nightly compliance workflow</sub>"
          } > /tmp/compliance_body.md
          BODY="$(cat /tmp/compliance_body.md)"

          # Close previous nightly compliance issues to avoid clutter.
          gh issue list --label compliance --state open --json number -q '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new compliance run." 2>/dev/null || true
          done

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label compliance
