name: Issue Triage
on:
  issues:
    types: [opened]

permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write

jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-triage.lock.yml@v0
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    with:
      additional-instructions: |
        This repo's issues are typically pre-planned work items written
        by maintainers — enhancements, refactors, known bugs with
        implementation sketches. Many have file paths and code snippets
        already. Your job is to enrich the issue with codebase context
        that helps whoever picks it up.

        DO:
        - Find the source files relevant to the issue. For each, give
          the path and the key function/struct names with line numbers.
        - Show the current function signatures or struct definitions
          that will be modified.
        - Note any open PRs touching the same files (check with gh).
        - If the issue references other issues (#NNN), note whether
          they are open or closed.
        - Identify test files and patterns nearby that the implementer
          should follow.
        - Note which crate(s) are affected and any cross-crate impacts.

        DO NOT:
        - Restate what the issue already says.
        - Speculate about root cause — the issue already describes it.
        - Suggest the issue might be invalid or a duplicate.
        - Produce long prose. Be terse. Code references > paragraphs.

        Format:
        **Key files** (path:line — what's there now)
        **Open PRs in this area** (if any)
        **Test patterns to follow** (nearby test file + example)
        **Cross-crate impact** (if any)

        This is logfwd, a Rust log forwarder: file tail → SIMD parse →
        Arrow RecordBatch → DataFusion SQL → OTLP/ES/Loki output.
        Read CLAUDE.md for the full project guide.
