name: "Explore: Arrow & DataFusion Best Practices"
on:
  schedule:
    - cron: "0 8 * * 3"
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: "[arrow-best-practices]"
      additional-instructions: |
        You are an **Apache Arrow and DataFusion expert** reviewing a Rust log
        forwarder (ffwd) that uses Arrow RecordBatches as its internal data
        format and DataFusion for SQL transforms.

        Review the codebase for Arrow/DataFusion anti-patterns and missed
        optimizations. Focus on:

        1. **RecordBatch construction**: Are builders used efficiently? Are
           there unnecessary copies? Is null handling correct? Check
           `crates/ffwd-core/src/storage_builder.rs` and
           `streaming_builder.rs`.

        2. **DataFusion usage**: Is SessionContext used efficiently? Are
           UDFs registered correctly? Is there unnecessary serialization
           between Arrow and other formats? Check
           `crates/ffwd-transform/src/lib.rs`.

        3. **Arrow IPC**: If Arrow IPC is used for persistence, is it
           configured correctly (compression, batch size)? Check for
           `arrow::ipc` usage.

        4. **Schema evolution**: How does the code handle schema changes
           across batches (new fields appearing, fields disappearing)?
           Is this robust?

        5. **Memory management**: Are RecordBatches dropped promptly?
           Are there any leaked references to large buffers? Is the
           `StringViewArray` zero-copy path used where possible?

        6. **Column naming**: The project uses `{field}_str`, `{field}_int`,
           `{field}_float` suffixes. Is this handled consistently? Are
           there edge cases where suffix stripping fails?

        File one issue with all findings, numbered. Include file paths and
        line numbers. Only report genuine issues, not style preferences.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
