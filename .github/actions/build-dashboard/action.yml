name: Build Dashboard
description: Build the Preact/TypeScript dashboard into a single HTML file

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: dashboard/package-lock.json

    - name: Build dashboard
      shell: bash
      run: cd dashboard && npm ci && npm run build
