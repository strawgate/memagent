# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# protobuf recursion crash (RUSTSEC-2024-0437) — transitive dep via
# opentelemetry-otlp, not exposed to untrusted input in our usage.
ignore = ["RUSTSEC-2024-0437"]
# Only error on unmaintained crates in our workspace, not transitive deps.
unmaintained = "workspace"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Workspace crates are private (publish = false) and don't need licenses.
[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
