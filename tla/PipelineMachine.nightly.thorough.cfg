\* TLC Model Checker Configuration — NIGHTLY THOROUGH safety model
\*
\* Deeper than the PR-time thorough model. Intended for scheduled CI where
\* runtime is less constrained and we can explore an additional batch depth.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.nightly.thorough.cfg
\* Expected: larger state space than PipelineMachine.thorough.cfg

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2", "s3"}
    MaxBatchesPerSource = 4

\* Safety invariants
INVARIANTS
    TypeOK
    NoDoubleComplete
    DrainCompleteness
    QuiescenceHasNoSilentStrandedWork
    CheckpointOrderingInvariant
    CommittedNeverAheadOfCreated
    SentImpliesCreated
    InFlightImpliesCreated
    InFlightImpliesSent
    AckedImpliesCreated
    AckedImpliesSent
    RejectedImpliesCreated
    RejectedImpliesSent
    AbandonedImpliesCreated
    AbandonedImpliesSent

\* Temporal action properties (safe to check with safety-sized constants)
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    DrainMeansNoNewSending
