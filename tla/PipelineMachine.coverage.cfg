\* TLC Model Checker Configuration — COVERAGE / reachability model
\*
\* Checks that all interesting states are actually reachable — the TLA+
\* equivalent of kani::cover!(). A "PROPERTY VIOLATION" from TLC here is
\* the desired outcome: it means TLC found a trace reaching the state.
\* If TLC reports no violation, the state was unreachable — which is a bug
\* in the spec or the model constants.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.coverage.cfg
\* Expected: TLC reports violations for all four reachability properties
\*           (each violation is a witness trace, not an error).

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2"}
    MaxBatchesPerSource = 3

SYMMETRY Sources

\* Reachability assertions — violations mean the state IS reachable (correct).
PROPERTIES
    BeginDrainReachable
    StopReachable
    AckOccurs
    CommitAdvances
