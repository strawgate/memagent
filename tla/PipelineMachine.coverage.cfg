\* TLC Model Checker Configuration — COVERAGE / reachability model
\*
\* Checks that all interesting states are actually reachable — the TLA+
\* equivalent of kani::cover!(). Each reachability assertion is defined as
\* the NEGATION of the target state (~P). A "INVARIANT VIOLATION" from TLC
\* means it found a state where P holds — the violation trace IS the witness.
\* If TLC reports no violation, the state was unreachable — which is a bug
\* in the spec or the model constants.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.coverage.cfg
\* Expected: TLC reports violations for reachability invariants
\*           (each violation is a witness trace, not an error). Run focused
\*           single-invariant coverage checks when you need concise witnesses.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2"}
    MaxBatchesPerSource = 3
    MaxNonTerminalHolds = 1


\* Reachability assertions — invariant violations mean the state IS reachable (correct).
INVARIANTS
    BeginDrainReachable
    StopReachable
    AckOccurs
    RejectOccurs
    HoldOccurs
    RetryOccurs
    PanicHoldOccurs
    CheckpointAdvances
    ForcedReachable
    AbandonOccurs
    CrashReachable
    HeldAbandonOccurs
    CreateOccurs
