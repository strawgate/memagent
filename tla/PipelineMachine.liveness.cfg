\* TLC Model Checker Configuration — LIVENESS model (no ForceStop)
\*
\* Checks liveness (temporal) properties only. Uses smaller constants because
\* TLC liveness checking is O(states²) — large constants make it impractical.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.liveness.cfg
\* Expected: ~5K states, < 5 min
\*
\* WARNING: Never use CONSTRAINT to bound state space for liveness checking —
\* it silently breaks liveness by cutting off infinite behaviors before they
\* reach the convergent state. Use model constants (this file) instead.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2"}
    MaxBatchesPerSource = 2

\* NOTE: SYMMETRY is intentionally omitted here.
\* TLC cannot use symmetry sets when checking temporal (liveness) properties —
\* it may collapse states that need to be distinct for temporal reasoning,
\* silently producing unsound results. Symmetry is safe only for safety
\* (INVARIANT) checks. See: Jack Vanlightly, "Introduction to Symmetry in TLA+".

\* Liveness properties (require Fairness in Spec — see PipelineMachine.tla)
PROPERTIES
    EventualDrain
    NoBatchLeftBehind
    StoppedIsStable
    AllCreatedBatchesEventuallyAccountedFor
