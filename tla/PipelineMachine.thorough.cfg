\* TLC Model Checker Configuration — THOROUGH safety model (normal + ForceStop paths)
\*
\* Same as PipelineMachine.cfg but with larger constants for deeper exploration.
\* This is the PR-CI thorough model (3 sources, 3 batches).
\* For deeper nightly exploration, use PipelineMachine.nightly.thorough.cfg.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.thorough.cfg
\* Expected: hundreds of millions of generated states, usually under 90 minutes in CI
\*
\* NOTE: Do NOT use CONSTRAINT to bound state space. For safety-only configs
\* like this one the immediate risk is less severe, but CONSTRAINT silently
\* breaks liveness checking (it cuts off infinite behaviors before they reach
\* convergence). Using model constants is always safe for both safety and
\* liveness models — prefer them over CONSTRAINT in all configs.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2", "s3"}
    MaxBatchesPerSource = 3
    MaxNonTerminalHolds = 2


\* Safety invariants — strict superset of PipelineMachine.cfg's set.
INVARIANTS
    TypeOK
    StopMetadataConsistent
    NoDoubleComplete
    DrainCompleteness
    NoHeldWorkAfterStop
    QuiescenceHasNoSilentStrandedWork
    NoUnresolvedSentAtQuiescence
    CheckpointOrderingInvariant
    UnresolvedWorkNotCommittedPast
    CheckpointNeverAheadOfTerminalizedPrefix
    CommittedNeverAheadOfCreated
    SentImpliesCreated
    InFlightImpliesCreated
    InFlightImpliesSent
    HeldImpliesInFlight
    RetriedImpliesSent
    PanickedImpliesSent
    HoldCountOnlyForSent
    AckedImpliesCreated
    AckedImpliesSent
    RejectedImpliesCreated
    RejectedImpliesSent
    AbandonedImpliesCreated
    AbandonedImpliesSent

\* Temporal action properties — also a strict superset of PipelineMachine.cfg.
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    HeldTransitionsDoNotCommit
    ForceStopAbandonsAllInFlight
    DrainMeansNoNewSending
    FailureTerminalizationPreservesCheckpoint
    FailureClassMustTerminalizePrototype
