\* TLC Model Checker Configuration — SAFETY model (normal + ForceStop paths)
\*
\* Checks all safety invariants and the two temporal action properties
\* (NoCreateAfterDrain, CommittedMonotonic, DrainMeansNoNewSending).
\* Liveness properties (EventualDrain, NoBatchLeftBehind, etc.) are in
\* PipelineMachine.liveness.cfg — they require smaller constants to be fast.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCPipelineMachine.tla -config PipelineMachine.cfg
\* Expected: ~10.8M distinct states locally with one TLC worker, < 10 min
\*
\* NOTE: Do NOT use CONSTRAINT to bound state space — it silently breaks
\* liveness checking. Use model constants (this file) instead.

SPECIFICATION Spec

CONSTANTS
    Sources = {"s1", "s2"}
    MaxBatchesPerSource = 3
    MaxNonTerminalHolds = 1

\* Safety invariants
INVARIANTS
    TypeOK
    StopMetadataConsistent
    NoDoubleComplete
    DrainCompleteness
    NoHeldWorkAfterStop
    QuiescenceHasNoSilentStrandedWork
    NoUnresolvedSentAtQuiescence
    CheckpointOrderingInvariant
    UnresolvedWorkNotCommittedPast
    CheckpointNeverAheadOfTerminalizedPrefix
    CommittedNeverAheadOfCreated
    SentImpliesCreated
    InFlightImpliesCreated
    InFlightImpliesSent
    HeldImpliesInFlight
    RetriedImpliesSent
    PanickedImpliesSent
    HoldCountOnlyForSent
    AckedImpliesCreated
    AckedImpliesSent
    RejectedImpliesCreated
    RejectedImpliesSent
    AbandonedImpliesCreated
    AbandonedImpliesSent

\* Temporal action properties (safe to check with safety-sized constants)
PROPERTIES
    NoCreateAfterDrain
    CommittedMonotonic
    HeldTransitionsDoNotCommit
    ForceStopAbandonsAllInFlight
    DrainMeansNoNewSending
    FailureTerminalizationPreservesCheckpoint
    FailureClassMustTerminalizePrototype
