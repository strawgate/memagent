\* TLC Model Checker Configuration for PipelineMachine.tla
\*
\* Run with: tlc PipelineMachine.tla -config PipelineMachine.cfg
\* Or via TLA+ Toolbox: File -> Open Spec -> Add TLC Model
\*
\* Two preset configurations:
\*
\* FAST (CI / development):
\*   MaxSources=2, MaxBatchesPerSource=3
\*   ~50K states, < 30 seconds
\*
\* THOROUGH (pre-release / architecture changes):
\*   MaxSources=3, MaxBatchesPerSource=4
\*   ~2M states, ~5 minutes
\*
\* Use FAST for routine checks. Use THOROUGH before merging changes to
\* pipeline/lifecycle.rs or pipeline/batch.rs.

SPECIFICATION Spec

CONSTANTS
    MaxSources = 2
    MaxBatchesPerSource = 3

\* Safety invariants (must hold in every reachable state)
INVARIANTS
    TypeOK
    NoDoubleComplete
    DrainCompleteness
    CheckpointOrderingInvariant
    CommittedNeverAheadOfAcked
    InFlightImpliesCreated
    AckedImpliesCreated

\* Temporal properties (must hold under fairness)
PROPERTIES
    NoNewBatchesAfterDrain
    CommittedMonotonic
    EventualDrain
    NoBatchLeftBehind
    AllBatchesEventuallyCommittedOrStopped
