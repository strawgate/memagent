<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>logfwd Benchmarks</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>logfwd competitive benchmarks</h1>
      <p>Nightly throughput comparison across log forwarders</p>
      <div class="header-links">
        <a href="https://github.com/strawgate/memagent">Repository</a>
        <a href="https://github.com/strawgate/memagent/actions/workflows/bench.yml">Run Benchmark</a>
      </div>
    </div>

    <div id="loading" class="loading">Loading dashboard data</div>
    <div id="error" class="error" style="display:none"></div>
    <div id="content" style="display:none">

      <div class="card" id="sparkline-section" style="display:none">
        <h2>Throughput Tracking</h2>
        <div class="tracking-cards" id="sparkline-cards"></div>
      </div>

      <div class="card" id="latest-section">
        <h2>Latest Run</h2>
        <div id="latest-meta" style="margin-bottom:12px; font-size:13px; color:var(--text-muted)"></div>
        <table>
          <thead><tr><th>Scenario</th><th>Agent</th><th class="num">Lines/sec</th><th class="num">Avg Time</th><th class="num">Iters</th></tr></thead>
          <tbody id="latest-tbody"></tbody>
        </table>
      </div>

      <div class="card" id="nav-section" style="display:none">
        <div style="display:flex;gap:40px;flex-wrap:wrap">
          <div>
            <h2>Scenarios</h2>
            <div id="scenario-nav" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
          </div>
          <div>
            <h2>Agents</h2>
            <div id="agent-nav" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>All Runs</h2>
        <div id="runs-list"></div>
      </div>

    </div>
  </div>

  <script>
    const COLORS = {'logfwd':'#2563eb','vector':'#7c3aed','fluent-bit':'#059669','filebeat':'#d97706','otelcol':'#dc2626','vlagent':'#64748b'};
    function C(a){return COLORS[a]||'#9ca3af';}

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    Chart.defaults.color = isDark ? '#8b949e' : '#656d76';
    Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

    function fmtLPS(v){if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return v.toFixed(0);}
    function fmtDate(s){return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    async function fetchJSON(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json();}

    async function init() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const contentEl = document.getElementById('content');

      try {
        const index = await fetchJSON('data/index.json');
        const runs = index.runs || [];
        if (runs.length === 0) {
          loadingEl.style.display = 'none';
          errorEl.textContent = 'No benchmark runs yet. Trigger a benchmark from GitHub Actions.';
          errorEl.style.display = 'block';
          return;
        }

        // Load all run data.
        const runDataMap = {};
        await Promise.all(runs.map(async run => {
          try { runDataMap[run.id] = await fetchJSON(`data/runs/${run.id}.json`); } catch(e) {}
        }));

        // Collect all agents and scenarios.
        const allAgents = new Set(), allScenarios = new Set();
        for (const d of Object.values(runDataMap)) {
          (d.agents||[]).forEach(a => allAgents.add(a));
          (d.scenario_names||Object.keys(d.scenarios||{})).forEach(s => allScenarios.add(s));
        }

        // Sparklines: scenario/agent -> [{lps}] oldest first.
        const sparklines = {};
        for (const run of [...runs].reverse()) {
          const d = runDataMap[run.id];
          if (!d || !d.scenarios) continue;
          for (const [scenario, agents] of Object.entries(d.scenarios)) {
            for (const [agent, m] of Object.entries(agents)) {
              const key = `${scenario}/${agent}`;
              if (!sparklines[key]) sparklines[key] = {scenario, agent, points: []};
              sparklines[key].points.push(m.avg_lps);
            }
          }
        }

        // Render sparklines.
        const sparkContainer = document.getElementById('sparkline-cards');
        for (const [, s] of Object.entries(sparklines)) {
          if (s.points.length < 2) continue;
          document.getElementById('sparkline-section').style.display = 'block';
          const latest = s.points[s.points.length - 1];
          const card = document.createElement('div');
          card.className = 'tracking-card';
          card.innerHTML = `
            <div class="tracking-card-label">${s.scenario} / <a href="agent.html?name=${s.agent}" style="color:${C(s.agent)};text-decoration:none">${s.agent}</a></div>
            <div class="tracking-card-value" style="color:${C(s.agent)}">${fmtLPS(latest)} lines/sec</div>
            <div class="sparkline"><canvas></canvas></div>
          `;
          sparkContainer.appendChild(card);
          new Chart(card.querySelector('canvas'), {
            type:'line',
            data:{labels:s.points.map(()=>''),datasets:[{data:s.points,borderColor:C(s.agent),borderWidth:1.5,pointRadius:0,tension:0.3,fill:false}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}},
          });
        }

        // Latest run.
        const latest = runs[0];
        const latestData = runDataMap[latest.id];
        if (latestData) {
          document.getElementById('latest-meta').innerHTML = `
            <span class="badge">commit: ${(latestData.commit||'').substring(0,8)}</span>
            &mdash; ${fmtDate(latestData.date)}
            &mdash; <a href="run.html?id=${latest.id}" style="color:var(--accent)">View details</a>
          `;
          let html = '';
          for (const scenario of (latestData.scenario_names||Object.keys(latestData.scenarios||{}))) {
            const agents = (latestData.scenarios||{})[scenario];
            if (!agents) continue;
            let maxLps = 0;
            for (const m of Object.values(agents)) if (m.avg_lps > maxLps) maxLps = m.avg_lps;
            for (const [agent, m] of Object.entries(agents)) {
              const w = m.avg_lps === maxLps ? ' winner' : '';
              html += `<tr><td><a href="scenario.html?name=${scenario}" style="color:var(--accent)">${scenario}</a></td><td class="${w}"><a href="agent.html?name=${agent}" style="color:${C(agent)};text-decoration:none">${agent}</a></td><td class="num${w}">${fmtLPS(m.avg_lps)} lines/sec</td><td class="num">${m.avg_ms}ms</td><td class="num">${m.iterations}</td></tr>`;
            }
          }
          document.getElementById('latest-tbody').innerHTML = html;
        }

        // Nav links.
        if (allScenarios.size > 0 || allAgents.size > 0) {
          document.getElementById('nav-section').style.display = 'block';
          const sNav = document.getElementById('scenario-nav');
          for (const s of allScenarios) sNav.innerHTML += `<a href="scenario.html?name=${s}" class="scenario-tag" style="text-decoration:none;font-size:13px;padding:6px 12px">${s}</a>`;
          const aNav = document.getElementById('agent-nav');
          for (const a of allAgents) aNav.innerHTML += `<a href="agent.html?name=${a}" class="scenario-tag" style="text-decoration:none;font-size:13px;padding:6px 12px;border-left:3px solid ${C(a)}">${a}</a>`;
        }

        // Runs list.
        const container = document.getElementById('runs-list');
        let html = '';
        for (const run of runs) {
          html += `<a class="run-item" href="run.html?id=${run.id}">
            <div class="run-meta">
              <div><span class="badge">commit: ${(run.commit||'').substring(0,8)}</span></div>
              <div class="date">${fmtDate(run.date)} &mdash; Run #${run.id}</div>
            </div>
            <div class="run-scenarios">
              ${(run.scenarios||[]).map(s=>`<span class="scenario-tag">${s}</span>`).join('')}
              ${(run.agents||[]).map(a=>`<span class="scenario-tag">${a}</span>`).join('')}
            </div>
          </a>`;
        }
        container.innerHTML = html || '<p style="color:var(--text-muted)">No runs yet.</p>';

        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
      } catch(e) {
        loadingEl.style.display = 'none';
        errorEl.textContent = 'Failed to load dashboard: ' + e.message;
        errorEl.style.display = 'block';
      }
    }
    init();
  </script>
</body>
</html>
