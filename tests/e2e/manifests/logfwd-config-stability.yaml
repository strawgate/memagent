apiVersion: v1
kind: ConfigMap
metadata:
  name: logfwd-config
data:
  config.yaml: |
    server:
      diagnostics: "0.0.0.0:9090"
      log_level: info

    input:
      type: file
      path: /var/log/pods/**/*.log
      format: cri

    transform: >-
      SELECT * FROM logs WHERE message_str LIKE '%LOGFWD_STABILITY_MARKER%'

    output:
      type: http
      endpoint: http://blackhole-receiver.e2e-logfwd.svc.cluster.local:4318
      format: json
