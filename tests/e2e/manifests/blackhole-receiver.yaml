apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackhole-receiver
  labels:
    app: blackhole-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackhole-receiver
  template:
    metadata:
      labels:
        app: blackhole-receiver
    spec:
      containers:
        - name: blackhole
          image: ff:e2e
          imagePullPolicy: IfNotPresent
          args: ["blackhole", "0.0.0.0:4318"]
          ports:
            - containerPort: 4318
          readinessProbe:
            httpGet:
              path: /stats
              port: 4318
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: blackhole-receiver
spec:
  selector:
    app: blackhole-receiver
  ports:
    - port: 4318
      targetPort: 4318
