apiVersion: v1
kind: ConfigMap
metadata:
  name: ff-config
data:
  config.yaml: |
    server:
      diagnostics: "0.0.0.0:9090"
      log_level: debug

    input:
      type: file
      path: /var/log/pods/**/*.log
      format: cri

    transform: >-
      SELECT * FROM logs WHERE message_str LIKE '%FFWD_E2E_MARKER%'

    output:
      type: http
      endpoint: http://blackhole-receiver.e2e-ff.svc.cluster.local:4318
      format: json
