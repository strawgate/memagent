syntax = "proto3";

package otap;

message BatchArrowRecords {
  int64 batch_id = 1;
  repeated ArrowPayload arrow_payloads = 2;
  bytes headers = 3;
}

message ArrowPayload {
  string schema_id = 1;
  ArrowPayloadType type = 2;
  bytes record = 3;
}

message BatchStatus {
  int64 batch_id = 1;
  StatusCode status_code = 2;
  string status_message = 3;
}

enum ArrowPayloadType {
  LOGS = 0;
  LOG_ATTRS = 30;
  RESOURCE_ATTRS = 40;
  SCOPE_ATTRS = 50;
}

enum StatusCode {
  OK = 0;
  UNAVAILABLE = 1;
  INVALID_ARGUMENT = 2;
}
