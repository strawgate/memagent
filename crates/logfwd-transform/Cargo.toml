[package]
name = "logfwd-transform"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
logfwd-core = { path = "../logfwd-core" }
arrow = { workspace = true }
datafusion = { version = "45", default-features = false, features = [
    "string_expressions",
    "unicode_expressions",
    "regex_expressions",
    "recursive_protection",
] }
grok = { version = "2.4", default-features = false, features = ["fancy-regex"] }
maxminddb = "0.27"
regex = "1"
tokio = { version = "1", features = ["rt"] }

[dev-dependencies]
bytes = "1"
