[package]
name = "logfwd-transform"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lib]
doctest = false

[dependencies]
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
arrow = { workspace = true }
datafusion = { workspace = true }
grok = { version = "2.4", default-features = false, features = ["fancy-regex"] }
maxminddb = "0.27"
regex = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }
logfwd-arrow = { version = "0.1.0", path = "../logfwd-arrow" }
bytes = "1"


[lints]
workspace = true
