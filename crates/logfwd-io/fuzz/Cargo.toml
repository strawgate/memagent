[package]
name = "logfwd-io-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
flate2 = "1"
libfuzzer-sys = "0.4"
logfwd-io = { path = ".." }
logfwd-types = { path = "../../logfwd-types" }
serde_json = "1"
zstd = "0.13"

[workspace]

[[bin]]
name = "fuzz_otlp_protobuf_decode"
path = "fuzz_targets/fuzz_otlp_protobuf_decode.rs"
doc = false

[[bin]]
name = "fuzz_otlp_json_decode"
path = "fuzz_targets/fuzz_otlp_json_decode.rs"
doc = false

[[bin]]
name = "fuzz_decompress"
path = "fuzz_targets/fuzz_decompress.rs"
doc = false

[[bin]]
name = "fuzz_otap_decode"
path = "fuzz_targets/fuzz_otap_decode.rs"
doc = false

[[bin]]
name = "fuzz_arrow_ipc_decode"
path = "fuzz_targets/fuzz_arrow_ipc_decode.rs"
doc = false

[[bin]]
name = "fuzz_protojson_numbers"
path = "fuzz_targets/fuzz_protojson_numbers.rs"
doc = false
