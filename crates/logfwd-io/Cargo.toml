[package]
name = "logfwd-io"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
arrow = { workspace = true }
crossbeam-channel = "0.5"
csv = "1"
gethostname = "1"
glob = "0.3"
libc = "0.2"
memchr = "2"
notify = "8"
opentelemetry = { workspace = true }
opentelemetry-proto = { version = "0.31", features = ["logs", "gen-tonic-messages"] }
prost = "0.14"
serde = { workspace = true }
serde_json = "1"
socket2 = { version = "0.5", features = ["all"] }
tiny_http = "0.12"
zstd = "0.13"
xxhash-rust = { version = "0.8.15", features = ["xxh32", "xxh64"] }

[dev-dependencies]
dhat = "0.3"
proptest = "1"
serial_test = "3"
tempfile = "3.27.0"
ureq = "3"

[lints]
workspace = true
