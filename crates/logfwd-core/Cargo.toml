[package]
name = "logfwd-core"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
memchr = { version = "2", default-features = false }
wide = { version = "1.2.0", default-features = false }

[dev-dependencies]
logfwd-arrow = { path = "../logfwd-arrow" }
logfwd-test-utils = { path = "../logfwd-test-utils" }
arrow = { workspace = true }
arrow-json = "54"
bytes = "1"
chrono = { version = "0.4.44", default-features = false }
criterion = { version = "0.5", features = ["html_reports"] }
memmap2 = "0.9"
proptest = "1"
sonic-rs = "0.5"
tempfile = "3"
logfwd-io = { path = "../logfwd-io" }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ['cfg(kani)']

[[bench]]
name = "scanner"
harness = false
