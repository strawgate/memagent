<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>logfwd dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
         background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 16px; color: #58a6ff; }
  h2 { font-size: 16px; margin: 16px 0 8px; color: #8b949e; }
  .pipeline { background: #161b22; border: 1px solid #30363d; border-radius: 6px;
              padding: 16px; margin-bottom: 16px; }
  .pipeline-name { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #f0f6fc; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  th, td { text-align: left; padding: 6px 12px; border-bottom: 1px solid #21262d; font-size: 13px; }
  th { color: #8b949e; font-weight: 500; }
  td { color: #c9d1d9; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .transform { background: #1c2333; border-radius: 4px; padding: 10px 14px; margin-bottom: 12px; }
  .transform code { color: #79c0ff; font-size: 13px; }
  .meta { font-size: 12px; color: #484f58; margin-top: 16px; }
  .err { color: #f85149; }
  .ok { color: #3fb950; }
  #status { font-size: 12px; color: #484f58; position: fixed; top: 8px; right: 16px; }
</style>
</head>
<body>
<h1>logfwd diagnostics</h1>
<div id="status">connecting...</div>
<div id="root"></div>
<div class="meta" id="meta"></div>
<script>
(function() {
  var prev = null;
  var prevTime = null;

  function fmt(n) {
    if (n == null) return "-";
    if (n >= 1e9) return (n / 1e9).toFixed(2) + " G";
    if (n >= 1e6) return (n / 1e6).toFixed(2) + " M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + " K";
    return String(n);
  }

  function rate(cur, prevVal, dt) {
    if (prevVal == null || dt <= 0) return "-";
    var r = (cur - prevVal) / dt;
    return fmt(Math.round(r)) + "/s";
  }

  function findPrev(name) {
    if (!prev) return null;
    for (var i = 0; i < prev.pipelines.length; i++) {
      if (prev.pipelines[i].name === name) return prev.pipelines[i];
    }
    return null;
  }

  function render(data) {
    var now = Date.now();
    var dt = prevTime ? (now - prevTime) / 1000 : 0;
    var html = "";
    for (var i = 0; i < data.pipelines.length; i++) {
      var p = data.pipelines[i];
      var pp = findPrev(p.name);
      html += '<div class="pipeline"><div class="pipeline-name">' + esc(p.name) + '</div>';

      // Inputs
      html += '<h2>Inputs</h2><table><tr><th>Name</th><th>Type</th><th class="num">Lines</th><th class="num">Bytes</th><th class="num">Rate</th><th class="num">Errors</th></tr>';
      for (var j = 0; j < p.inputs.length; j++) {
        var inp = p.inputs[j];
        var pinp = pp && pp.inputs[j] ? pp.inputs[j] : null;
        var errCls = inp.errors > 0 ? "num err" : "num ok";
        html += '<tr><td>' + esc(inp.name) + '</td><td>' + esc(inp.type) + '</td>'
          + '<td class="num">' + fmt(inp.lines_total) + '</td>'
          + '<td class="num">' + fmt(inp.bytes_total) + '</td>'
          + '<td class="num">' + rate(inp.lines_total, pinp ? pinp.lines_total : null, dt) + '</td>'
          + '<td class="' + errCls + '">' + inp.errors + '</td></tr>';
      }
      html += '</table>';

      // Transform
      html += '<h2>Transform</h2><div class="transform"><code>' + esc(p.transform.sql) + '</code><br>'
        + '<span style="font-size:12px;color:#8b949e">in: ' + fmt(p.transform.lines_in)
        + ' &rarr; out: ' + fmt(p.transform.lines_out)
        + ' (drop ' + (p.transform.filter_drop_rate * 100).toFixed(1) + '%)</span></div>';

      // Outputs
      html += '<h2>Outputs</h2><table><tr><th>Name</th><th>Type</th><th class="num">Lines</th><th class="num">Bytes</th><th class="num">Rate</th><th class="num">Errors</th></tr>';
      for (var j = 0; j < p.outputs.length; j++) {
        var out = p.outputs[j];
        var pout = pp && pp.outputs[j] ? pp.outputs[j] : null;
        var errCls = out.errors > 0 ? "num err" : "num ok";
        html += '<tr><td>' + esc(out.name) + '</td><td>' + esc(out.type) + '</td>'
          + '<td class="num">' + fmt(out.lines_total) + '</td>'
          + '<td class="num">' + fmt(out.bytes_total) + '</td>'
          + '<td class="num">' + rate(out.lines_total, pout ? pout.lines_total : null, dt) + '</td>'
          + '<td class="' + errCls + '">' + out.errors + '</td></tr>';
      }
      html += '</table></div>';
    }
    document.getElementById("root").innerHTML = html;
    if (data.system) {
      document.getElementById("meta").textContent =
        "uptime " + data.system.uptime_seconds + "s | version " + data.system.version;
    }
    prev = data;
    prevTime = now;
  }

  function esc(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function poll() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/api/pipelines");
    xhr.onload = function() {
      if (xhr.status === 200) {
        document.getElementById("status").textContent = "live";
        try { render(JSON.parse(xhr.responseText)); } catch(e) {}
      }
    };
    xhr.onerror = function() {
      document.getElementById("status").textContent = "disconnected";
    };
    xhr.send();
  }

  poll();
  setInterval(poll, 1000);
})();
</script>
</body>
</html>
