[package]
name = "logfwd-core-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
logfwd-core = { path = ".." }
logfwd-arrow = { path = "../../logfwd-arrow" }
logfwd-transform = { path = "../../logfwd-transform" }
logfwd-output = { path = "../../logfwd-output" }
logfwd-io = { path = "../../logfwd-io" }
arrow = { version = "54", default-features = false }
bytes = "1"

[workspace]

[[bin]]
name = "fuzz_scanner"
path = "fuzz_targets/scanner.rs"
doc = false

[[bin]]
name = "fuzz_pipe_event"
path = "fuzz_targets/pipe_event.rs"
doc = false

[[bin]]
name = "fuzz_streaming_scanner"
path = "fuzz_targets/streaming_scanner.rs"
doc = false

[[bin]]
name = "fuzz_scanner_consistency"
path = "fuzz_targets/scanner_consistency.rs"
doc = false

[[bin]]
name = "fuzz_structural_index"
path = "fuzz_targets/structural_index.rs"
doc = false

[[bin]]
name = "fuzz_scanner_sink"
path = "fuzz_targets/scanner_sink.rs"
doc = false

[[bin]]
name = "fuzz_scanner_transform"
path = "fuzz_targets/scanner_transform.rs"
doc = false
