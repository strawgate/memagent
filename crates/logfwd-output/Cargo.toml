[package]
name = "logfwd-output"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
logfwd-config = { path = "../logfwd-config" }
logfwd-core = { path = "../logfwd-core" }
arrow = { workspace = true }
libc = "0.2"
tokio = { version = "1", features = ["rt-multi-thread"] }
ureq = { version = "3", default-features = false, features = ["rustls"] }
