[package]
name = "logfwd-output"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
logfwd-config = { version = "0.1.0", path = "../logfwd-config" }
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
arrow = { workspace = true }
itoa = "1"
ryu = "1"
libc = "0.2"
ureq = { version = "3", default-features = false, features = ["rustls"] }
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }
serde_json = "1.0"
memchr = "2"
tokio = { version = "1", features = ["rt-multi-thread"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "gzip", "json"] }
flate2 = "1"

[dev-dependencies]
proptest = "1"
serial_test = "3"
arrow = { workspace = true, features = ["test_utils"] }
stats_alloc = "0.1"
serde_json = "1.0.149"
tiny_http = "0.12"
memchr = "2"

[lints]
workspace = true
