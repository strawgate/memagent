[package]
name = "logfwd"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[features]
dhat-heap = ["dhat"]
cpu-profiling = ["pprof"]

[dependencies]
logfwd-config = { version = "0.1.0", path = "../logfwd-config" }
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
logfwd-arrow = { version = "0.1.0", path = "../logfwd-arrow" }
logfwd-transform = { version = "0.1.0", path = "../logfwd-transform" }
logfwd-output = { version = "0.1.0", path = "../logfwd-output" }
dhat = { version = "0.3", optional = true }
pprof = { version = "0.14", features = ["flamegraph"], optional = true }
libc = "0.2"
memchr = "2"
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-opentelemetry = { workspace = true }
arrow = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "sync"] }
tokio-util = { version = "0.7" }
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }

[target.'cfg(unix)'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["stats"] }
tikv-jemalloc-ctl = { version = "0.6", features = ["stats"] }

[dev-dependencies]
arrow = { workspace = true }
logfwd-test-utils = { version = "0.1.0", path = "../logfwd-test-utils" }
proptest = "1.11.0"
stats_alloc = "0.1"
tempfile = "3"
tiny_http = "0.12"

[lints]
workspace = true
