[package]
name = "logfwd"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[[bin]]
name = "ff"
path = "src/main.rs"

[lib]
doctest = false

[features]
default = ["datafusion"]
dhat-heap = ["dhat", "logfwd-runtime/dhat-heap"]
cpu-profiling = ["logfwd-runtime/cpu-profiling"]
turmoil = ["logfwd-runtime/turmoil"]
datafusion = ["dep:logfwd-transform", "logfwd-runtime/datafusion"]
otlp-research = [
    "logfwd-config/otlp-research",
    "logfwd-runtime/otlp-research",
    "logfwd-io/otlp-research",
]
s3 = ["logfwd-runtime/s3"]

[dependencies]
arrow = { workspace = true }
bytes = { workspace = true }
clap = { workspace = true, features = ["derive"] }
clap_complete = { workspace = true }
clap_complete_nushell = { workspace = true }
dhat = { version = "0.3", optional = true }
logfwd-arrow = { version = "0.1.0", path = "../logfwd-arrow" }
logfwd-config = { version = "0.1.0", path = "../logfwd-config" }
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
logfwd-diagnostics = { version = "0.1.0", path = "../logfwd-diagnostics" }
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }
logfwd-output = { version = "0.1.0", path = "../logfwd-output" }
logfwd-runtime = { version = "0.1.0", path = "../logfwd-runtime", default-features = false }
logfwd-transform = { version = "0.1.0", path = "../logfwd-transform", optional = true }
logfwd-types = { version = "0.1.0", path = "../logfwd-types" }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
serde_yaml_ng = { workspace = true }
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "signal",
    "time",
    "sync",
] }
tokio-util = { version = "0.7" }
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["stats"] }

[dev-dependencies]
arrow = { workspace = true }
bytes = { workspace = true }
futures-util = { workspace = true }
logfwd-test-utils = { version = "0.1.0", path = "../logfwd-test-utils" }
serde_json = "1"
stats_alloc = { workspace = true }
tempfile = "3"
turmoil = { workspace = true, features = ["unstable-barriers"] }

[target.'cfg(unix)'.dev-dependencies]
turmoil = { workspace = true, features = ["unstable-barriers", "unstable-fs"] }

[lints]
workspace = true
