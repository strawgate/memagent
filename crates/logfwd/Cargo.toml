[package]
name = "logfwd"
version = "0.1.0"
edition = "2024"
publish = false

[features]
dhat-heap = ["dhat"]

[dependencies]
logfwd-config = { path = "../logfwd-config" }
logfwd-core = { path = "../logfwd-core" }
logfwd-arrow = { path = "../logfwd-arrow" }
logfwd-transform = { path = "../logfwd-transform" }
logfwd-output = { path = "../logfwd-output" }
dhat = { version = "0.3", optional = true }
libc = "0.2"
memchr = "2"
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
opentelemetry-otlp = { workspace = true }
tiny_http = "0.12"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time"] }
tokio-util = { version = "0.7" }
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }

[target.'cfg(unix)'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["stats"] }
tikv-jemalloc-ctl = { version = "0.6", features = ["stats"] }

[dev-dependencies]
arrow = { workspace = true }
logfwd-test-utils = { path = "../logfwd-test-utils" }
tempfile = "3"
tiny_http = "0.12"
