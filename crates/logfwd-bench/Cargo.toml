[package]
name = "logfwd-bench"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[features]
dhat-heap = ["dep:dhat"]

[dependencies]
logfwd-core = { version = "0.1.0", path = "../logfwd-core" }
logfwd-arrow = { version = "0.1.0", path = "../logfwd-arrow" }
logfwd-transform = { version = "0.1.0", path = "../logfwd-transform" }
logfwd-output = { version = "0.1.0", path = "../logfwd-output" }
logfwd-types = { version = "0.1.0", path = "../logfwd-types" }
arrow = { workspace = true }
bytes = "1"
datafusion = { workspace = true }
criterion = { version = "0.7", features = ["html_reports"] }
fastrand = "2"
memchr = "2"
serde = { workspace = true }
serde_json = "1"
logfwd-io = { version = "0.1.0", path = "../logfwd-io" }
stats_alloc = "0.1"
tokio = { version = "1", features = ["rt-multi-thread"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
pprof = { version = "0.14", features = ["flamegraph"] }
tempfile = "3"
dhat = { version = "0.3", optional = true }

[[bench]]
name = "pipeline"
harness = false

[[bench]]
name = "elasticsearch_arrow"
harness = false

[[bench]]
name = "builder_compare"
harness = false

[[bench]]
name = "output_encode"
harness = false

[[bench]]
name = "full_chain"
harness = false

[[bench]]
name = "file_io"
harness = false

[[bench]]
name = "batch_formation"
harness = false

[[bench]]
name = "throughput_ceiling"
harness = false

[[bench]]
name = "transform_overhead"
harness = false

[[bin]]
name = "es-throughput"
path = "src/es_throughput.rs"

[[bin]]
name = "memory-profile"
path = "src/memory_profile.rs"

[lints]
workspace = true
