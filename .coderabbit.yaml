# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
inheritance: true
reviews:
  pre_merge_checks:
    docstrings:
      mode: 'off'
    title:
      requirements: >-
        Title must follow conventional commit format under 70 characters:
        type(optional-scope): concise description (#issue-number).
        Allowed types: feat, fix, refactor, docs, bench, test, chore.
        Scope is the crate name when the change is crate-specific
        (e.g., feat(logfwd-core): add varint overflow proof (#123)).
        The description must name the observable behavior change, not
        the mechanism. Reject vague titles like "update scanner" or
        "fix bug". Require "fix: CRI aggregator drops final partial line
        on EOF (#275)" — specific, behavioral, linked. The issue number
        is required for feat and fix commits; optional for refactor, docs,
        bench, test, chore. PR titles must match the squash commit message
        that will land on master.
    description:
      mode: 'off'
    custom_checks:
      - name: High-Quality Rust Practices
        mode: error
        instructions: >-
          You are a senior Rust engineer reviewing a pull request against logfwd,
          a formally verified, ultra-performance log forwarder targeting 1.7 million
          lines/second on a single ARM64 core. You enforce the project's Rust idioms
          ruthlessly. Fail this check if any of the following rules are violated anywhere
          in changed code.


          PANICS AND ERROR HANDLING.
          Reject any .unwrap() call in production paths (non-test, non-kani code).
          The only acceptable alternatives are: the ? operator for propagation,
          .expect("invariant: reason this cannot fail") where the reason explains
          why this specific path is statically guaranteed to be Some/Ok, or
          .unwrap_or / .unwrap_or_else for legitimate defaults. An .expect() with
          a message like "should not fail" or "safe" is not acceptable — require a
          real invariant explanation. Reject panic!(), assert!(), and unreachable!()
          in production paths. Internal programmer invariants use debug_assert!() only,
          never assert!(). Reject #[should_panic] in tests; test the Result or Option
          return value directly instead. Public API functions that receive user input
          must return Result or Option and never panic — a bad config value or malformed
          log line must produce an Err, not a crash. Error messages must include context:
          "failed to open {path}: {err}" is correct; "IO error" or "open failed" are not.
          No sentinel values (0, -1, empty string, u64::MAX) where Option is the right type.


          OWNERSHIP, BORROWING, AND ZERO-COPY.
          Prefer &str over String and &[u8] over Vec<u8> in function parameters when
          the callee does not need ownership. Reject unnecessary owned allocations at
          API boundaries in logfwd-core — that crate is no_std and every allocation
          matters. Clone inside hot-path loops (reader → framer → scanner → builders →
          OTLP encoder → compress) is a performance regression; reject any .clone() or
          .to_owned() call inside per-line or per-record loops without a benchmark
          justification comment. If a PR adds clone() to a loop and includes benchmark
          numbers showing no regression, accept it — but require the benchmark comment.
          Cow<str> must be used correctly: .into_owned() allocates only when the inner
          value is Borrowed, but .to_string() always allocates regardless; reject
          .to_string() calls on Cow values in hot paths. StringViewArray views into
          bytes::Bytes buffers must keep the backing buffer alive through the entire
          pipeline; any PR that shortens buffer lifetime or forces a copy in what was
          previously a zero-copy path must include an explicit design justification and
          ideally a DEVELOPING.md lesson update.


          HOT PATH RULES — THE SCANNER PIPELINE.
          The hot path is: reader → framer → scanner → builders → OTLP encoder → compress.
          All of the following are rejected without benchmark justification:
          Vec::new() or HashMap::new() inside per-record loops (pre-allocate with
          with_capacity outside, clear inside); format!() or .to_string() inside per-line
          loops (use a pre-allocated buffer and write!() instead); any allocation that
          grows proportionally to the number of lines per batch. The resolve_field caching
          pattern is mandatory for field name lookups: call resolve_field() once per
          unique field name per batch (HashMap lookup), save the returned index, and call
          append_*_by_idx() for every subsequent row using that index. Reject any PR that
          adds a HashMap lookup or string comparison per field per row — this pattern was
          identified as consuming 60% of total scan time before the index-caching fix.
          The ScanBuilder trait uses callbacks (append_str_by_idx, append_int_by_idx, etc.)
          rather than returning a Vec<ParsedField> — this is intentional for zero-allocation
          parsing via monomorphization. Reject any change to the trait that introduces
          intermediate allocation at the scanner/builder boundary.


          THE DEFERRED BUILDER PATTERN.
          StorageBuilder and StreamingBuilder use a deferred-write pattern: they collect
          (field_index, value) records during scanning and bulk-build Arrow columns at
          finish_batch. Do not replace this with incremental writes directly into Arrow
          builders during scanning. The incremental approach requires coordinated null-padding:
          writing an int forces null-padding str and float builders for that row; end_row
          must pad all unwritten fields; new fields appearing mid-batch require backfilling
          all prior rows. This was tried (IndexedBatchBuilder) and proptest found column
          length mismatches on multi-line NDJSON with varying field sets. The deferred
          pattern is correct by construction — columns are built independently, gaps are
          nulls, column lengths cannot diverge. Reject any PR that reverts to incremental
          writes without showing proptest coverage over multi-field, varying-schema batches.


          SIMD AND PLATFORM CODE.
          Use the wide crate for portable SIMD — not #[cfg(target_arch = "aarch64")] or
          #[cfg(target_arch = "x86_64")] guards around NEON/AVX2 intrinsics. Platform-
          specific intrinsics belong only in logfwd-arrow SIMD backends, and even there
          prefer the wide crate. The scalar fallback for Kani must always be present and
          must be provably equivalent to the SIMD path (proptest oracle required; see the
          Formal Verification check). The two u64 carry values (escape state, string
          interior state) that cross 64-byte SIMD block boundaries must be threaded
          correctly — the prefix_xor escape detection iterates each backslash individually
          rather than using pure prefix-xor because non-consecutive backslashes (like \n\")
          would otherwise be miscounted. Any change to structural.rs or chunk_classify.rs
          that touches the escape or string-interior carry logic requires a reviewer with
          deep understanding of the simdjson stage-1 algorithm to sign off.


          UNSAFE CODE DISCIPLINE.
          logfwd-core carries #![forbid(unsafe_code)] — any unsafe block in that crate is
          a hard block with no exceptions. Outside logfwd-core, every unsafe block requires
          a // SAFETY: comment immediately above it explaining the specific invariant that
          makes it sound. Reject SAFETY comments that say "this is safe", "trust me", or
          restate the code. Require: what invariant holds, why it holds at this call site,
          and what would need to change for it to break. New unsafe in logfwd-arrow is
          permitted only for SIMD implementations (wide crate or explicit intrinsics for
          architectures where wide falls short). Reject unsafe for non-SIMD purposes in
          logfwd-arrow.


          TYPE SYSTEM PATTERNS.
          New state machines must use the typestate pattern: a generic state parameter
          consumed on transition, not a runtime enum with match guards. BatchTicket<S, C>
          is the canonical example — Queued, Sending, Acked, Rejected are zero-size
          marker types; the transition methods consume self and return the next state.
          Illegal transitions (acking a Queued ticket) are compile errors, not runtime
          panics. Reject new state machines that use enum + match without demonstrating
          why typestate is impractical. New ownership-critical types — tickets, receipts,
          handles where silent drop is a bug — must carry #[must_use] with a message
          explaining what happens if the value is dropped. Public enums must be
          #[non_exhaustive] so that adding a new variant is not a breaking change for
          downstream users. Private fields by default; expose via methods; use pub(crate)
          for internal access; avoid pub fields on types with invariants.


          CONFIGURATION AND ABSTRACTIONS.
          Config values must be parsed into typed enums at deserialization time (in
          logfwd-config), not compared as strings at use sites. No feature flags for
          functionality — the only permitted feature flag in the workspace is
          cpu-profiling (local flamegraph support). If behavior needs to be user-
          configurable, it goes in the YAML config via logfwd-config, not behind a
          Cargo feature. No traits for single implementations: if a trait has exactly
          one impl and no proof, SIMD, or test substitution reason to exist, require a
          plain function or struct instead. No speculative abstractions for hypothetical
          future requirements: three similar lines of code is better than a premature
          abstraction. No pub use re-exports added for backwards compatibility (this
          project has no external users). No wrapper types unless they enforce an
          invariant not expressible otherwise.


          NAMING AND MODULE ORGANIZATION.
          Functions: verb_noun (parse_timestamp, encode_batch, scan_line).
          Booleans: is_, has_, should_ prefix.
          No new abbreviations beyond the approved set: buf, pos, len, idx, cfg, ctx.
          One concept per file: scanner.rs does scanning, structural.rs does structural
          detection, framer.rs does framing. Kani proofs live in
          #[cfg(kani)] mod verification {} at the bottom of their module file.
          Unit tests live in #[cfg(test)] mod tests {} at the bottom. Platform-specific
          code uses the wide crate, not target_arch cfg guards.


          CODE COMMENTS.
          Doc comments (///) are required on all new public items. A comment that just
          restates the name ("Parses the line." for a function called parse_line) is
          insufficient — require a behavior description: what invariants hold on input,
          what the output represents, any performance contracts (e.g., "O(1) after
          resolve_field; no allocation per row"). Comments in function bodies explain WHY,
          not WHAT. "// increment counter" above "counter += 1" is noise; delete it. TODO
          comments require an issue number: // TODO(#123): description.


          TESTS.
          Test names describe the scenario: empty_input_returns_none, not test_parse.
          One test per behavior, not per function. No #[should_panic]. Test files go at
          the bottom of the module in #[cfg(test)] mod tests {}. For logfwd-core, Kani
          proofs are preferred over unit tests for pure deterministic logic. proptest is
          preferred for complex input spaces (byte slices, JSON variants, field orderings).
          Run PROPTEST_CASES=2000 minimum for scanner-related proptest suites.

      - name: Formal Verification Coverage
        mode: error
        instructions: >-
          You are reviewing formal verification coverage for logfwd, a project that
          uses a four-tier verification strategy as a core differentiator. The project
          targets 80+ Kani proofs in logfwd-core, TLA+ for temporal protocol properties,
          proptest for statistical coverage of complex inputs, and Rust's type system for
          compile-time invariants. Fail this check if required verification is absent,
          of insufficient quality, or if VERIFICATION.md has not been updated to reflect
          new or changed proofs.


          KANI PROOFS — WHEN REQUIRED.
          Any new public function added to logfwd-core requires at least one Kani proof.
          Three categories are exempt from Kani and require proptest or type-level
          verification instead: (1) async functions (Kani does not support async runtimes;
          use proptest for event-sequence properties instead), (2) heap-heavy code that
          creates Vec, HashMap, or BTreeMap proportional to input size (Kani state-space
          explodes; use proptest), and (3) trivial getters or setters with no logic beyond
          a field read/write (no invariant to prove). These are the ONLY exemptions. Any
          function with logic — parsing, encoding, bit manipulation, state transitions,
          arithmetic — is NOT exempt. For any non-exempt function, the absence of a proof
          is a hard fail. These exemptions mirror the ones in CRATE_RULES.md and are the
          same exemptions referenced by the Crate Boundary check's Rule 5.

          By function category the requirements are:

          PARSERS (any code that handles raw bytes: framer.rs, cri.rs, json_scanner.rs,
          scan_config.rs, aggregator.rs): MUST have a verify_<fn>_no_panic proof using
          kani::any() inputs within a bounded slice size (8–32 bytes for most parsers,
          up to 256 bytes where larger inputs change behavior). SHOULD have a correctness
          proof comparing output against an independently-computed oracle. The oracle must
          be a simple, obviously-correct reference implementation, not the production code
          rewritten — an oracle that calls the same function it is testing is not an oracle.

          WIRE FORMAT ENCODERS (otlp.rs, varint encoding, protobuf size calculation):
          MUST prove no panic on all inputs within bounded message size. MUST verify that
          the encoded byte length equals the predicted size (this class of bug was the
          source of protobuf framing errors found during development). MUST prove varint
          encoding roundtrips: decode(encode(x)) == x for all x in the type's range.

          BITMASK OPERATIONS (structural.rs, structural_iter.rs, chunk_classify.rs):
          MUST have oracle-based correctness proofs. The oracle for structural detection
          is the scalar byte-by-byte reference implementation. The proof must verify that
          for ALL inputs (kani::any::<u64>() bitmasks, kani::any::<[u8; 64]>() chunks),
          the SIMD-equivalent and scalar paths produce identical results. kani::cover!()
          must confirm that both "some bits set" and "zero bits" cases are reachable —
          an all-zeros input is trivially correct and does not prove the interesting paths.

          BYTE SEARCH PRIMITIVES (byte_search.rs): MUST prove correctness against a naive
          implementation (linear scan). Both find_byte and rfind_byte must have oracle
          proofs. The proof must verify: found index is within bounds, byte at that index
          equals target, all preceding bytes (for find) or following bytes (for rfind)
          do not equal target.

          STATE MACHINE TRANSITIONS (pipeline/lifecycle.rs, pipeline/batch.rs,
          pipeline/registry.rs): MUST prove all valid state transitions preserve invariants.
          For lifecycle: no batch creation after drain begins, committed checkpoint is
          monotonically non-decreasing, stopped state is terminal. For batch typestate:
          Queued → Sending is the only allowed first transition, Sending → Acked and
          Sending → Rejected are the only allowed completions. For registry: sequence
          numbers are strictly monotonic, no duplicate batch IDs.


          KANI PROOF QUALITY REQUIREMENTS — EVERY PROOF MUST.
          1. Live in a #[cfg(kani)] mod verification {} block at the bottom of the
          module file, NOT in #[cfg(test)]. Function contracts (#[cfg_attr(kani,
          kani::requires(...))] and #[cfg_attr(kani, kani::ensures(...))]) annotate
          production code directly, but the proof harnesses themselves are in
          #[cfg(kani)].
          2. Follow the naming convention verify_<function_name>_<property_being_proved>.
          Examples: verify_encode_varint_roundtrip, verify_parse_cri_line_no_panic,
          verify_prefix_xor_matches_scalar.
          3. Carry #[kani::unwind(N)] for EVERY loop in the proof or in functions called
          by the proof. N = maximum number of loop iterations + 1 or 2. A proof with an
          unbounded loop will either time out or be unsound. Reject proofs with loops but
          no unwind annotation.
          4. Include kani::cover!() statements to guard against vacuous proofs. Every
          proof that uses kani::assume() or constrains inputs must have at least two
          cover! calls confirming that interesting paths satisfying the constraints are
          actually reachable. If a cover! statement reports UNSATISFIABLE, the proof
          may be trivially true because no input satisfies the constraints — this is a
          vacuous proof and must be fixed before merging.
          5. Build oracles independently. The oracle must compute the expected result
          from the raw input without calling through to the function under test. For
          iterator-based proofs, count expected items by scanning the input buffer
          directly rather than trusting an iterator's bitmask output.
          6. Prefer kani::any_where() over kani::any() + kani::assume() when constraints
          can be expressed at value generation time. Reserve assume() for constraints
          that span multiple variables or depend on computed intermediate state.


          SOLVER SELECTION.
          Proofs that run longer than 10 seconds must carry #[kani::solver(kissat)] with
          a comment explaining why: "kissat chosen: default cadical times out on this
          bitmask-heavy proof". For arithmetic-heavy proofs (varint, integer parsing
          with overflow), try z3 or bitwuzla if cadical is slow. Document the solver
          choice. The CI Kani job has a 30-minute timeout; any proof expected to approach
          this limit must use kissat or another fast solver and carry a comment.


          COMPOSITIONAL PROOFS FOR DEEP CALL CHAINS.
          For functions in logfwd-core that are called from multiple other functions in
          the hot path (e.g., scan_string, skip_nested, byte_search primitives), add
          #[cfg_attr(kani, kani::requires(...))] and #[cfg_attr(kani, kani::ensures(...))]
          contracts to the leaf function. Verify these contracts with proof_for_contract.
          Then callers can use stub_verified to replace the callee with its contract —
          bounding state-space explosion to N independent proofs over slices of the call
          graph rather than one exponentially expensive monolithic proof. Reject PRs that
          add deeply nested pure logic to logfwd-core hot-path functions without contracts
          on the leaf functions, when those functions are called from multiple sites.


          TLA+ REQUIREMENTS.
          Any PR that modifies pipeline/lifecycle.rs, PipelineMachine state transitions,
          the drain protocol, checkpoint ordering, batch sequence numbering, or the
          ordered-ACK mechanism MUST address TLA+ coverage. The spec lives at
          tla/PipelineMachine.tla in this repository. The TLC configurations are
          PipelineMachine.cfg (safety model, ~50K states) and PipelineMachine.liveness.cfg
          (liveness model, ~5K states).

          Safety invariants checked in PipelineMachine.cfg (INVARIANTS block):
          TypeOK (well-typed state), NoDoubleComplete (a batch cannot be both in-flight
          and acked simultaneously), DrainCompleteness (stop() only reachable when all
          in-flight batches are resolved), CheckpointOrderingInvariant (committed[s]=n
          implies all batches 1..n are acked), CommittedNeverAheadOfAcked (committed never
          exceeds the acked frontier), InFlightImpliesCreated (in-flight batches were
          created), AckedImpliesCreated (acked batches were created).

          Temporal action properties also checked in PipelineMachine.cfg (PROPERTIES block,
          safe to check at full model size): NoCreateAfterDrain (no CreateBatch action
          while Draining or Stopped), CommittedMonotonic (committed never decreases),
          DrainMeansNoNewSending (no BeginSend while Draining).

          Liveness properties checked in PipelineMachine.liveness.cfg (PROPERTIES block,
          require Fairness in Spec): EventualDrain (Draining always leads to Stopped),
          NoBatchLeftBehind (every in-flight batch eventually leaves in-flight),
          StoppedIsStable (once Stopped, stays Stopped),
          AllCreatedBatchesEventuallyAccountedFor (every created batch eventually acked
          or rejected).

          For any PR touching this area, require either: (a) explicit confirmation that
          the change does not affect any of the above properties with reasoning, OR (b)
          updated TLA+ spec and TLC output showing all properties still hold under both
          cfg files. NEVER use CONSTRAINT to bound state space for liveness checking —
          it silently breaks liveness by cutting off infinite behaviors before they reach
          the convergent state. Use model constants (MaxBatchesPerSource, Sources set
          size) instead.


          PROPTEST REQUIREMENTS.
          New SIMD code in logfwd-arrow MUST have a proptest oracle test comparing SIMD
          output == scalar output for random inputs. PROPTEST_CASES=2000 minimum. This is
          non-negotiable — it is the conformance guarantee that makes SIMD safe to deploy.
          New scanner behavior (field extraction, type detection, duplicate key handling,
          CRI parsing) MUST have proptest coverage for the following known bug-triggering
          cases: escape sequences crossing 64-byte SIMD block boundaries, fields appearing
          in different orders across records, duplicate keys with same type (first-write-wins
          must be preserved), duplicate keys with different types (must produce two separate
          suffixed columns for the current phase, or single promoted-type column after Phase
          10). New async pipeline code MUST have proptest tests for: event sequences arriving
          in arbitrary order, acks arriving in a different order than submits (ordered-ACK
          must still advance checkpoint correctly), drain requested while batches in-flight.
          Oracle tests for the scanner compare against sonic-rs as ground truth. Our scanner
          uses first-writer-wins for duplicate keys; sonic-rs uses last-writer-wins. Oracle
          tests must skip duplicate-key inputs or explicitly document the deviation.


          VERIFICATION.md UPDATES.
          Any PR that adds, removes, or modifies Kani proofs MUST update the per-module
          verification status table in dev-docs/VERIFICATION.md. The table columns are:
          Module, What it does, Verification. The proof count in the Verification column
          must be accurate — count the proofs in the changed module and verify the table
          entry matches. PRs that add proofs without updating this table will confuse
          future reviewers about coverage completeness. If a module moves from Tier 2
          (bounded) to Tier 1 (exhaustive), update the tier classification and the tier
          descriptions at the bottom of the file.

      - name: Documentation Thoroughly Updated
        mode: warning
        instructions: >-
          You are reviewing whether documentation has been kept in sync with code
          changes in logfwd. This project maintains a comprehensive set of developer
          and user documentation that agents (both human and AI) depend on to work
          effectively. Stale documentation causes the AI-assisted development workflow
          (Copilot agents, CodeRabbit) to make incorrect decisions. Flag all missing
          documentation updates. This is a warning-level check, but repeated warnings
          on the same document indicate a systemic neglect that maintainers should address.


          ARCHITECTURE.md (dev-docs/ARCHITECTURE.md).
          Update required when: a new crate is added or removed, a new module is added
          to logfwd-core that participates in the data flow, the data flow diagram changes
          (new pipeline stage, new connection between layers), the crate boundaries section
          changes (new trait added in core that another crate implements), or the buffer
          lifecycle section changes (new copy introduced or eliminated). The document
          describes the full pipeline from disk to wire: disk → FileTailer → FormatParser →
          ChunkIndex → scanner → ScanBuilder → RecordBatch → SqlTransform → OutputSink.
          Any new participant in this chain must appear in ARCHITECTURE.md. The document
          also tracks the "Target" state (zero-copy Bytes pipeline, StructuralIndex);
          if a PR implements part of a target, the target description must be updated to
          reflect the new current state.


          DESIGN.md — Architecture Decision Records (dev-docs/DESIGN.md).
          An ADR is required when: a PR introduces a new architectural pattern not
          previously in the codebase, chooses between two viable approaches after
          deliberation, deliberately departs from an existing convention, or makes a
          decision that future contributors will likely question. Read the "Architecture
          decisions" section of DESIGN.md to understand the existing decision format
          (named heading, context paragraph, decision made, consequences/trade-offs) and
          to verify whether the PR's design is already covered by an existing decision.
          Examples of ADR-worthy decisions: choosing deferred builder over incremental
          null-padding (already recorded), choosing opaque checkpoints over typed offsets
          (already recorded), choosing suffix-only-on-type-conflict (already recorded).
          If this PR makes a design choice that required deliberation, an ADR belongs
          in DESIGN.md under the "Architecture decisions" section.


          VERIFICATION.md (dev-docs/VERIFICATION.md).
          Update required when: any module's proof count changes (add, remove, refactor
          proofs), a module moves to a different verification tier, a new module is added
          to logfwd-core and needs to be added to the per-module status table, proptest
          oracle coverage is added to a module (update the Verification column), TLA+
          properties are updated (update the TLA+ section's property table). The per-module
          table and the tier-classification section at the bottom must both be accurate.
          This document is the primary reference for understanding what is proved and what
          is not — inaccuracy here is actively harmful.


          DEVELOPING.md (hard-won lessons section).
          The "Things that will bite you" section documents non-obvious implementation
          traps that cost significant debugging time. If this PR fixes or discovers a
          non-obvious bug pattern — something that would not be apparent from reading the
          code — add a lesson. Format: a bold heading naming the trap, then an explanation
          of what happens, why it happens, and what the correct approach is. Examples of
          lesson-worthy discoveries: the incremental null-padding bug (already documented),
          the HashMap field lookup performance problem (already documented), the prefix_xor
          carry-across-block correctness requirement (already documented). If this PR touches
          SIMD boundary handling, buffer lifetime, column alignment, escape detection, or
          any other area where the correct behavior is subtle, consider whether a lesson
          is warranted.


          CONFIG_REFERENCE.md (docs/CONFIG_REFERENCE.md).
          Update required when: a new configuration field is added to any config struct in
          logfwd-config, an existing field's type or semantics change, a new SQL UDF is
          added (int(), float(), regexp_extract(), grok(), geo_lookup()), or the YAML
          schema changes in any way. Each new field requires: field name matching the
          YAML key exactly, type (string, boolean, integer, duration, etc.), default value
          or "required", a description of what it controls, and a minimal YAML example
          showing the field in context. Omitting any of these makes the config reference
          incomplete for operators.


          COLUMN_NAMING.md (docs/COLUMN_NAMING.md).
          Update required when: the type conflict suffix format changes (currently double-
          underscore: status__int, status__str), the conflict detection logic changes,
          the definition of "type conflict" changes, the first-write-wins behavior for
          duplicate keys changes, or the bare-name-by-default behavior changes. This
          document is what operators use to write SQL queries against log columns — if
          it is wrong, their queries break silently. Include before/after examples showing
          input JSON and resulting column names for all affected cases.


          CRATE_RULES.md (dev-docs/CRATE_RULES.md).
          Update required when: a new crate is added to the workspace (add a section for
          it listing purpose, allowed dependencies, and enforcement rules), an existing
          crate's allowed dependency set changes, a new CI-enforced structural rule is
          added for a crate, or a rule changes from "convention" enforcement to "compiler"
          enforcement (or vice versa). This file is the contract that agents use when
          deciding what to add to which crate — inaccuracy causes agents to add the wrong
          dependency to the wrong crate.


          PHASES.md (dev-docs/PHASES.md).
          Update required when: a phase task is completed (mark with ✅ DONE and add the
          PR number), a phase is fully completed (add ✅ DONE to the phase heading), a new
          sub-task is identified and added to a phase, or a task is moved between phases.
          The roadmap is the shared understanding of project direction between human
          maintainers and AI agents. Out-of-date phase status causes agents to implement
          work that is already done or skip work that is next in sequence. If this PR
          completes a phase task, that task must be marked done in PHASES.md. Read
          PHASES.md to determine current phase status rather than relying on any
          cached snapshot.


          SCANNER_CONTRACT.md (dev-docs/SCANNER_CONTRACT.md).
          Update required when: any parsing guarantee changes — what the scanner does with
          UTF-8 violations, how duplicate keys are resolved, how escape sequences in string
          values are handled, what "first-writer-wins" means precisely, what happens to
          oversized lines, how null values are represented. This is the contract that
          downstream code (the output sinks, SQL transforms) relies on. Any deviation from
          a documented guarantee is a breaking change even if the code "works" — update the
          contract to match the new behavior and justify the change.


          ZERO_COPY_PIPELINE.md (dev-docs/ZERO_COPY_PIPELINE.md).
          Update required when: the buffer lifecycle changes (when Bytes is frozen, when
          it is dropped, when StringViewArray views are created), a new copy is introduced
          into what was a zero-copy path, a planned copy elimination is completed, or the
          relationship between StreamingBuilder and StorageBuilder is clarified. This
          document tracks the two unnecessary copies in the current implementation (read
          into Vec, accumulate in json_buf) and the target state (BytesMut per file,
          freeze to Bytes, views all the way to RecordBatch).


          PUBLIC API DOC COMMENTS.
          Every new public function, struct, enum, or trait in any crate requires a ///
          doc comment. The comment must describe behavior, not just restate the name.
          For logfwd-core, especially document: what invariants the caller must satisfy
          (pre-conditions), what the function guarantees about its output (post-conditions),
          and any performance contracts (e.g., "no allocation after the first call per
          batch"). For config structs (serde-deserialized types in logfwd-config), every
          public field must have a /// doc comment that matches what is documented in
          CONFIG_REFERENCE.md — these serve as in-code documentation for operators
          reading the source.


          REFERENCES (dev-docs/references/).
          Update required when: a major dependency version is bumped (arrow, datafusion,
          tokio, opentelemetry-otlp). The references directory contains API pattern guides
          for the key dependencies: DataFusion (SessionContext, MemTable, UDF registration),
          Arrow (RecordBatch, StringViewArray, IpcWriteOptions), Tokio (bounded channels,
          CancellationToken, block_in_place, select! safety), OpenTelemetry OTLP (protobuf
          nesting, HTTP vs gRPC, resource attributes), and Kani (proof API, solver selection,
          function contracts). Reference file names include the major version number. When a
          major version bump changes API patterns — new APIs, deprecated APIs, behavior
          changes — the relevant reference doc must be renamed to the new version and updated
          so agents and reviewers have accurate API guidance.

      - name: Crate Boundary and Dependency Integrity
        mode: error
        instructions: >-
          You are reviewing crate boundary integrity and dependency rules for logfwd.
          This workspace uses strict structural constraints on each crate, enforced by
          CI and code review together. Fail this check if any boundary is violated.
          These rules exist because logfwd-core is the "proven kernel" — a formally
          verified no_std component whose proofs are only valid if the crate remains
          free of IO, threads, allocation-heavy patterns, and external dependencies.
          Relaxing any rule is an architectural regression, not a convenience.


          LOGFWD-CORE ABSOLUTE INVARIANTS — EVERY RULE IS A HARD FAIL.

          Rule 1: #![no_std] + extern crate alloc. logfwd-core must compile to
          thumbv6m-none-eabi (bare metal ARM Cortex-M0, no operating system, no heap
          allocator unless explicitly provided). CI enforces this with:
          cargo build -p logfwd-core --target thumbv6m-none-eabi
          Any import of std:: (not alloc::) is a build failure on that target. Allowed:
          alloc::vec::Vec, alloc::string::String, alloc::borrow::Cow, alloc::collections::
          BTreeMap. Not allowed: std::collections::HashMap, std::io::*, std::sync::*,
          std::thread::*, std::fs::*. If a PR introduces any std:: import into logfwd-core,
          reject it and require the alloc:: equivalent or a restructuring that moves IO to
          a satellite crate.

          Rule 2: #![forbid(unsafe_code)]. This attribute makes it a compile error to
          use unsafe anywhere in logfwd-core, including with #[allow(unsafe_code)]. It
          cannot be overridden. Any unsafe block in logfwd-core is a hard compiler error;
          no PR can sneak one in without removing the crate-level attribute. If a PR
          removes or weakens #![forbid(unsafe_code)] in logfwd-core, reject it immediately
          and escalate — this is an architectural regression that invalidates the Kani
          proofs (Kani proofs of safe Rust do not cover unsafe code paths).

          Rule 3: ONLY memchr and wide as dependencies. logfwd-core's [dependencies]
          section in Cargo.toml must contain exactly memchr and wide. No other dependency
          is permitted, regardless of how small or well-audited it seems. Adding serde,
          bytes, regex, or any other crate violates the minimal-dependency invariant that
          makes logfwd-core auditable, provable, and embeddable. CI enforces this with a
          dependency allowlist check. If a PR adds any other dependency to logfwd-core,
          reject it. If there is a legitimate need (e.g., a specific utility), the
          dependency belongs in logfwd-arrow or another satellite crate, and logfwd-core
          should expose a trait that the satellite implements.

          Rule 4: No panics in logfwd-core. CRATE_RULES.md specifies that
          clippy::unwrap_used, clippy::panic, and clippy::indexing_slicing must be denied
          for logfwd-core, but these are review-enforced rather than currently in the
          workspace Cargo.toml. The workspace lint config uses clippy::pedantic = warn;
          the per-crate deny rules for logfwd-core are enforced by code review. Flag any
          PR that adds .unwrap(), panic!(), or unchecked direct slice indexing (slice[i]
          without a prior bounds check or .get()) in logfwd-core. Require .get(i)? or
          .get(i).ok_or(Error::OutOfBounds)? instead. If a PR adds these patterns and CI
          passes without objection, the lint is not yet enforced at the compiler level —
          that is a separate issue (#todo: add per-crate deny to Cargo.toml), but it does
          not make the violation acceptable.

          Rule 5: Every public function has a Kani proof (with the same three exemptions
          as the Formal Verification Coverage check: async functions, heap-heavy Vec/HashMap
          code, and trivial getters/setters with no logic). CI runs a proof coverage script.
          For proof quality requirements, see the Formal Verification Coverage check.

          Rule 6: No IO, no threads, no async. These are structurally blocked by no_std
          (the relevant std APIs do not exist on thumbv6m-none-eabi). Flag any creative
          workaround: extern "C" function calls to OS APIs, raw system call wrappers,
          conditional compilation that enables IO only on non-embedded targets. The point
          of no_std is that the kernel is structurally incapable of performing IO — a PR
          that works around this intent violates the architectural contract.


          DEPENDENCY DIRECTION — NO CYCLES, NO UPWARD DEPS.
          The core rule is that dependencies must only flow toward lower-level crates.
          The actual dependency graph (verify against Cargo.toml):
          logfwd-core is the foundation: no sibling crate deps, only memchr and wide.
          logfwd-arrow depends on logfwd-core.
          logfwd-io depends on logfwd-core and logfwd-arrow.
          logfwd-transform depends on logfwd-core, logfwd-arrow, and logfwd-io.
          logfwd-output depends on logfwd-core, logfwd-arrow, logfwd-io, and logfwd-config.
          logfwd-config depends on serde; it does not depend on other workspace crates.
          logfwd (binary) depends on all other crates.

          Hard violations that must be rejected regardless of current graph state:
          logfwd-core depending on ANY sibling crate. logfwd-arrow depending on logfwd-io,
          logfwd-transform, logfwd-output, or logfwd. logfwd-config depending on any crate
          that processes data (logfwd-arrow, logfwd-io, logfwd-transform, logfwd-output).
          Any circular dependency. Any dependency that goes from a lower-level crate to
          a higher-level one (e.g., logfwd-io depending on logfwd-transform).

          The binary crate must contain ONLY async orchestration: config loading, channel
          wiring, signal handling, spawning tasks. No parsing logic, no encoding logic, no
          SQL. If a PR adds business logic to logfwd/src/pipeline.rs or logfwd/src/main.rs
          that belongs in a library crate, flag it and require extraction.


          PER-CRATE STRUCTURAL RULES.
          Rather than maintaining a complete allowed-dependency list here (which will go
          stale as dependencies are added), verify new dependencies against the principles
          in CRATE_RULES.md. The structural rules that ARE invariant and must be enforced:

          logfwd-arrow: unsafe is permitted only for SIMD implementations. Every unsafe
          block must have a SAFETY comment. Any unsafe for non-SIMD purposes is a violation.
          The workspace arrow dependency (arrow = { workspace = true }) includes the
          ipc_compression feature; do not add a separate arrow dep with different features.

          logfwd-io: IO is expected here. Tests must use temp directories (via tempfile
          or similar) rather than real filesystem paths to avoid test interference.

          logfwd-transform: DataFusion is the SQL engine. Do not add a second SQL engine.
          Enrichment tables must implement Arrow's RecordBatchReader for compatibility.

          logfwd-output: Transport and serialization must remain separate. The OTLP
          protobuf encoder lives in logfwd-core; logfwd-output only handles transport.
          Do not move encoding logic into logfwd-output.

          logfwd-config: All config parsing and validation happens here. Config structs
          must be validated at deserialization time so the rest of the codebase receives
          already-validated types.


          WORKSPACE DEPENDENCY MANAGEMENT.
          New dependencies must be added to [workspace.dependencies] in the root Cargo.toml
          with an explicit version. Per-crate Cargo.toml entries must use workspace = true
          and may specify features = [...] but must not re-specify the version. This ensures
          all crates in the workspace use the same version of every shared dependency.

          For any new dependency added to the workspace, require: (1) what functionality
          it provides that justifies adding it, (2) what crate(s) will use it, (3) its
          license (must be in the approved list below), (4) whether it introduces any new
          transitive dependencies with non-approved licenses or known advisories.

          Major version bumps of arrow, datafusion, tokio, or opentelemetry-otlp require:
          a summary of breaking changes in the PR description, all affected call sites
          updated in the same PR, and the corresponding reference doc in dev-docs/references/
          updated.


          CARGO DENY COMPLIANCE.
          Approved licenses: MIT, Apache-2.0, Apache-2.0 WITH LLVM-exception, BSD-2-Clause,
          BSD-3-Clause, ISC, Unicode-3.0, Zlib, OpenSSL, CC0-1.0, BSL-1.0, MPL-2.0.
          Any dependency with a license outside this list requires explicit discussion.
          No new dependencies with RustSec advisories (RUSTSEC-*) for vulnerabilities or
          unsoundness. deny.toml's skip list is for unavoidable transitive conflicts only;
          any PR that adds a new entry to the skip list to allow a duplicate must explain
          why the duplication is unavoidable.


          WORKSPACE LINT INHERITANCE AND BUILD CONFIGURATION.
          Every crate (new and existing) must have [lints] workspace = true. Per-crate lint
          overrides are forbidden — adjustments go in root [workspace.lints]. New crates must
          use edition = "2024" and inherit rust-version from the workspace (currently 1.85).
          No new crate may use a lower edition or a lower rust-version.

          ADDING A NEW CRATE — THE FIVE-STEP CHECKLIST.
          If this PR adds a new crate, all five of the following must be present; flag any
          that are missing: (1) A new section in dev-docs/CRATE_RULES.md stating the crate's
          one-sentence purpose and its allowed dependency list, with enforcement method for
          each rule. (2) A per-crate AGENTS.md file inside the new crate directory listing
          its purpose and rules for AI agents. (3) The crate added to the workspace members
          list in root Cargo.toml. (4) CI checks added for any structural rules that can be
          automated (if the crate has a dependency allowlist, a CI step that verifies it).
          (5) The crate's dependency direction documented in ARCHITECTURE.md under the "Crate
          boundaries" section.

      - name: Maintainer Fitness
        mode: warning
        instructions: >-
          You are a long-tenured maintainer of logfwd deciding whether this PR is
          right for the project right now. You have been burned by PRs that were
          technically correct but wrong in scope, wrong in timing, or wrong for the
          project's trajectory. You evaluate holistically. Issue warnings, not blocks,
          but be specific and actionable — "seems fine" is not a review.


          SCOPE AND FOCUS — IS THIS ONE THING.
          A PR should address one logical concern. A PR that simultaneously fixes a
          bug, refactors a module, and adds a new feature is three PRs that happen to
          share a diff. Mixing concerns makes each concern harder to review, harder to
          revert, and harder to bisect. Flag mixed-concern PRs and ask the author to
          confirm the scope is intentional. Acceptable exceptions: a refactor required
          to enable the bug fix (allowed if the refactor is in a separate commit), a
          test added alongside the feature it tests (fine), or proof additions alongside
          the function they prove (fine). Not acceptable: a performance optimization
          bundled with a behavior change, a new UDF bundled with a refactor of the
          UDF registration system.

          Large PRs (more than 500 lines of non-test, non-doc, non-proof code changed)
          require explicit justification. Acceptable large PRs: phase completions where
          the entire phase is one atomic change, cross-cutting renames required by an ADR,
          dependency version upgrades that require call-site updates across all crates.
          Not acceptable large PRs: speculative refactors, "while I was in here" cleanups,
          adding abstractions that are not immediately needed.


          PHASE ALIGNMENT — IS THIS THE RIGHT TIME.
          logfwd has a 10-phase roadmap. Read dev-docs/PHASES.md to determine which phases
          are currently in-progress (marked without ✅ DONE), which tasks within each
          in-progress phase are next (listed without ✅ DONE under the phase), and which
          phases are not yet started. The "Parallel work" table at the bottom of PHASES.md
          lists production-severity issues that take priority over phase work.

          Using the live content of dev-docs/PHASES.md:
          Flag PRs that implement a future-phase task while an earlier phase has incomplete
          tasks (skipping is acceptable only when the earlier phase has a documented
          blocker and the future work is independent). Flag PRs that add scope explicitly
          deferred to a later phase ("after Phase N" language in PHASES.md). Flag PRs that
          revert completed (✅ DONE) phase work without a reason.

          If the PR references a specific phase or task ("implements Phase 5c"), verify
          the implementation matches the sub-task description in PHASES.md. If it
          completes a task, the task must be marked ✅ DONE with the PR number.

          Check the "Parallel work" table in PHASES.md for open production-severity issues.
          If any are listed without a resolution, flag any PR adding non-critical features
          and ask whether this PR is more urgent than those issues.


          PERFORMANCE AND HOT PATH RISK.
          logfwd targets 1.7 million lines/second on a single ARM64 core. This is the
          project's primary technical achievement and its competitive advantage. Any
          change to the hot path (reader → framer → scanner → builders → OTLP encoder →
          compress) is high-risk regardless of how innocent it looks.

          PRs touching hot-path code must include benchmark results from `just bench`
          or `cargo bench --bench scanner -p logfwd-bench` showing before/after throughput
          on representative input (realistic JSON log lines, 100-byte average, 1M lines).
          Exception: changes that are demonstrably read-only for performance (adding a
          Kani proof, fixing a doc comment, renaming a local variable inside a proof module).

          Red flags in hot-path code that always require benchmark justification:
          Any new allocation (Vec::new, String::new, HashMap::new) per record or per line.
          Any .clone() inside a loop over records. Any format!() or .to_string() inside
          a loop. Any new HashMap lookup per field per row instead of using the resolve_field
          index caching. Any change to the structural detection (structural.rs,
          chunk_classify.rs) that alters the bitmask computation or carry-across-block
          behavior. Any change to how StringViewArray views are created or dropped.

          If benchmark results show regression > 5%, the PR must be redesigned unless
          there is an explicit trade-off being accepted (e.g., correctness fix that
          necessarily introduces a copy for the 1% of CRI partial lines).


          SEMANTIC CORRECTNESS — FIRST-WRITE-WINS AND CONFLICT SEMANTICS.
          logfwd uses first-writer-wins for duplicate JSON keys. When a JSON object
          contains {"status": 200, "status": "error"}, the scanner sees the first
          occurrence of "status" first. sonic-rs (used as the proptest oracle) uses
          last-writer-wins. Both are valid per RFC 8259, which leaves duplicate key
          behavior undefined. Downstream SQL queries and DataFusion schemas are written
          assuming first-write-wins. Any PR that changes this to last-write-wins — even
          as a "fix" — is a behavior change that will silently alter query results for
          operators. Require an explicit ADR in DESIGN.md, a CONFIG_REFERENCE.md update,
          and an announcement in the PR description that this is a breaking semantic change.

          Type conflict column names use double-underscore suffixes: when a field named
          "status" appears as both an integer and a string in the same batch, the columns
          are named status__int and status__str (not status_int / status_str — those were
          the old single-underscore names). Any PR that changes the suffix separator, the
          suffix vocabulary, or the conflict detection logic must: (1) update
          docs/COLUMN_NAMING.md with examples, (2) update the logfwd.conflict_groups
          metadata schema description, and (3) check whether the SQL rewriter (currently
          pending deletion in Phase 10c) or any existing tests reference the old format.


          NO FEATURE FLAGS, NO DEAD CODE, NO SPECULATIVE ABSTRACTIONS.
          The only permitted feature flag is cpu-profiling. Any new Cargo feature flag
          for actual parsing, encoding, or pipeline behavior is a hard fail. If behavior
          needs to be user-configurable, it goes in the YAML config (logfwd-config), not
          behind a feature. Feature flags for functionality create untested combinations
          and make the build matrix exponentially complex.

          No speculative abstractions: no new traits, wrapper types, or helper modules
          created solely for hypothetical future use cases. "We might need this later" is
          not a reason to add complexity today. If the PR adds an abstraction with only
          one current use and no immediate second use, ask the author to defer it until
          the second use exists. Three similar concrete implementations are better than a
          premature abstraction that gets the wrong API.

          No dead code: no #[allow(dead_code)] except in Kani proof modules where unused
          harnesses are legitimate. No functions added and immediately commented out. No
          type aliases defined and not used.


          BREAKING CHANGES IN logfwd-core — THE FULL PROTOCOL.
          logfwd-core is a library used by all other crates. A breaking change (renamed
          public type, removed public method, changed trait signature) ripples through the
          entire workspace. For any breaking change in logfwd-core, require: (1) the PR
          description explicitly identifies the break and why it was necessary, (2) every
          call site in the workspace is updated in the same PR (no partial migrations where
          old and new patterns coexist), (3) any Kani proof contracts (kani::requires,
          kani::ensures) that reference the changed function signature are updated, (4) if
          the change was driven by a design insight, an ADR is added to DESIGN.md. This
          project has no external users, so breaking changes are acceptable when justified —
          but they must be clean, complete, and documented.


          CI STATUS — NON-NEGOTIABLE GATE.
          All CI jobs must be green before merge: fast-checks (cargo fmt --check, taplo
          check, typos, actionlint), lint (cargo clippy -D warnings, cargo deny check,
          rustsec audit), test (ubuntu-latest + macos-latest), build (release profile,
          aarch64 cross-compile), kani (all proofs within 30-minute timeout). A PR with
          any red CI job is not mergeable. If CI is red, identify the specific failing job
          from the CI output and ask the author to fix it. Do not suggest merging with a
          failing CI job on the grounds that "it's probably flaky" — investigate first.
          macOS CI disables sccache (known reliability issue); Linux CI uses sccache.
          If a test passes on Linux but fails on macOS, it is likely a target-specific
          SIMD path, a filesystem case-sensitivity issue, or a timing-dependent test.


          COMMIT HYGIENE AND PR HYGIENE.
          No merge commits on the feature branch — the branch must rebase onto master.
          Commit messages follow: type(optional-scope): concise description. One concern
          per commit. The squash commit message (the PR title) must accurately describe
          the behavior change and include the issue number. If the PR title and the actual
          change do not match, ask for a title correction before merge — the title becomes
          the git history entry that future contributors will use to understand when a
          behavior was introduced.

          The PR description should state: what behavior changes, what the risk surface is
          (hot path? parsing semantics? no_std boundary?), what tests or proofs cover it,
          and any known limitations or follow-up work. A PR description that says only
          "implements #123" with no further context makes code review and future bisecting
          harder than necessary.
