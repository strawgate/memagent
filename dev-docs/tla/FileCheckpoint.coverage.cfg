\* TLC Model Checker Configuration — COVERAGE / REACHABILITY model
\*
\* Each invariant is ~P. TLC violation = witness that P is reachable.
\* No violation = P unreachable = spec bug.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCFileCheckpoint.tla -config FileCheckpoint.coverage.cfg
\* Expected: TLC reports 5 invariant violations (one per reachability assertion).

SPECIFICATION Spec

CONSTANTS
    MaxLines = 4
    MaxBatches = 2
    MaxCrashes = 1
    MaxRotations = 1
    BatchSize = 2

\* Reachability assertions — each VIOLATION is a witness trace
INVARIANTS
    EmitOccurs
    CheckpointAdvances
    CrashOccurs
    RotationOccurs
    RestartOccurs
