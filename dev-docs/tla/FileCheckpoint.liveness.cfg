\* TLC Model Checker Configuration — LIVENESS model
\*
\* Smaller constants for tractable liveness checking.
\* No SYMMETRY (unsafe for temporal properties).
\* No CONSTRAINT (silently breaks liveness).
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCFileCheckpoint.tla -config FileCheckpoint.liveness.cfg
\* Expected: ~50K states, < 5 min

SPECIFICATION Spec

CONSTANTS
    MaxLines = 3
    MaxBatches = 2
    MaxCrashes = 1
    MaxRotations = 0
    BatchSize = 1

\* Safety invariants (always check these too)
INVARIANTS
    TypeOK
    NoCorruption

\* Liveness properties
PROPERTIES
    Progress
    EventualEmission
    CheckpointMonotonicity
