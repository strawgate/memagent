\* TLC Model Checker Configuration — SAFETY model
\*
\* Checks all safety invariants and temporal action properties.
\* Liveness properties are in FileCheckpoint.liveness.cfg.
\*
\* Run: java -cp tla2tools.jar tlc2.TLC MCFileCheckpoint.tla -config FileCheckpoint.cfg
\* Expected: ~200K states, < 2 min

SPECIFICATION Spec

CONSTANTS
    MaxLines = 4
    MaxBatches = 2
    MaxCrashes = 1
    MaxRotations = 1
    BatchSize = 2

\* Safety invariants
INVARIANTS
    TypeOK
    NoCorruption
    CheckpointAtBoundary
    ReadOffsetBounded
    RotatedReadBounded
    InFlightInvariant
    PipelineConsistency
    NoEmitBeforeWrite

\* Temporal action properties
PROPERTIES
    CheckpointMonotonicity
