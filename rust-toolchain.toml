[toolchain]
# Track latest stable. The workspace uses recent language features and deps
# that require current stable (1.94+ as of April 2026).
# Cargo.toml declares rust-version = "1.85" as MSRV, but that is aspirational;
# the actual minimum is dictated by transitive deps and language usage.
channel = "stable"
components = ["clippy", "rustfmt"]
targets = ["aarch64-unknown-linux-gnu"]
