[default.extend-words]
# Intentional partial strings in test data and example error messages.
caf = "caf"
hel = "hel"
leve = "leve"
# CSS class prefix for pipeline nodes in the dashboard.
pn = "pn"
# Intentional "ue" string slice in streaming_builder tests (tail of "value").
ue = "ue"
# CLI fuzzy-match test strings (intentional typos for Levenshtein matching).
confg = "confg"
conifg = "conifg"
versin = "versin"
validat = "validat"
chck = "chck"

[files]
extend-exclude = [
    # Built/minified dashboard — not human-authored, skip spell check.
    "crates/ffwd-diagnostics/src/dashboard.html",
    "crates/ffwd-diagnostics/src/dashboard-dist/**",
]
