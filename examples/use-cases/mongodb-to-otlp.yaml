# FastForward example
# Use case: MongoDB logs to OTLP
# Replace paths/endpoints with values for your environment.

pipelines:
  default:
    inputs:
      - type: file
        path: /var/log/mongodb/mongod*.json
        format: json
    transform: |
      SELECT * FROM logs
    outputs:
      - type: otlp
        endpoint: https://otel-collector:4318/v1/logs

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
