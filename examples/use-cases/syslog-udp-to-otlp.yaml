# logfwd example
# Use case: UDP syslog to OTLP
# Replace paths/endpoints with values for your environment.

input:
  type: udp
  listen: 0.0.0.0:514
  format: syslog

transform: |
  SELECT * FROM logs

output:
  type: otlp
  endpoint: http://otel-collector:4318

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
