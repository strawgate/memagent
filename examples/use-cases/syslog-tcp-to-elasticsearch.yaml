# logfwd example
# Use case: TCP syslog to Elasticsearch
# Replace paths/endpoints with values for your environment.

input:
  type: tcp
  listen: 0.0.0.0:1514
  format: syslog

transform: |
  SELECT * FROM logs

output:
  type: elasticsearch
  endpoint: http://elasticsearch:9200
  index: syslog-%Y.%m.%d

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
