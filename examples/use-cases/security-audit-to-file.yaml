# FastForward example
# Use case: Security audit logs to file
# Replace paths/endpoints with values for your environment.

pipelines:
  default:
    inputs:
      - type: file
        path: /var/log/audit/audit.log
        format: raw
    transform: |
      SELECT * FROM logs
    outputs:
      - type: file
        path: ./security-audit.ndjson

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
