# FastForward example
# Use case: OTLP input to Loki
# Replace paths/endpoints with values for your environment.

pipelines:
  default:
    inputs:
      - type: otlp
        listen: 0.0.0.0:4318
    transform: |
      SELECT * FROM logs
    outputs:
      - type: loki
        endpoint: https://loki:3100
        static_labels:
          source: otlp

# Optional: diagnostics
# server:
#   diagnostics: 127.0.0.1:9191
