input:
  type: file
  path: /var/log/app/*.log
  format: json

transform: |
  SELECT
    level_str,
    message_str,
    status_int,
    duration_ms_float
  FROM logs
  WHERE level_str IN ('ERROR', 'WARN')
    OR status_int >= 400

output:
  type: elasticsearch
  endpoint: https://elasticsearch.example.com:9200
  index: application-errors
  auth:
    bearer_token: ${ELASTICSEARCH_API_KEY}
